<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFX LAB — 30 特效測試場</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400&display=swap');

:root {
  --bg: #04050f;
  --bg2: #080a1a;
  --panel: rgba(10,12,30,0.92);
  --border: rgba(80,120,255,0.25);
  --accent: #3a7fff;
  --accent2: #a855f7;
  --text: #c8d8ff;
  --muted: #556080;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

canvas#bg {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  z-index: 0; pointer-events: none;
}

/* ===== DESKTOP LAYOUT ===== */
.layout {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
  background: rgba(30,40,80,0.5);
}

.sidebar-header h1 {
  font-family: 'Orbitron', monospace;
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 3px;
  color: #fff;
  text-transform: uppercase;
}

.sidebar-header p {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 1px;
}

.btn-grid {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
  scrollbar-width: thin;
  scrollbar-color: #334 transparent;
}

.btn-grid::-webkit-scrollbar { width: 4px; }
.btn-grid::-webkit-scrollbar-thumb { background: #334; border-radius: 2px; }

.vfx-btn {
  width: 100%;
  padding: 9px 12px;
  margin-bottom: 4px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(80,100,200,0.15);
  border-radius: 6px;
  color: var(--text);
  font-size: 11.5px;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  text-align: left;
  transition: all .15s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  line-height: 1.3;
}

.vfx-btn:hover {
  background: rgba(60,100,255,0.15);
  border-color: rgba(80,140,255,0.4);
  color: #fff;
  transform: translateX(2px);
}

.vfx-btn.active {
  background: rgba(60,100,255,0.25);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 12px rgba(60,100,255,0.3);
}

.vfx-btn .num {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: var(--muted);
  min-width: 20px;
}

.vfx-btn.active .num { color: var(--accent); }
.vfx-btn .icon { font-size: 14px; }
.vfx-btn .name { flex: 1; }
.vfx-btn .en {
  font-size: 9px;
  color: var(--muted);
  display: block;
  margin-top: 1px;
}

/* MAIN CANVAS AREA */
.main {
  display: flex;
  flex-direction: column;
  position: relative;
}

.top-bar {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,10,26,0.8);
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(8px);
  gap: 12px;
}

.effect-title {
  font-family: 'Orbitron', monospace;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 2px;
}

.effect-desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  max-width: 600px;
}

.hint-badge {
  font-size: 11px;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
}

.canvas-wrap {
  flex: 1;
  position: relative;
  cursor: crosshair;
  overflow: hidden;
  min-height: 200px;
}

canvas#main {
  position: absolute;
  top:0; left:0;
  width:100%; height:100%;
}

.crosshair {
  position: absolute;
  pointer-events: none;
  transform: translate(-50%,-50%);
  width: 20px; height: 20px;
  border: 1px solid rgba(100,160,255,0.6);
  border-radius: 50%;
  transition: width .1s, height .1s;
}

.crosshair::before, .crosshair::after {
  content:''; position:absolute;
  background: rgba(100,160,255,0.5);
}
.crosshair::before { width:1px; height:8px; left:50%; top:50%; transform:translate(-50%,-50%); }
.crosshair::after  { width:8px; height:1px; left:50%; top:50%; transform:translate(-50%,-50%); }

/* ===== MOBILE BOTTOM DRAWER ===== */
@media (max-width: 700px) {
  .layout {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto;
    min-height: 100dvh;
  }

  .sidebar {
    border-right: none;
    border-top: 1px solid var(--border);
    grid-row: 2;
    max-height: 42vh;
  }

  .sidebar-header {
    padding: 10px 14px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-header h1 { font-size: 12px; letter-spacing: 2px; }
  .sidebar-header p  { display: none; }

  /* horizontal scroll grid on mobile */
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    padding: 8px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .vfx-btn {
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 7px 4px;
    gap: 3px;
    font-size: 10px;
  }

  .vfx-btn:hover { transform: none; }

  .vfx-btn .num { font-size: 9px; min-width: auto; }
  .vfx-btn .icon { font-size: 18px; }
  .vfx-btn .en   { display: none; }
  .vfx-btn .name { font-size: 10px; }

  .main { grid-row: 1; }

  .top-bar {
    padding: 8px 12px;
    flex-wrap: wrap;
    gap: 4px;
  }

  .effect-title { font-size: 13px; letter-spacing: 1px; }
  .effect-desc  { display: none; }
  .hint-badge   { font-size: 10px; padding: 3px 8px; }

  .crosshair { display: none !important; }
  .canvas-wrap { cursor: default; }
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>VFX LAB</h1>
      <p>30 特效測試場 · 點擊畫面觸發</p>
    </div>
    <div class="btn-grid" id="btnGrid"></div>
  </div>
  <div class="main">
    <div class="top-bar">
      <div>
        <div class="effect-title" id="effectTitle">選擇一個特效</div>
        <div class="effect-desc" id="effectDesc">從左側選單選擇特效，然後在畫面上點擊觸發</div>
      </div>
      <div class="hint-badge" id="hintBadge">← 選擇特效</div>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="main"></canvas>
      <div class="crosshair" id="crosshair" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ===== SETUP =====
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');
const mc = document.getElementById('main');
const ctx = mc.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const crosshair = document.getElementById('crosshair');

let W, H;
function resize() {
  W = mc.width = wrap.clientWidth;
  H = mc.height = wrap.clientHeight;
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== STAR BG =====
const stars = Array.from({length:200}, () => ({
  x: Math.random(), y: Math.random(),
  s: Math.random()*1.5+0.3,
  a: Math.random(), da: (Math.random()-0.5)*0.01
}));
function drawBg() {
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  stars.forEach(s => {
    s.a = Math.max(0.1, Math.min(1, s.a + s.da));
    if (s.a <= 0.1 || s.a >= 1) s.da *= -1;
    bgCtx.globalAlpha = s.a * 0.5;
    bgCtx.fillStyle = '#8aaeff';
    bgCtx.beginPath();
    bgCtx.arc(s.x*bgCanvas.width, s.y*bgCanvas.height, s.s, 0, Math.PI*2);
    bgCtx.fill();
  });
  bgCtx.globalAlpha = 1;
}

// ===== EFFECT DEFINITIONS =====
const EFFECTS = [
  {id:1,  icon:'🌟', name:'賽博超新星', en:'Cyber Supernova', hint:'點擊任意位置爆炸'},
  {id:2,  icon:'🕳️', name:'量子黑洞', en:'Quantum Black Hole', hint:'持續運行·點擊重置'},
  {id:3,  icon:'💻', name:'矩陣數位雨', en:'Digital Matrix Rain', hint:'持續運行·點擊切換'},
  {id:4,  icon:'🔥', name:'鳳凰涅槃火', en:'Phoenix Inferno', hint:'點擊噴發火焰'},
  {id:5,  icon:'⚡', name:'次元斬裂縫', en:'Dimensional Slash', hint:'點擊觸發斬擊'},
  {id:6,  icon:'🌧️', name:'霓虹終極風暴', en:'Neon Rainstorm', hint:'持續運行·點擊加強'},
  {id:7,  icon:'🛡️', name:'奈米核心防護', en:'Nano Shield Orb', hint:'持續運行·點擊位置'},
  {id:8,  icon:'📡', name:'全像脈衝波', en:'Holographic Pulse', hint:'點擊發射脈衝'},
  {id:9,  icon:'🌈', name:'復古極光流', en:'Retro Aurora', hint:'持續運行·點擊色彩'},
  {id:10, icon:'💀', name:'宇宙大崩壞', en:'Cosmic Crunch', hint:'持續運行·點擊加劇'},
  {id:11, icon:'⏱️', name:'時間停滯領域', en:'Chrono Stasis', hint:'點擊凍結時間'},
  {id:12, icon:'✨', name:'聖光審判斬', en:'Holy Judgment', hint:'點擊召喚聖光'},
  {id:13, icon:'📺', name:'賽博朋克雜訊', en:'Glitch Art Error', hint:'持續運行·點擊加劇'},
  {id:14, icon:'👻', name:'幽冥鬼火', en:'Phantom Wisp', hint:'持續運行·點擊召喚'},
  {id:15, icon:'💰', name:'黃金暴風雨', en:'Midas Gold Rain', hint:'持續運行·點擊強化'},
  {id:16, icon:'🌩️', name:'雷神降世', en:"Thor's Lightning", hint:'點擊召喚閃電'},
  {id:17, icon:'🌸', name:'櫻落無痕', en:'Cherry Blossom Fall', hint:'持續運行·點擊加速'},
  {id:18, icon:'🎵', name:'聲波共振漣漪', en:'Audio Ripple', hint:'點擊發出聲波'},
  {id:19, icon:'❄️', name:'冰封禁制', en:'Absolute Zero', hint:'點擊冰封畫面'},
  {id:20, icon:'🔮', name:'萬花筒幻境', en:'Kaleidoscope Dream', hint:'持續運行·點擊新圖案'},
  {id:21, icon:'🌀', name:'蟲洞穿越', en:'Wormhole Transit', hint:'點擊開啟蟲洞'},
  {id:22, icon:'🧬', name:'DNA螺旋解構', en:'DNA Helix', hint:'持續運行·點擊位置'},
  {id:23, icon:'🪐', name:'星環引力', en:'Saturn Ring', hint:'持續運行·點擊星球'},
  {id:24, icon:'🌊', name:'流體模擬', en:'Fluid Sim', hint:'點擊潑濺流體'},
  {id:25, icon:'💎', name:'寶石折射', en:'Crystal Refract', hint:'點擊折射爆發'},
  {id:26, icon:'🧩', name:'像素腐蝕', en:'Pixel Decay', hint:'點擊開始腐蝕'},
  {id:27, icon:'🌺', name:'神聖幾何', en:'Sacred Geometry', hint:'點擊展開幾何'},
  {id:28, icon:'⚔️', name:'劍氣衝擊波', en:'Sword Aura', hint:'點擊揮砍'},
  {id:29, icon:'🌌', name:'星雲誕生', en:'Nebula Birth', hint:'點擊觸發星雲'},
  {id:30, icon:'💥', name:'末日烈焰球', en:'Armageddon', hint:'點擊觸發末日'},
  {id:31, icon:'🌀', name:'螺旋丸', en:'Rasengan', hint:'按住拖曳·放開發射'},
];

// Build sidebar
const grid = document.getElementById('btnGrid');
EFFECTS.forEach(e => {
  const btn = document.createElement('button');
  btn.className = 'vfx-btn';
  btn.dataset.id = e.id;
  btn.innerHTML = `<span class="num">${String(e.id).padStart(2,'0')}</span><span class="icon">${e.icon}</span><span class="name">${e.name}<span class="en">${e.en}</span></span>`;
  btn.addEventListener('click', () => selectEffect(e.id));
  grid.appendChild(btn);
});

let currentEffect = 0;
let particles = [];
let persistent = {}; // per-effect state
let glitchActive = false;
let chronoActive = false;
let chronoTime = 0;
let iceState = {active:false, crystals:[], flakes:[], progress:0};
let kaleido = {active:false, pts:[], hue:0};
let matrixCols = [];
let auroraT = 0;
let crunchStars = [];
let blackHoleParticles = [];
let wisps = [];
let saturnParticles = [];
let dnaT = 0;
let wormholeState = {active:false, t:0, x:0, y:0};
let nebulaParticles = [];
let fluidParticles = [];
let crystalShards = [];
let pixelDecay = {active:false, cells:[], t:0};
let sacredGeo = {active:false, layers:[], t:0, x:0, y:0};
let swordSlash = [];
let neonRain = [];
let goldRain = [];
let cherryPetals = [];
let ripples = [];
let holyBeams = [];
let holePulses = [];
let noiseBlocks = [];
let shieldT = 0;
let shieldX, shieldY;
let lastClick = null;
let rasengan = {active:false, x:0, y:0, charge:0, fired:false, trail:[], ballX:0, ballY:0, vx:0, vy:0, life:0};

function rand(a,b){ return a + Math.random()*(b-a); }
function randInt(a,b){ return Math.floor(rand(a,b+1)); }
function lerp(a,b,t){ return a+(b-a)*t; }
function hsla(h,s,l,a){ return `hsla(${h},${s}%,${l}%,${a})`; }

function selectEffect(id) {
  currentEffect = id;
  particles = [];
  persistent = {};
  glitchActive = false;
  chronoActive = false;
  iceState = {active:false, crystals:[], flakes:[], progress:0};
  kaleido = {active:false, pts:[], hue:0};
  matrixCols = [];
  auroraT = 0;
  crunchStars = [];
  blackHoleParticles = [];
  wisps = [];
  saturnParticles = [];
  dnaT = 0;
  wormholeState = {active:false,t:0,x:0,y:0};
  nebulaParticles = [];
  fluidParticles = [];
  crystalShards = [];
  pixelDecay = {active:false, cells:[], t:0};
  sacredGeo = {active:false, layers:[], t:0, x:0, y:0};
  swordSlash = [];
  neonRain = [];
  goldRain = [];
  cherryPetals = [];
  ripples = [];
  holyBeams = [];
  holePulses = [];
  noiseBlocks = [];
  shieldT = 0;
  shieldX = W/2; shieldY = H/2;
  lastClick = null;

  const e = EFFECTS.find(x=>x.id===id);
  document.getElementById('effectTitle').textContent = `${e.icon} ${e.name}`;
  document.getElementById('effectDesc').textContent = e.en;
  document.getElementById('hintBadge').textContent = e.hint;
  crosshair.style.display = 'block';

  document.querySelectorAll('.vfx-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.id)===id);
  });

  // init persistent effects
  if (id===3) initMatrix();
  if (id===6) initNeonRain();
  if (id===9) {}
  if (id===10) initCrunch();
  if (id===14) initWisps();
  if (id===15) initGoldRain();
  if (id===17) initCherry();
  if (id===22) {}
  if (id===23) initSaturn();
  if (id===31) rasengan = {active:false, x:W/2, y:H/2, charge:0, fired:false, trail:[], ballX:W/2, ballY:H/2, vx:0, vy:0, life:0};
}

function handleClick(x, y) {
  lastClick = {x,y};
  if (currentEffect===1) spawnSupernova(x,y);
  if (currentEffect===2) spawnBlackHole(x,y);
  if (currentEffect===3) matrixCols = [];setTimeout(()=>initMatrix(),100);
  if (currentEffect===4) spawnPhoenix(x,y);
  if (currentEffect===5) spawnSlash(x,y);
  if (currentEffect===6) spawnRainSplash(x,y,20);
  if (currentEffect===7) { shieldX=x; shieldY=y; }
  if (currentEffect===8) spawnPulse(x,y);
  if (currentEffect===9) auroraT=0;
  if (currentEffect===10) spawnCrunchBurst(x,y);
  if (currentEffect===11) toggleChrono(x,y);
  if (currentEffect===12) spawnHoly(x,y);
  if (currentEffect===13) spawnGlitch();
  if (currentEffect===14) spawnWisp(x,y);
  if (currentEffect===15) spawnGoldBurst(x,y);
  if (currentEffect===16) spawnThunder(x,y);
  if (currentEffect===17) spawnCherryBurst(x,y);
  if (currentEffect===18) spawnRipple(x,y);
  if (currentEffect===19) spawnIce(x,y);
  if (currentEffect===20) spawnKaleido(x,y);
  if (currentEffect===21) spawnWormhole(x,y);
  if (currentEffect===22) {}
  if (currentEffect===23) {}
  if (currentEffect===24) spawnFluid(x,y);
  if (currentEffect===25) spawnCrystal(x,y);
  if (currentEffect===26) spawnPixelDecay(x,y);
  if (currentEffect===27) spawnSacredGeo(x,y);
  if (currentEffect===28) spawnSword(x,y);
  if (currentEffect===29) spawnNebula(x,y);
  if (currentEffect===30) spawnArmageddon(x,y);
  if (currentEffect===31) fireRasengan(x,y);
}

// ===== EFFECT 1: SUPERNOVA =====
function spawnSupernova(x,y) {
  const cols = ['#ff6ae0','#6ae0ff','#e0ff6a','#ff6a6a','#6affb4','#fff','#a78bfa'];
  for (let i=0;i<200;i++) {
    const a=rand(0,Math.PI*2), s=rand(2,12), hue=randInt(0,360);
    particles.push({
      type:'supernova', x, y,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, decay:rand(0.008,0.022),
      size:rand(1.5,5), color:`hsl(${hue},100%,70%)`,
      trail:[], gravity:0.05, drag:0.97
    });
  }
  // shockwave rings
  for(let i=0;i<4;i++) {
    particles.push({type:'ring',x,y,r:0,maxR:rand(80,220),life:1,decay:rand(0.01,0.02),hue:randInt(160,320),w:rand(1,4)});
  }
}

// ===== EFFECT 2: BLACK HOLE =====
function spawnBlackHole(cx,cy) {
  persistent.bh = {x:cx||W/2, y:cy||H/2, t:0};
  for(let i=0;i<150;i++) {
    const a=rand(0,Math.PI*2), r=rand(100,Math.min(W,H)*0.45);
    blackHoleParticles.push({
      x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r,
      vx:rand(-1,1), vy:rand(-1,1),
      life:1, size:rand(1,3),
      hue:randInt(200,280)
    });
  }
}

function updateBlackHole() {
  if (!persistent.bh) return;
  const {x,y} = persistent.bh;
  persistent.bh.t++;

  // draw black hole
  const g = ctx.createRadialGradient(x,y,0,x,y,60);
  g.addColorStop(0,'rgba(0,0,0,1)');
  g.addColorStop(0.5,'rgba(20,0,40,0.8)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x,y,60,0,Math.PI*2); ctx.fill();

  // accretion disk
  ctx.save();
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.ellipse(x,y,80+i*20,15+i*5,persistent.bh.t*0.01,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${200+i*30},90%,60%,${0.3-i*0.08})`;
    ctx.lineWidth=4-i;
    ctx.stroke();
  }
  ctx.restore();

  // add new particles
  if(blackHoleParticles.length < 200 && Math.random()<0.3) {
    const a=rand(0,Math.PI*2), r=rand(150,250);
    blackHoleParticles.push({x:x+Math.cos(a)*r,y:y+Math.sin(a)*r,vx:rand(-0.5,0.5),vy:rand(-0.5,0.5),life:1,size:rand(1,3),hue:randInt(200,280)});
  }

  blackHoleParticles = blackHoleParticles.filter(p => {
    const dx=x-p.x, dy=y-p.y, dist=Math.sqrt(dx*dx+dy*dy);
    const force = 8000/(dist*dist+100);
    p.vx += dx/dist*force;
    p.vy += dy/dist*force;
    // tangential
    p.vx += -dy/dist*0.3;
    p.vy += dx/dist*0.3;
    p.x+=p.vx; p.y+=p.vy;
    p.life -= 0.003;
    if(dist<30) return false;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = `hsl(${p.hue},80%,60%)`;
    ctx.shadowBlur=6; ctx.shadowColor=`hsl(${p.hue},80%,60%)`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;

function updateMatrix() {
  ctx.fillStyle='rgba(4,5,15,0.15)';
  ctx.fillRect(0,0,W,H);
  ctx.font='14px monospace';

      const alpha = i===0 ? 1 : Math.max(0, (1-i/len)*col.opacity);
      const isHead = i===0;
      ctx.fillStyle = isHead ? `rgba(200,255,200,${alpha})` : `rgba(0,${120+Math.floor(135*alpha)},0,${alpha})`;
      const ch = Math.random()<0.05 ? String.fromCharCode(randInt(48,58)) : col.chars[i%col.chars.length];
      ctx.fillText(ch, col.x-6, cy);
    }
  });
}

// ===== EFFECT 7: SHIELD =====
function updateShield() {
  shieldT += 0.02;
  if(!shieldX){shieldX=W/2;shieldY=H/2;}
  ctx.save();
  for(let ring=0;ring<2;ring++){
    const sign=ring===0?1:-1;
    const baseR=80+ring*40;
    ctx.strokeStyle=`hsla(${180+ring*60},90%,60%,0.7)`;
    ctx.shadowBlur=20;
    ctx.shadowColor=`hsla(${180+ring*60},90%,60%,0.8)`;
    ctx.lineWidth=1.5;
    // orbit ring
    ctx.save();
    ctx.translate(shieldX,shieldY);
    ctx.rotate(shieldT*sign*(ring+1));
    ctx.beginPath();
    ctx.ellipse(0,0,baseR,baseR*0.3,0,0,Math.PI*2);
    ctx.stroke();
    // particles on ring
    for(let j=0;j<6;j++){
      const a=(j/6)*Math.PI*2+shieldT*sign*2;
      const px=Math.cos(a)*baseR, py=Math.sin(a)*baseR*0.3;
      ctx.fillStyle=`hsl(${180+ring*60},100%,80%)`;
      ctx.shadowBlur=15;
      ctx.beginPath();
      ctx.save();
      // hexagon particle
      ctx.translate(px,py);
      ctx.rotate(shieldT*3);
      ctx.beginPath();
      for(let k=0;k<6;k++){
        const ha=(k/6)*Math.PI*2;
        k===0?ctx.moveTo(Math.cos(ha)*4,Math.sin(ha)*4):ctx.lineTo(Math.cos(ha)*4,Math.sin(ha)*4);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }
  ctx.restore();
}

function updateWisps(){
  const t=Date.now()*0.001;
  wisps.forEach(w=>{
    w.phase+=0.02;
    // attract to others
    wisps.forEach(other=>{
      if(other===w)return;
      const dx=other.x-w.x, dy=other.y-w.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<150){
        w.vx+=dx/dist*0.02;
        w.vy+=dy/dist*0.02;
      }
    });
    w.vx+=(Math.random()-0.5)*0.1;
    w.vy+=(Math.random()-0.5)*0.1;
    w.vx*=0.97; w.vy*=0.97;
    w.x+=w.vx; w.y+=w.vy;
    if(w.x<0||w.x>W)w.vx*=-1;
    if(w.y<0||w.y>H)w.vy*=-1;
    w.trail.push({x:w.x,y:w.y});
    if(w.trail.length>30)w.trail.shift();

    // draw trail
    w.trail.forEach((pt,i)=>{
      const a=i/w.trail.length;
      ctx.globalAlpha=a*0.15;
      ctx.fillStyle=`hsl(${w.hue},80%,60%)`;
      ctx.beginPath();
      ctx.arc(pt.x,pt.y,w.size*a*0.5,0,Math.PI*2);
      ctx.fill();
    });

    // draw wisp
    const g=ctx.createRadialGradient(w.x,w.y,0,w.x,w.y,w.size);
    g.addColorStop(0,`hsla(${w.hue},100%,90%,0.8)`);
    g.addColorStop(0.4,`hsla(${w.hue},80%,60%,0.4)`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=0.8+Math.sin(w.phase)*0.2;
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(w.x,w.y,w.size,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  });
}

function spawnIce(x,y){
  iceState.active=true;
  iceState.progress=0;
  iceState.crystals=[];
  iceState.flakes=[];
  // generate ice crystal lines from edges
  const n=80;
  for(let i=0;i<n;i++){
    let sx,sy;
    const side=randInt(0,3);
    if(side===0){sx=rand(0,W);sy=0;}
    else if(side===1){sx=W;sy=rand(0,H);}
    else if(side===2){sx=rand(0,W);sy=H;}
    else{sx=0;sy=rand(0,H);}
    const tx=x+rand(-50,50),ty=y+rand(-50,50);
    iceState.crystals.push({
      pts:[{x:sx,y:sy}], tx, ty,
      progress:0, delay:rand(0,0.3),
      branches:[], hue:randInt(180,220), done:false
    });
  }
  // snowflakes
  for(let i=0;i<200;i++){
    iceState.flakes.push({x:rand(0,W),y:rand(-H,0),vy:rand(1,3),vx:rand(-0.5,0.5),size:rand(1,4)});
  }
}

function updateIce(){
  if(!iceState.active)return;
  iceState.progress=Math.min(1,iceState.progress+0.004);
  // white freeze overlay
  ctx.fillStyle=`rgba(200,220,255,${iceState.progress*0.2})`;
  ctx.fillRect(0,0,W,H);

  iceState.crystals.forEach(c=>{
    if(c.progress<c.delay) return;
    c.progress+=0.03;
    if(c.progress>=1) c.done=true;
    const t=Math.min(1,(c.progress-c.delay)/(1-c.delay));
    const last=c.pts[c.pts.length-1];
    const px=lerp(last.x||c.pts[0].x, c.tx, t);
    const py=lerp(last.y||c.pts[0].y, c.ty, t);
    ctx.save();
    ctx.strokeStyle=`hsla(${c.hue},60%,80%,0.8)`;
    ctx.lineWidth=0.8;
    ctx.shadowBlur=4; ctx.shadowColor='#aaddff';
    ctx.beginPath();
    ctx.moveTo(c.pts[0].x,c.pts[0].y);
    ctx.lineTo(px,py);
    ctx.stroke();
    // branch lines
    if(t>0.3 && Math.random()<0.02){
      const bx=px+rand(-30,30),by=py+rand(-30,30);
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(bx,by);ctx.stroke();
    }
    ctx.restore();
  });
  // snowflakes
  iceState.flakes.forEach(f=>{
    f.y+=f.vy*iceState.progress*2; f.x+=f.vx;
    if(f.y>H)f.y=-10;
    ctx.fillStyle=`rgba(200,230,255,0.7)`;
    ctx.beginPath();ctx.arc(f.x,f.y,f.size,0,Math.PI*2);ctx.fill();
  });
}

function updateKaleido(){

// ===== EFFECT 21: WORMHOLE =====
function spawnWormhole(x,y){
  wormholeState={active:true,t:0,x,y,phase:'suck'};
  persistent.wormhole={particles:[]};
  for(let i=0;i<200;i++){
    const a=rand(0,Math.PI*2),r=rand(50,Math.min(W,H)*0.4);
    persistent.wormhole.particles.push({x:x+Math.cos(a)*r,y:y+Math.sin(a)*r,hue:randInt(160,320),size:rand(1,4),a,r,speed:rand(1,3)});
  }
}

function updateWormhole(){
  if(!wormholeState.active)return;
  wormholeState.t++;
  const {x,y,t} = wormholeState;
  if(t>120) wormholeState.phase='spit';
  if(t>200){wormholeState.active=false;return;}

  const maxR=Math.min(W,H)*0.35;
  ctx.save();
  // vortex rings
  for(let i=0;i<5;i++){
    const r=(maxR*(1-t/200))*((i+1)/5);
    ctx.strokeStyle=`hsla(${260+i*20},90%,70%,${0.3*(1-i/5)})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();

  persistent.wormhole.particles.forEach(p=>{
    if(wormholeState.phase==='suck'){
      const dx=x-p.x,dy=y-p.y,dist=Math.sqrt(dx*dx+dy*dy);
      p.x+=dx/dist*p.speed*2;p.y+=dy/dist*p.speed*2;
      p.a+=0.05;
    } else {
      const ex=x+Math.cos(p.a+Math.PI)*rand(50,200);
      const ey=y+Math.sin(p.a+Math.PI)*rand(50,200);
      p.x=lerp(p.x,ex,0.05);p.y=lerp(p.y,ey,0.05);
    }
    ctx.globalAlpha=0.8;
    ctx.fillStyle=`hsl(${p.hue},80%,70%)`;
    ctx.shadowBlur=6;ctx.shadowColor=`hsl(${p.hue},80%,70%)`;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// ===== EFFECT 22: DNA =====
function updateDNA(){
  dnaT+=0.03;
  if(!lastClick){lastClick={x:W/2,y:H/2};}
  const cx=lastClick.x, cy=lastClick.y;
  const len=200, r=60, step=8;

  ctx.save();
  for(let i=-len/2;i<len/2;i+=step){
    const t=i/len*Math.PI*4+dnaT;
    const y1=cy+Math.sin(t)*r;
    const y2=cy+Math.sin(t+Math.PI)*r;
    const x=cx+i;

    // strand 1
    const h1=(i+len/2)/len*360;
    ctx.fillStyle=`hsl(${h1},90%,60%)`;
    ctx.shadowBlur=8;ctx.shadowColor=`hsl(${h1},90%,60%)`;
    ctx.beginPath();ctx.arc(x,y1,4,0,Math.PI*2);ctx.fill();
    // strand 2
    const h2=(h1+180)%360;
    ctx.fillStyle=`hsl(${h2},90%,60%)`;
    ctx.shadowColor=`hsl(${h2},90%,60%)`;
    ctx.beginPath();ctx.arc(x,y2,4,0,Math.PI*2);ctx.fill();
    // rung
    const dist=Math.abs(Math.sin(t)-Math.sin(t+Math.PI));
    if(i%16===0){
      ctx.strokeStyle=`rgba(200,200,255,${dist*0.4+0.1})`;
      ctx.lineWidth=1;ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2);ctx.stroke();
    }
  }
  ctx.restore();
  ctx.shadowBlur=0;
}

// ===== EFFECT 26: PIXEL DECAY =====
function spawnPixelDecay(x,y){
  const cellSize=12;
  const cols=Math.ceil(W/cellSize), rows=Math.ceil(H/cellSize);
  pixelDecay.cells=[];
  for(let row=0;row<rows;row++)for(let col=0;col<cols;col++){
    const cx2=col*cellSize+cellSize/2, cy2=row*cellSize+cellSize/2;
    const dist=Math.sqrt((cx2-x)**2+(cy2-y)**2);
    pixelDecay.cells.push({col,row,x:col*cellSize,y:row*cellSize,w:cellSize,h:cellSize,delay:dist*0.003,life:1,hue:randInt(0,360)});
  }
  pixelDecay.active=true;pixelDecay.t=0;
}

function updatePixelDecay(){
  if(!pixelDecay.active)return;
  pixelDecay.t+=0.016;
  let allDead=true;
  pixelDecay.cells.forEach(c=>{
    if(pixelDecay.t<c.delay){allDead=false;return;}
    c.life=Math.max(0,c.life-0.03);
    if(c.life>0){allDead=false;}
    ctx.save();
    ctx.globalAlpha=c.life;
    ctx.fillStyle=`hsl(${c.hue+pixelDecay.t*50},80%,60%)`;
    ctx.fillRect(c.x,c.y,c.w*c.life,c.h*c.life);
    ctx.restore();
  });
  if(allDead)pixelDecay.active=false;
}

function spawnSacredGeo(x,y){
  sacredGeo.active=true;sacredGeo.t=0;sacredGeo.x=x;sacredGeo.y=y;
  sacredGeo.layers=[];
  const n=7;
  for(let i=0;i<n;i++){
    sacredGeo.layers.push({r:0,maxR:40+i*35,rotSpeed:0.01*(i%2===0?1:-1),hue:i/n*360,segs:6+i*2,life:1});
  }
}

function updateSacredGeo(){
  if(!sacredGeo.active)return;
  sacredGeo.t+=0.015;
  const {x,y} = sacredGeo;
  sacredGeo.layers.forEach((l,li)=>{
    l.r=Math.min(l.r+1.5,l.maxR);
    const rot=sacredGeo.t*l.rotSpeed*50;
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(rot);
    ctx.strokeStyle=`hsla(${l.hue+sacredGeo.t*30},90%,65%,0.7)`;
    ctx.shadowBlur=10;ctx.shadowColor=`hsl(${l.hue},90%,65%)`;
    ctx.lineWidth=1;
    // polygon
    ctx.beginPath();
    for(let i=0;i<=l.segs;i++){
      const a=(i/l.segs)*Math.PI*2;
      i===0?ctx.moveTo(Math.cos(a)*l.r,Math.sin(a)*l.r):ctx.lineTo(Math.cos(a)*l.r,Math.sin(a)*l.r);
    }
    ctx.stroke();
    // inner star lines
    if(li%2===0){
      ctx.beginPath();
      for(let i=0;i<l.segs;i++){
        const a=(i/l.segs)*Math.PI*2;
        const bx=Math.cos(a)*l.r,by=Math.sin(a)*l.r;
        for(let j=i+2;j<l.segs;j+=2){
          const a2=(j/l.segs)*Math.PI*2;
          ctx.moveTo(bx,by);ctx.lineTo(Math.cos(a2)*l.r,Math.sin(a2)*l.r);
        }
      }
      ctx.globalAlpha=0.3;
      ctx.stroke();
    }
    ctx.restore();
  });
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// ===== SHARED PARTICLE RENDERER =====
function renderParticles(){
  particles=particles.filter(p=>{
    p.life-=p.decay;
    if(p.life<=0)return false;
    if(p.vx!==undefined){p.x+=p.vx;p.y+=p.vy;}
    if(p.gravity)p.vy+=p.gravity;
    if(p.drag){p.vx*=p.drag;p.vy*=p.drag;}
    if(p.rotV)p.rot=(p.rot||0)+p.rotV;
    ctx.save();
    ctx.globalAlpha=p.life;

    if(p.type==='supernova'||p.type==='spark'){
      ctx.fillStyle=p.color||`hsl(${p.hue},100%,70%)`;
      ctx.shadowBlur=12*p.life;ctx.shadowColor=p.color||`hsl(${p.hue},100%,70%)`;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    } else if(p.type==='ring'){
      ctx.strokeStyle=`hsl(${p.hue},80%,60%)`;
      ctx.lineWidth=p.w*p.life;
      ctx.shadowBlur=20;ctx.shadowColor=`hsl(${p.hue},80%,60%)`;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r+(1-p.life)*200,0,Math.PI*2);ctx.stroke();
      p.r+=(1-p.life)*2;
    } else if(p.type==='fire'){
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
      g.addColorStop(0,`hsla(${p.hue+30},100%,90%,${p.life})`);
      g.addColorStop(0.4,`hsla(${p.hue},100%,55%,${p.life*0.7})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.ellipse(p.x,p.y,p.size*0.5,p.size,0,0,Math.PI*2);ctx.fill();
    } else if(p.type==='thunder'){
      p.bolts.forEach(b=>{
        ctx.globalAlpha=p.life*(b.d>5?1:0.4);
        ctx.strokeStyle=b.d>5?'#ffffff':'#88aaff';
        ctx.lineWidth=b.d>5?2:0.5;
        ctx.shadowBlur=b.d>5?20:6;ctx.shadowColor='#aaddff';
        ctx.beginPath();ctx.moveTo(b.x1,b.y1);ctx.lineTo(b.x2,b.y2);ctx.stroke();
      });
    } else if(p.type==='feather'){
      ctx.fillStyle=p.color;
      ctx.shadowBlur=15;ctx.shadowColor=p.color;
      ctx.beginPath();ctx.ellipse(p.x,p.y,p.size*0.3,p.size,(p.vx||0)*0.3,0,Math.PI*2);ctx.fill();
    } else if(p.type==='gold'){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
      ctx.fillStyle=`hsl(45,100%,${60+p.life*30}%)`;
      ctx.shadowBlur=10;ctx.shadowColor='#ffd700';
      ctx.beginPath();ctx.moveTo(0,-p.size);ctx.lineTo(p.size*0.6,0);ctx.lineTo(0,p.size);ctx.lineTo(-p.size*0.6,0);ctx.closePath();ctx.fill();
      ctx.restore();
    } else if(p.type==='pixel'){
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x,p.y,p.size,p.size);
    } else if(p.type==='lava'){
      const steps=20;
      ctx.strokeStyle=`hsl(${p.hue},100%,${50+p.life*20}%)`;
      ctx.shadowBlur=15;ctx.shadowColor=`hsl(${p.hue},100%,60%)`;
      ctx.lineWidth=2*p.life;
      ctx.beginPath();
      let cx2=p.x,cy2=p.y;ctx.moveTo(cx2,cy2);
      for(let i=0;i<steps;i++){
        cx2+=Math.cos(p.a+rand(-0.5,0.5))*(p.len/steps);
        cy2+=Math.sin(p.a+rand(-0.5,0.5))*(p.len/steps);
        ctx.lineTo(cx2,cy2);
      }
      ctx.stroke();
    }
    ctx.restore();
    return p.life>0;
  });
}

// ===== FLASH =====
function drawFlash(){
  if(persistent.flash && persistent.flash.life>0){
    ctx.fillStyle=`rgba(255,255,255,${persistent.flash.life*0.6})`;
    ctx.fillRect(0,0,W,H);
    persistent.flash.life-=0.08;
  }
}

// ===== DRAW SLASH =====
function drawSlash(){
  swordSlash=swordSlash.filter(s=>{
    s.life-=s.decay;if(s.life<=0)return false;
    s.t=s.t||0;s.t++;
    ctx.save();
    // glow
    for(let i=0;i<3;i++){
      ctx.globalAlpha=s.life*(0.4-i*0.12);
      ctx.strokeStyle=`hsl(${s.hue||180},100%,70%)`;
      ctx.lineWidth=(8+i*6)*s.life;
      ctx.shadowBlur=30;ctx.shadowColor=`hsl(${s.hue||180},100%,70%)`;
      ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
    }
    // core
    ctx.globalAlpha=s.life;
    ctx.strokeStyle='#ffffff';ctx.lineWidth=2*s.life;ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
    ctx.restore();
    return true;
  });
}

// ===== EFFECT 31: RASENGAN =====
function fireRasengan(tx, ty) {
  if (!rasengan.fired) {
    // Already charging — fire toward click target
    const dx = tx - rasengan.x, dy = ty - rasengan.y;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    rasengan.vx = dx/dist * 14;
    rasengan.vy = dy/dist * 14;
    rasengan.ballX = rasengan.x;
    rasengan.ballY = rasengan.y;
    rasengan.fired = true;
    rasengan.life = 1;
    rasengan.trail = [];
  } else {
    // Re-trigger: new charge at click location
    rasengan.active = true;
    rasengan.fired = false;
    rasengan.charge = 0;
    rasengan.x = tx; rasengan.y = ty;
    rasengan.trail = [];
  }
}

function updateRasengan() {
  if (!rasengan.active && !rasengan.fired) return;

  if (!rasengan.fired) {
    // CHARGING PHASE — spin up at cursor
    rasengan.charge = Math.min(1, rasengan.charge + 0.025);
    drawRasenganBall(rasengan.x, rasengan.y, rasengan.charge, false);
    return;
  }

  // FLYING PHASE
  rasengan.ballX += rasengan.vx;
  rasengan.ballY += rasengan.vy;
  rasengan.life -= 0.007;

  // trail
  rasengan.trail.push({x: rasengan.ballX, y: rasengan.ballY, life: rasengan.life});
  if (rasengan.trail.length > 40) rasengan.trail.shift();

  // draw trail
  rasengan.trail.forEach((pt, i) => {
    const a = (i / rasengan.trail.length);
    ctx.save();
    ctx.globalAlpha = a * 0.25 * pt.life;
    const g = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, 55 * a);
    g.addColorStop(0, 'rgba(160,220,255,0.9)');
    g.addColorStop(0.5, 'rgba(60,140,255,0.5)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, 55 * a, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  drawRasenganBall(rasengan.ballX, rasengan.ballY, rasengan.life, true);

  // out of bounds or expired → impact
  if (rasengan.life <= 0 ||
      rasengan.ballX < -80 || rasengan.ballX > W+80 ||
      rasengan.ballY < -80 || rasengan.ballY > H+80) {
    rasenganImpact(rasengan.ballX, rasengan.ballY);
    rasengan.fired = false;
    rasengan.active = false;
  }
}

function drawRasenganBall(x, y, power, flying) {
  const R = 42 * power;
  const t = Date.now() * 0.001;
  ctx.save();

  // outer glow halo
  const halo = ctx.createRadialGradient(x, y, 0, x, y, R * 2.5);
  halo.addColorStop(0, `rgba(180,230,255,${0.18 * power})`);
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(x, y, R * 2.5, 0, Math.PI*2); ctx.fill();

  // core sphere gradient
  const core = ctx.createRadialGradient(x - R*0.25, y - R*0.25, 0, x, y, R);
  core.addColorStop(0, `rgba(255,255,255,${0.95 * power})`);
  core.addColorStop(0.25, `rgba(180,230,255,${0.85 * power})`);
  core.addColorStop(0.6, `rgba(60,140,255,${0.7 * power})`);
  core.addColorStop(1, `rgba(0,40,120,${0.5 * power})`);
  ctx.fillStyle = core;
  ctx.shadowBlur = 40 * power;
  ctx.shadowColor = '#60aaff';
  ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // spinning chakra rings — 4 layers at different angles/speeds
  const ringDefs = [
    {tilt: 0.3,  speed: 3.5,  particles: 18, rFrac: 0.95, hue: 200},
    {tilt: -0.5, speed: -5.0, particles: 14, rFrac: 0.85, hue: 220},
    {tilt: 1.1,  speed: 4.2,  particles: 12, rFrac: 0.75, hue: 180},
    {tilt: -1.4, speed: -6.0, particles: 10, rFrac: 0.65, hue: 200},
  ];

  ringDefs.forEach((rd, ri) => {
    const ringR = R * rd.rFrac;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rd.tilt);

    // ellipse ring line
    ctx.strokeStyle = `hsla(${rd.hue}, 100%, 80%, ${0.35 * power})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.ellipse(0, 0, ringR, ringR * 0.3, 0, 0, Math.PI*2);
    ctx.stroke();

    // bright energy beads on ring
    for (let i = 0; i < rd.particles; i++) {
      const a = (i / rd.particles) * Math.PI*2 + t * rd.speed;
      const px = Math.cos(a) * ringR;
      const py = Math.sin(a) * ringR * 0.3;
      const brightness = 0.5 + 0.5 * Math.sin(a * 3 + t * 8);
      ctx.fillStyle = `hsla(${rd.hue + brightness*40}, 100%, ${70 + brightness*30}%, ${power * (0.5 + brightness*0.5)})`;
      ctx.shadowBlur = 8 + brightness * 12;
      ctx.shadowColor = `hsl(${rd.hue}, 100%, 80%)`;
      ctx.beginPath();
      ctx.arc(px, py, 2.2 + brightness * 1.8, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });

  // radial energy streams shooting outward then curling in
  const streamCount = 24;
  for (let i = 0; i < streamCount; i++) {
    const baseAngle = (i / streamCount) * Math.PI*2 + t * 2.5;
    const wobble = Math.sin(t * 7 + i * 1.3) * 0.3;
    const a = baseAngle + wobble;
    const innerR = R * 0.3;
    const outerR = R * (0.88 + Math.sin(t*5 + i) * 0.12);
    const x1 = Math.cos(a) * innerR, y1 = Math.sin(a) * innerR;
    const x2 = Math.cos(a) * outerR, y2 = Math.sin(a) * outerR;
    const alpha = (0.4 + 0.6 * Math.sin(t*6 + i*0.7)) * power;
    ctx.save();
    ctx.translate(x, y);
    ctx.strokeStyle = `rgba(180, 230, 255, ${alpha})`;
    ctx.shadowBlur = 6; ctx.shadowColor = '#a0d8ff';
    ctx.lineWidth = 0.8 + Math.sin(t*4+i)*0.4;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.restore();
  }

  // surface shimmer — small bright spots
  if (power > 0.5) {
    for (let i = 0; i < 10; i++) {
      const sa = t * 3 + i * (Math.PI*2/10);
      const sr = R * (0.3 + Math.random() * 0.6);
      const sx = x + Math.cos(sa) * sr;
      const sy = y + Math.sin(sa) * sr * 0.9;
      const sbright = Math.sin(t * 10 + i * 2.1);
      if (sbright > 0.3) {
        ctx.fillStyle = `rgba(255,255,255,${sbright * power * 0.7})`;
        ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  ctx.restore();
}

function rasenganImpact(x, y) {
  // massive shockwave rings
  for (let i = 0; i < 6; i++) {
    holePulses.push({x, y, r: i*8, life: 1, decay: 0.012 + i*0.003, hue: 200 + i*8});
  }
  // explosion particles
  for (let i = 0; i < 200; i++) {
    const a = rand(0, Math.PI*2), s = rand(3, 16);
    const hue = rand(180, 240);
    particles.push({
      type: 'spark', x, y,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 1, decay: rand(0.01, 0.03),
      size: rand(1.5, 6),
      color: `hsl(${hue}, 100%, ${rand(70,100)}%)`,
      gravity: 0.08, drag: 0.97
    });
  }
  // big glow flash
  persistent.flash = {life: 0.7};
  // debris chunks
  for (let i = 0; i < 30; i++) {
    const a = rand(0, Math.PI*2), s = rand(1, 6);
    particles.push({
      type: 'ring', x, y, r: rand(5,30),
      maxR: rand(60,180), life: 1, decay: rand(0.015, 0.04),
      hue: rand(190, 230), w: rand(1, 3)
    });
  }
  // screen shake
  persistent.shake = {frames: 20, mag: 18};
}

// ===== MAIN LOOP =====
let frame=0;
let shakeX=0,shakeY=0;

function loop(){
  requestAnimationFrame(loop);
  frame++;
  drawBg();

  // screen shake
  if(persistent.shake && persistent.shake.frames>0){
    shakeX=(Math.random()-0.5)*persistent.shake.mag;
    shakeY=(Math.random()-0.5)*persistent.shake.mag;
    persistent.shake.frames--;
    if(persistent.shake.frames<=0){shakeX=0;shakeY=0;}
  }

  ctx.save();
  ctx.translate(shakeX,shakeY);

  // clear
  if(currentEffect===3||currentEffect===9||currentEffect===10){
    // matrix etc manage own clear
  } else if(currentEffect===2||currentEffect===14||currentEffect===22||currentEffect===23){
    ctx.fillStyle='rgba(4,5,15,0.2)';ctx.fillRect(0,0,W,H);
  } else if(currentEffect===20){
    ctx.fillStyle='rgba(4,5,15,0.08)';ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle='rgba(4,5,15,0.35)';ctx.fillRect(0,0,W,H);
  }

  // run effects
  if(currentEffect===2) updateBlackHole();
  if(currentEffect===3) updateMatrix();
  if(currentEffect===6) updateNeonRain();
  if(currentEffect===7) updateShield();
  if(currentEffect===9) updateAurora();
  if(currentEffect===10) updateCrunch();
  if(currentEffect===11) updateChrono();
  if(currentEffect===13) updateGlitch();
  if(currentEffect===14) updateWisps();
  if(currentEffect===15) updateGoldRain();
  if(currentEffect===17) updateCherry();
  if(currentEffect===20) updateKaleido();
  if(currentEffect===21) updateWormhole();
  if(currentEffect===22) updateDNA();
  if(currentEffect===23) updateSaturn();
  if(currentEffect===24) updateFluid();
  if(currentEffect===31) updateRasengan();

  drawHoly();
  drawPulses();
  updateRipples();
  updateNebula();
  updateCrystals();
  updatePixelDecay();
  updateSacredGeo();
  drawSlash();
  renderParticles();
  drawFlash();

  ctx.restore();
}

// ===== EVENTS =====
wrap.addEventListener('mousemove',e=>{
  const r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  crosshair.style.left=mx+'px';
  crosshair.style.top=my+'px';
  // continuous fire
  if(currentEffect===4 && e.buttons===1) spawnPhoenix(mx,my);
  if(currentEffect===6 && Math.random()<0.3) spawnRainSplash(mx,my,3);
  // rasengan follow cursor while charging
  if(currentEffect===31 && !rasengan.fired) { rasengan.x=mx; rasengan.y=my; }
});

wrap.addEventListener('mousedown',e=>{
  if(currentEffect!==31) return;
  if(rasengan.fired) return;
  const r=wrap.getBoundingClientRect();
  rasengan.active=true;
  rasengan.fired=false;
  rasengan.charge=0;
  rasengan.x=e.clientX-r.left;
  rasengan.y=e.clientY-r.top;
  rasengan.trail=[];
});

wrap.addEventListener('mouseup',e=>{
  if(currentEffect!==31) return;
  if(!rasengan.active||rasengan.fired) return;
  const r=wrap.getBoundingClientRect();
  const tx=e.clientX-r.left, ty=e.clientY-r.top;
  // fire in the direction the user released (away from center as default)
  const dx=tx-W/2, dy=ty-H/2;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  rasengan.vx=(dx/dist)*14;
  rasengan.vy=(dy/dist)*14;
  rasengan.ballX=rasengan.x; rasengan.ballY=rasengan.y;
  rasengan.fired=true; rasengan.life=1; rasengan.trail=[];
});

wrap.addEventListener('click',e=>{
  const r=wrap.getBoundingClientRect();
  handleClick(e.clientX-r.left, e.clientY-r.top);
});

wrap.addEventListener('mouseleave',()=>{ crosshair.style.display='none'; });
wrap.addEventListener('mouseenter',()=>{ if(currentEffect) crosshair.style.display='block'; });

loop();
</script>
