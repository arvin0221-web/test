<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>鐵血騎士 IRONCLAD — 3A Boss Showcase</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;
  font-family:'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#canvas{display:block;margin:0 auto;image-rendering:crisp-edges}

/* ── HP BAR ──────────────────────────────────────────────────────────────── */
#hud{position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;padding:10px 14px 0;z-index:200;pointer-events:none}
#bossName{
  color:#f0c040;font-size:11px;font-weight:900;letter-spacing:3px;text-align:center;
  text-shadow:0 0 16px rgba(255,150,0,.95),0 0 32px rgba(255,80,0,.5),0 2px 0 rgba(0,0,0,.8);
  margin-bottom:5px;
}
#hpWrap{
  width:100%;height:16px;
  background:linear-gradient(180deg,rgba(0,0,0,.8),rgba(10,5,0,.9));
  border:2px solid rgba(255,140,0,.6);border-radius:9px;overflow:hidden;
  box-shadow:0 0 18px rgba(255,90,0,.5),inset 0 2px 6px rgba(0,0,0,.7),
             inset 0 -1px 3px rgba(255,150,0,.15);
  position:relative;
}
#hpFill{
  height:100%;width:100%;border-radius:7px;
  background:linear-gradient(90deg,
    #b50000 0%,#e83000 18%,#ff5500 36%,#ff8800 54%,#ffaa00 72%,#ffcc00 88%,#ffe040 100%);
  transition:width .6s cubic-bezier(.25,.46,.45,.94);
  box-shadow:0 0 14px rgba(255,100,0,.9),inset 0 1px 0 rgba(255,255,200,.3);
  position:relative;overflow:hidden;
}
#hpFill::after{
  content:'';position:absolute;top:0;left:-120%;width:80%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  animation:hpShine 3s infinite ease-in-out;
}
@keyframes hpShine{0%{left:-120%}100%{left:180%}}
#hpText{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#fff;font-size:9px;font-weight:900;letter-spacing:1px;
  text-shadow:0 1px 3px rgba(0,0,0,.9);z-index:2;
}

/* ── SKILL UI ────────────────────────────────────────────────────────────── */
#skillBar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;padding:8px 6px 14px;
  display:flex;gap:5px;justify-content:center;align-items:flex-end;
  background:linear-gradient(transparent,rgba(0,0,0,.96));
  z-index:200;
}
.skillBtn{
  position:relative;flex:1;height:68px;
  border-radius:11px;overflow:hidden;cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
  background:linear-gradient(165deg,rgba(18,12,2,.97),rgba(45,28,5,.97));
  border:2px solid rgba(255,190,60,.60);
  box-shadow:0 0 14px rgba(255,150,0,.28),
             inset 0 1px 0 rgba(255,220,100,.12),
             inset 0 -1px 0 rgba(0,0,0,.5);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  transition:border-color .18s,transform .08s,box-shadow .18s;
}
.skillBtn:active:not(.onCD){
  transform:scale(.94);
  box-shadow:0 0 24px rgba(255,180,0,.65),inset 0 0 12px rgba(255,150,0,.2);
}
.skillBtn.onCD{
  cursor:not-allowed;
  border-color:rgba(100,72,18,.4);
  box-shadow:none;
}
.skillBtn .icon{font-size:20px;line-height:1;
  filter:drop-shadow(0 0 5px rgba(255,200,50,.7))}
.skillBtn.onCD .icon{filter:none;opacity:.4}
.skillBtn .label{
  color:#f0c040;font-size:7.5px;font-weight:800;letter-spacing:.4px;
  text-shadow:0 0 8px rgba(255,180,0,.7);
}
.skillBtn.onCD .label{color:rgba(140,105,20,.5);text-shadow:none}
.cdOverlay{
  position:absolute;left:0;bottom:0;width:100%;height:0;
  background:rgba(0,0,0,.78);pointer-events:none;transition:none;
}
.cdNum{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:16px;font-weight:900;color:#fff;
  text-shadow:0 0 12px rgba(255,200,100,.9);
  pointer-events:none;display:none;
}
.skillBtn.onCD .cdNum{display:block}
/* Hover glow (desktop) */
.skillBtn:not(.onCD):hover{
  border-color:rgba(255,220,80,.88);
  box-shadow:0 0 22px rgba(255,180,0,.6),
             inset 0 0 16px rgba(255,150,0,.15);
}
/* Skill key background pattern */
.skillBtn::before{
  content:'';position:absolute;inset:0;opacity:.06;
  background:repeating-linear-gradient(
    45deg,transparent,transparent 3px,rgba(255,200,50,.4) 3px,rgba(255,200,50,.4) 4px);
}

/* ── STATE LABEL ─────────────────────────────────────────────────────────── */
#stateLabel{
  position:fixed;top:46px;left:50%;transform:translateX(-50%);
  color:rgba(255,200,80,.5);font-size:9px;font-weight:700;letter-spacing:2px;
  text-shadow:0 0 10px rgba(255,150,0,.35);z-index:200;pointer-events:none;
  transition:opacity .3s;
}

/* ── SKILL FLASH OVERLAY ─────────────────────────────────────────────────── */
#flashOverlay{
  position:fixed;inset:0;pointer-events:none;z-index:150;
  background:rgba(255,255,255,0);transition:background .05s;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div id="bossName">⚔ &nbsp; 鐵血騎士 &nbsp; IRONCLAD &nbsp; ⚔</div>
  <div id="hpWrap">
    <div id="hpFill"></div>
    <div id="hpText">100%</div>
  </div>
</div>
<div id="stateLabel">— IDLE —</div>
<div id="flashOverlay"></div>

<div id="skillBar">
  <button class="skillBtn" id="btn0" onclick="castSkill(0)">
    <span class="icon">🛡</span><span class="label">持盾衝刺</span>
    <div class="cdOverlay" id="cdo0"></div><div class="cdNum" id="cdn0"></div>
  </button>
  <button class="skillBtn" id="btn1" onclick="castSkill(1)">
    <span class="icon">⚔</span><span class="label">長矛橫掃</span>
    <div class="cdOverlay" id="cdo1"></div><div class="cdNum" id="cdn1"></div>
  </button>
  <button class="skillBtn" id="btn2" onclick="castSkill(2)">
    <span class="icon">🗡</span><span class="label">長矛直刺</span>
    <div class="cdOverlay" id="cdo2"></div><div class="cdNum" id="cdn2"></div>
  </button>
  <button class="skillBtn" id="btn3" onclick="castSkill(3)">
    <span class="icon">☄</span><span class="label">飛天大操</span>
    <div class="cdOverlay" id="cdo3"></div><div class="cdNum" id="cdn3"></div>
  </button>
  <button class="skillBtn" id="btn4" onclick="castSkill(4)">
    <span class="icon">✨</span><span class="label">回血法陣</span>
    <div class="cdOverlay" id="cdo4"></div><div class="cdNum" id="cdn4"></div>
  </button>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════════════════════════
const CV = document.getElementById('canvas');
const G  = CV.getContext('2d');
let W, H, GY;
function resize(){
  W = CV.width  = Math.min(window.innerWidth, 480);
  H = CV.height = window.innerHeight - 88;
  GY = Math.floor(H * 0.71);
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════════════════════════════════════
let T = 0, DT = 0, LAST = performance.now();
const PI = Math.PI, TAU = Math.PI*2;
const sin=Math.sin,cos=Math.cos,abs=Math.abs,sqrt=Math.sqrt,
      floor=Math.floor,round=Math.round,max=Math.max,min=Math.min,
      pow=Math.pow,atan2=Math.atan2;

// ═══════════════════════════════════════════════════════════════════════════════
//  MATH
// ═══════════════════════════════════════════════════════════════════════════════
const lp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>v<lo?lo:v>hi?hi:v;
const eo3=(t)=>1-pow(1-t,3);
const ei3=(t)=>t*t*t;
const eio=(t)=>t<.5?4*t*t*t:1-pow(-2*t+2,3)/2;
const eoBack=(t)=>{const c=1.70158,c3=c+1;return 1+c3*pow(t-1,3)+c*pow(t-1,2);};
const dist=(ax,ay,bx,by)=>sqrt((bx-ax)**2+(by-ay)**2);

// Rounded rect path
function RR(x,y,w,h,r){
  G.beginPath();
  G.moveTo(x+r,y); G.lineTo(x+w-r,y); G.quadraticCurveTo(x+w,y,x+w,y+r);
  G.lineTo(x+w,y+h-r); G.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  G.lineTo(x+r,y+h); G.quadraticCurveTo(x,y+h,x,y+h-r);
  G.lineTo(x,y+r); G.quadraticCurveTo(x,y,x+r,y);
  G.closePath();
}

// Draw a limb: trapezoid from (ax,ay)→(bx,by) with widths wA,wB
// Returns normal vector (left side of direction)
function LIMB(ax,ay,bx,by,wA,wB,fill,stroke,sw){
  const dx=bx-ax,dy=by-ay,len=sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len,ny=dx/len;
  G.beginPath();
  G.moveTo(ax+nx*wA,ay+ny*wA); G.lineTo(bx+nx*wB,by+ny*wB);
  G.lineTo(bx-nx*wB,by-ny*wB); G.lineTo(ax-nx*wA,ay-ny*wA);
  G.closePath();
  if(fill){G.fillStyle=fill;G.fill();}
  if(stroke){G.strokeStyle=stroke;G.lineWidth=sw||1.8;G.stroke();}
  return {nx,ny,len};
}

// Side-lit gradient across a limb
function LG(ax,ay,bx,by,wA,hi,mid,dark){
  const dx=bx-ax,dy=by-ay,len=sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len*wA,ny=dx/len*wA;
  const gr=G.createLinearGradient(ax+nx,ay+ny,ax-nx,ay-ny);
  gr.addColorStop(0,dark); gr.addColorStop(.10,hi);
  gr.addColorStop(.45,mid); gr.addColorStop(.80,dark); gr.addColorStop(1,dark);
  return gr;
}

// Gold decorative band
function GOLDBAND(cx,cy,ang,hw,hh,b){
  G.save(); G.translate(cx,cy); G.rotate(ang);
  const br=b||1;
  const gr=G.createLinearGradient(-hw,-hh,hw,hh);
  gr.addColorStop(0,  `rgba(${round(70*br)},${round(50*br)},0,.55)`);
  gr.addColorStop(.28,`rgba(${round(200*br)},${round(155*br)},${round(18*br)},1)`);
  gr.addColorStop(.52,`rgba(${round(255*br)},${round(215*br)},${round(65*br)},1)`);
  gr.addColorStop(.75,`rgba(${round(200*br)},${round(155*br)},${round(18*br)},1)`);
  gr.addColorStop(1,  `rgba(${round(70*br)},${round(50*br)},0,.55)`);
  G.fillStyle=gr; RR(-hw,-hh,hw*2,hh*2,min(hw,hh)*.35); G.fill();
  G.restore();
}

// Rivet
function RIVET(x,y,r){
  const rg=G.createRadialGradient(x-r*.3,y-r*.35,0,x,y,r);
  rg.addColorStop(0,'#fffac0'); rg.addColorStop(.45,'#c8a020'); rg.addColorStop(1,'#4a2e00');
  G.fillStyle=rg; G.beginPath(); G.arc(x,y,r,0,TAU); G.fill();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SCREEN SHAKE (trauma model)
// ═══════════════════════════════════════════════════════════════════════════════
let TRAUMA=0, SHK_X=0, SHK_Y=0;
function addTrauma(v){TRAUMA=min(1,TRAUMA+v);}
function tickShake(){
  TRAUMA=max(0,TRAUMA-DT*.0015);
  const s2=TRAUMA*TRAUMA;
  SHK_X=s2<.001?0:30*s2*(Math.random()-.5)*2;
  SHK_Y=s2<.001?0:30*s2*(Math.random()-.5)*2;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SCREEN FLASH
// ═══════════════════════════════════════════════════════════════════════════════
let FLASH_LIFE=0;
function flashScreen(dur,col){
  const el=document.getElementById('flashOverlay');
  el.style.background=col||'rgba(255,255,255,.18)';
  FLASH_LIFE=dur;
}
function tickFlash(){
  if(FLASH_LIFE>0){
    FLASH_LIFE-=DT;
    if(FLASH_LIFE<=0){document.getElementById('flashOverlay').style.background='rgba(255,255,255,0)';}
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  PARTICLE POOL  (1500 slots, no GC)
// ═══════════════════════════════════════════════════════════════════════════════
const PMAX=1500;
const PA=new Float32Array(PMAX); // x
const PB=new Float32Array(PMAX); // y
const PC=new Float32Array(PMAX); // vx
const PD=new Float32Array(PMAX); // vy
const PE=new Float32Array(PMAX); // life
const PF=new Float32Array(PMAX); // maxLife
const PG=new Float32Array(PMAX); // radius
const PH=new Float32Array(PMAX); // gravity
const PI2=new Float32Array(PMAX);// alpha multiplier
const PJ=new Float32Array(PMAX); // shrink
const PCOL=new Array(PMAX).fill(null); // color string
const PGLOW=new Array(PMAX).fill(null);// glow color
const PACTIVE=new Uint8Array(PMAX);
let PHEAD=0;

function spawnP(x,y,vx,vy,life,r,col,glow,grav,shrink,alpha){
  // find free slot
  let idx=-1;
  for(let i=0;i<PMAX;i++){const s=(PHEAD+i)%PMAX;if(!PACTIVE[s]){idx=s;break;}}
  if(idx<0){idx=PHEAD%PMAX;} // overwrite oldest
  PHEAD=(idx+1)%PMAX;
  PA[idx]=x; PB[idx]=y; PC[idx]=vx; PD[idx]=vy;
  PE[idx]=life; PF[idx]=life; PG[idx]=r;
  PH[idx]=grav||0; PI2[idx]=alpha||1; PJ[idx]=shrink||1;
  PCOL[idx]=col; PGLOW[idx]=glow||null;
  PACTIVE[idx]=1;
}

function burst(x,y,n,s0,s1,life,rMin,rMax,cols,glow,grav){
  for(let i=0;i<n;i++){
    const a=Math.random()*TAU, s=s0+Math.random()*(s1-s0);
    spawnP(x,y,cos(a)*s,sin(a)*s,life+Math.random()*life*.55,
      rMin+Math.random()*(rMax-rMin),cols[floor(Math.random()*cols.length)],glow,grav||.13,.97);
  }
}
function spawnSparks(x,y,n,spd,col,life){
  for(let i=0;i<n;i++){
    const a=Math.random()*TAU;
    spawnP(x,y,cos(a)*spd*(0.4+Math.random()*.6),sin(a)*spd*(0.4+Math.random()*.6),
      (life||220)+Math.random()*160,1.2+Math.random()*2.2,col||'#fff',col||'rgba(255,255,200,.8)',.12,.93);
  }
}
function spawnDust(x,y,dirX,n){
  for(let i=0;i<n;i++)
    spawnP(x+(Math.random()-.5)*16,y,dirX*(1.2+Math.random()*5),-(Math.random()*1.6+.3),
      260+Math.random()*320,1.8+Math.random()*3.2,
      `hsl(${22+floor(Math.random()*14)},38%,${32+floor(Math.random()*18)}%)`,null,.07);
}
function spawnEmber(x,y,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*TAU,s=1+Math.random()*3;
    spawnP(x,y,cos(a)*s,sin(a)*s-1,500+Math.random()*500,1+Math.random()*2.5,
      Math.random()<.5?'#ff6600':'#ffaa00','rgba(255,120,0,.6)',.05,.96);
  }
}

function tickParticles(){
  const dts=DT/16;
  for(let i=0;i<PMAX;i++){
    if(!PACTIVE[i])continue;
    PE[i]-=DT;
    if(PE[i]<=0){PACTIVE[i]=0;continue;}
    PA[i]+=PC[i]*dts; PB[i]+=PD[i]*dts;
    PD[i]+=PH[i]*dts;
    PC[i]*=.993; PD[i]*=.993;
  }
}
function drawParticles(){
  for(let i=0;i<PMAX;i++){
    if(!PACTIVE[i])continue;
    const fa=PE[i]/PF[i];
    const r=max(.18,PG[i]*(PJ[i]*(fa*.65+.35)));
    G.globalAlpha=fa*PI2[i];
    if(PGLOW[i]){G.shadowBlur=11;G.shadowColor=PGLOW[i];}
    G.fillStyle=PCOL[i];
    G.beginPath();G.arc(PA[i],PB[i],r,0,TAU);G.fill();
    if(PGLOW[i])G.shadowBlur=0;
  }
  G.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  EFFECTS  (shockwaves, cracks, orbs, ghosts, sweep arc, warn, meteor, heal)
// ═══════════════════════════════════════════════════════════════════════════════
const WAVES=[];
function spawnWave(x,y,maxR,col,dur,lw){WAVES.push({x,y,r:0,maxR,col,life:dur,ml:dur,lw:lw||5.5});}
function tickWaves(){for(let i=WAVES.length-1;i>=0;i--)if((WAVES[i].life-=DT)<=0)WAVES.splice(i,1);}
function drawWaves(){
  for(const w of WAVES){
    const a=w.life/w.ml; w.r=w.maxR*(1-a);
    G.strokeStyle=w.col+(a*.88)+')'; G.lineWidth=w.lw*a;
    G.shadowBlur=28; G.shadowColor=w.col+'.9)';
    G.beginPath();G.arc(w.x,w.y,w.r,0,TAU);G.stroke();G.shadowBlur=0;
  }
}

// ─── CRACKS ───────────────────────────────────────────────────────────────────
const CRACKS=[];
function spawnCracks(cx,cy,n){
  for(let i=0;i<n;i++){
    const ang=(i/n)*TAU+(Math.random()-.5)*.55;
    const tlen=52+Math.random()*115;
    const pts=[{x:cx,y:cy}];
    let bx=cx,by=cy,ba=ang;
    for(let s=0;s<4+floor(Math.random()*4);s++){
      const sl=(tlen/(4+Math.random()*3))*(.55+Math.random()*.9);
      bx+=cos(ba)*sl; by+=sin(ba)*sl; pts.push({x:bx,y:by});
      ba+=(Math.random()-.5)*.82;
      // branch
      if(Math.random()<.45){
        const bp=[{x:bx,y:by}];
        let bbx=bx,bby=by,bba=ba+(Math.random()-.5)*1.3;
        for(let ss=0;ss<2;ss++){
          const bsl=sl*(.3+Math.random()*.4);
          bbx+=cos(bba)*bsl; bby+=sin(bba)*bsl;
          bp.push({x:bbx,y:bby}); bba+=(Math.random()-.5)*.65;
        }
        CRACKS.push({pts:bp,life:4000,ml:4000,w:.7+Math.random()*1.4,branch:true});
      }
    }
    CRACKS.push({pts,life:4800,ml:4800,w:1.7+Math.random()*3.0,branch:false});
  }
}
function tickCracks(){for(let i=CRACKS.length-1;i>=0;i--)if((CRACKS[i].life-=DT)<=0)CRACKS.splice(i,1);}
function drawCracks(){
  for(const c of CRACKS){
    const a=min(1,c.life/c.ml*3.4);
    // dark body
    G.shadowBlur=18; G.shadowColor=`rgba(255,90,0,${a*.88})`;
    G.strokeStyle=`rgba(8,4,0,${a})`; G.lineWidth=c.w*(c.branch?.50:1)*a;
    G.beginPath();G.moveTo(c.pts[0].x,c.pts[0].y);
    for(let p=1;p<c.pts.length;p++)G.lineTo(c.pts[p].x,c.pts[p].y);G.stroke();
    // lava glow
    const lr=round(75+55*sin(T*3.4));
    G.strokeStyle=`rgba(255,${lr},0,${a*.76})`; G.lineWidth=c.w*(c.branch?.22:.44)*a;
    G.shadowColor=`rgba(255,80,0,${a})`; G.shadowBlur=26;
    G.beginPath();G.moveTo(c.pts[0].x,c.pts[0].y);
    for(let p=1;p<c.pts.length;p++)G.lineTo(c.pts[p].x,c.pts[p].y);G.stroke();G.shadowBlur=0;
  }
}

// ─── HEAL ORBS ────────────────────────────────────────────────────────────────
const ORBS=[];
function spawnOrb(x,y,sz){
  ORBS.push({x,y,vx:(Math.random()-.5)*1.6,vy:-(1.2+Math.random()*2.6),
    life:1500+Math.random()*900,ml:2300,r:sz||(2.2+Math.random()*3.8),
    hue:118+floor(Math.random()*45),ph:Math.random()*TAU});
}
function tickOrbs(){for(let i=ORBS.length-1;i>=0;i--)if((ORBS[i].life-=DT)<=0)ORBS.splice(i,1);}
function drawOrbs(){
  for(const o of ORBS){
    o.x+=(o.vx+sin(T*3.3+o.ph)*.55)*(DT/16);
    o.y+=o.vy*(DT/16); o.vy*=.997;
    const fa=o.life/o.ml, pulse=sin(T*4.2+o.ph)*.2+.8;
    G.globalAlpha=fa*pulse;
    // aura
    const ag=G.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*3.2);
    ag.addColorStop(0,`hsla(${o.hue},100%,68%,.72)`);
    ag.addColorStop(.6,`hsla(${o.hue},90%,52%,.22)`);
    ag.addColorStop(1,'rgba(0,180,60,0)');
    G.fillStyle=ag;G.beginPath();G.arc(o.x,o.y,o.r*3.2,0,TAU);G.fill();
    // core
    G.shadowBlur=18;G.shadowColor=`hsla(${o.hue},100%,65%,.9)`;
    G.fillStyle=`hsla(${o.hue},100%,72%,1)`;G.beginPath();G.arc(o.x,o.y,o.r,0,TAU);G.fill();

  }

}

// ─── GHOSTS ───────────────────────────────────────────────────────────────────
const GHOSTS=[];
function drawGhosts(){
  for(let i=GHOSTS.length-1;i>=0;i--){
    const gh=GHOSTS[i]; gh.life-=DT;
    if(gh.life<=0){GHOSTS.splice(i,1);continue;}
    const a=(gh.life/gh.ml)*.52;

    G.shadowBlur=30;G.shadowColor='rgba(0,180,255,.92)';
    G.strokeStyle=`rgba(55,185,255,${a})`;G.lineCap='round';
    const GL=(p,q,w)=>{if(!p||!q)return;G.lineWidth=w;G.beginPath();G.moveTo(p.x,p.y);G.lineTo(q.x,q.y);G.stroke();};
    GL(D.pel,D.spH,22);GL(D.spH,D.nk,16);
    G.fillStyle=`rgba(55,185,255,${a*.94})`;
    if(D.nk){G.beginPath();G.arc(D.nk.x,D.nk.y,26,0,TAU);G.fill();}
    GL(D.spH,D.lEl,14);GL(D.lEl,D.lWr,12);
    GL(D.spH,D.rEl,14);GL(D.rEl,D.rWr,12);
    GL(D.rWr,D.spM,10);GL(D.spM,D.spT,7);
    GL(D.pel,D.lKn,17);GL(D.lKn,D.lAn,14);GL(D.lAn,D.lTe,10);
    GL(D.pel,D.rKn,17);GL(D.rKn,D.rAn,14);GL(D.rAn,D.rTe,10);

    G.shadowBlur=0;G.lineCap='butt';G.restore();
  }
  G.globalAlpha=1;
}

// ─── SWEEP ARC ────────────────────────────────────────────────────────────────
let SARC=null;
function spawnSweepArc(cx,cy,r,a0,a1,dur){SARC={cx,cy,r,a0,a1,life:dur,ml:dur,prog:0};}
function drawSweepArc(){
  if(!SARC)return; SARC.life-=DT;
  if(SARC.life<=0){SARC=null;return;}
  const a=SARC.life/SARC.ml;
  const cEnd=SARC.a0+(SARC.a1-SARC.a0)*min(1,SARC.prog);
  for(let i=0;i<30;i++){
    const fi=i/30,fa=max(0,(1-fi)*a*.95);
    const sa=SARC.a0+(cEnd-SARC.a0)*fi;
    const ea=SARC.a0+(cEnd-SARC.a0)*(fi+.048);
    const hue=round(48-fi*22);
    G.strokeStyle=`hsla(${hue},100%,62%,${fa})`;
    G.lineWidth=(30-i*.62)*a;
    G.shadowBlur=28;G.shadowColor='rgba(255,180,0,.92)';
    G.beginPath();G.arc(SARC.cx,SARC.cy,SARC.r,sa,ea);G.stroke();
  }
  G.shadowBlur=0;
  if(Math.random()<.8)
    spawnP(SARC.cx+cos(cEnd)*SARC.r,SARC.cy+sin(cEnd)*SARC.r,
      (Math.random()-.5)*8,-(Math.random()*8+2),310+Math.random()*380,
      2+Math.random()*4,'#ffcc00','rgba(255,200,0,.92)',.10);
}

// ─── WARNING CIRCLE ───────────────────────────────────────────────────────────
let WARN=null;

  const a=abs(sin(T*13))*(WARN.life/WARN.ml);

  G.strokeStyle=`rgba(255,0,0,${a*p})`;G.lineWidth=6;
  G.setLineDash([16,9]);G.beginPath();G.arc(WARN.x,WARN.y,WARN.r,0,TAU);G.stroke();
  G.setLineDash([]);
  G.strokeStyle=`rgba(255,60,0,${a*.78})`;G.lineWidth=2.8;
  G.beginPath();G.moveTo(WARN.x-WARN.r,WARN.y);G.lineTo(WARN.x+WARN.r,WARN.y);G.stroke();
  G.beginPath();G.moveTo(WARN.x,WARN.y-WARN.r);G.lineTo(WARN.x,WARN.y+WARN.r);G.stroke();
  for(let i=0;i<4;i++){
    const da=(i/4)*TAU+T*1.6;

}

// ─── HEAL CIRCLE ─────────────────────────────────────────────────────────────
let HC={active:false,x:0,y:0,life:0,angle:0};
function drawHealCircle(){
  if(!HC.active)return; HC.life-=DT; HC.angle+=.029*(DT/16);
  if(HC.life<=0){HC.active=false;return;}
  const cx=HC.x,cy=HC.y,ang=HC.angle;
  const a=min(1,HC.life/500);
  const r1=68,r2=100,r3=132;
  G.save();G.globalAlpha=a;
  // outer rings
  G.shadowBlur=44;G.shadowColor='rgba(0,255,80,.94)';
  G.strokeStyle=`rgba(0,255,100,${a*.86})`;G.lineWidth=4.2;
  G.beginPath();G.arc(cx,cy,r3,0,TAU);G.stroke();
  G.beginPath();G.arc(cx,cy,r1,0,TAU);G.stroke();
  G.setLineDash([10,7]);G.strokeStyle=`rgba(0,220,80,${a*.58})`;G.lineWidth=2.4;
  G.beginPath();G.arc(cx,cy,(r1+r3)/2,0,TAU);G.stroke();G.setLineDash([]);
  // 20 outer rune glyphs
  G.save();G.translate(cx,cy);G.rotate(ang*.56);
  for(let i=0;i<20;i++){
    const ra=(i/20)*TAU;
    G.save();G.translate(cos(ra)*r2,sin(ra)*r2);G.rotate(ra+ang);
    G.strokeStyle=`rgba(0,245,108,${a*.96})`;G.lineWidth=2.5;
    G.shadowBlur=16;G.shadowColor='rgba(0,255,80,.9)';
    G.beginPath();G.moveTo(-8,0);G.lineTo(8,0);G.stroke();
    G.beginPath();G.moveTo(0,-11);G.lineTo(0,11);G.stroke();
    G.beginPath();G.moveTo(-7,-7);G.lineTo(7,7);G.stroke();
    G.beginPath();G.moveTo(-7,7);G.lineTo(7,-7);G.stroke();
    G.restore();
  }G.restore();
  // hexagram
  G.save();G.translate(cx,cy);G.rotate(-ang*.86);
  G.strokeStyle=`rgba(0,255,80,${a*.94})`;G.lineWidth=3;
  G.shadowBlur=24;G.shadowColor='rgba(0,255,100,.95)';
  for(let i=0;i<6;i++){const a1=(i/6)*TAU,a2=((i+2)/6)*TAU;
    G.beginPath();G.moveTo(cos(a1)*r1,sin(a1)*r1);G.lineTo(cos(a2)*r1,sin(a2)*r1);G.stroke();}
  G.restore();
  // pentagon
  G.save();G.translate(cx,cy);G.rotate(ang*1.38);
  G.strokeStyle=`rgba(160,255,160,${a*.76})`;G.lineWidth=2.5;
  G.beginPath();
  for(let i=0;i<5;i++){const a2=(i/5)*TAU-PI/2;
    i===0?G.moveTo(cos(a2)*r1*.52,sin(a2)*r1*.52):G.lineTo(cos(a2)*r1*.52,sin(a2)*r1*.52);}
  G.closePath();G.stroke();G.restore();
  // 40 spokes
  for(let i=0;i<40;i++){
    const a2=(i/40)*TAU+ang*.40;
    G.strokeStyle=`rgba(0,255,80,${a*(.18+.18*abs(sin(a2*3+T*4.5)))})`;G.lineWidth=1;
    G.beginPath();G.moveTo(cx+cos(a2)*r1,cy+sin(a2)*r1);G.lineTo(cx+cos(a2)*r3,cy+sin(a2)*r3);G.stroke();
  }
  // center fill
  const cg=G.createRadialGradient(cx,cy,0,cx,cy,r1);
  cg.addColorStop(0,`rgba(0,255,80,${a*.30})`);cg.addColorStop(.5,`rgba(0,210,60,${a*.12})`);cg.addColorStop(1,'rgba(0,255,80,0)');
  G.fillStyle=cg;G.beginPath();G.arc(cx,cy,r1,0,TAU);G.fill();
  G.shadowBlur=0;G.restore();
}

// ─── THRUST FLASH ─────────────────────────────────────────────────────────────
let TF={active:false,x:0,y:0,maxR:90,life:0,ml:400};

// ═══════════════════════════════════════════════════════════════════════════════
//  COOLDOWN SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
const CD_DUR=[4200,5800,3800,9500,7500];
let cdLeft=[0,0,0,0,0],cdTotal=[0,0,0,0,0];
let HP=100,HP_TGT=100;

function tickCD(){
  for(let i=0;i<5;i++){
    if(cdLeft[i]>0){
      cdLeft[i]-=DT;
      if(cdLeft[i]<=0){
        cdLeft[i]=0;
        document.getElementById('btn'+i).classList.remove('onCD');
        document.getElementById('cdo'+i).style.height='0%';
        document.getElementById('cdn'+i).textContent='';
      } else {
        const pct=(cdLeft[i]/cdTotal[i]*100);
        document.getElementById('cdo'+i).style.height=pct+'%';
        document.getElementById('cdn'+i).textContent=(cdLeft[i]/1000).toFixed(1);
      }
    }
  }
  HP=lp(HP,HP_TGT,DT*.009);
  const hpEl=document.getElementById('hpFill');
  const hpTx=document.getElementById('hpText');
  const pct=clamp(HP,0,100);
  hpEl.style.width=pct+'%';
  hpTx.textContent=round(pct)+'%';
}

function castSkill(i){
  if(cdLeft[i]>0||KN.state!=='idle')return;
  cdLeft[i]=cdTotal[i]=CD_DUR[i];
  document.getElementById('btn'+i).classList.add('onCD');
  [startDash,startSweep,startThrust,startMeteor,startHeal][i]();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  BACKGROUND ENVIRONMENT
// ═══════════════════════════════════════════════════════════════════════════════
const STARS_DATA=Array.from({length:120},()=>({
  x:Math.random(),y:Math.random()*.68,
  r:Math.random()*1.9+.22,tw:Math.random()*TAU,spd:Math.random()*.9+.15,
  hue:floor(Math.random()*60+200),sat:floor(Math.random()*30+60),
}));
const CLOUDS_DATA=Array.from({length:7},()=>({
  x:Math.random(),y:Math.random()*.42+.01,
  w:Math.random()*220+95,h:Math.random()*55+18,
  spd:Math.random()*.000048+.000015,
  alpha:Math.random()*.21+.04,
  hue:floor(Math.random()*40+255),
}));
// Pre-generate mountain silhouette
const MNTS=[];
(()=>{let mx=0;while(mx<520){const pw=32+Math.random()*65;MNTS.push({x:mx,w:pw,h:GY*.16+Math.random()*GY*.30});mx+=pw*.65+Math.random()*22;}})();
// Floating embers
const EMBERS_DATA=Array.from({length:35},()=>({
  x:Math.random(),y:Math.random()*.72+.15,r:Math.random()*2.2+.45,
  vx:(Math.random()-.5)*.0022,vy:-Math.random()*.0012-.00018,
  lf:Math.random()*TAU,hue:floor(Math.random()*32+8),
}));

function drawBackground(){
  // Sky gradient
  const sky=G.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,'#010008');sky.addColorStop(.32,'#0c0422');
  sky.addColorStop(.68,'#1c0730');sky.addColorStop(1,'#280818');
  G.fillStyle=sky;G.fillRect(0,0,W,GY);
  // Nebula blobs
  const n1=G.createRadialGradient(W*.26,GY*.36,5,W*.26,GY*.36,W*.50);
  n1.addColorStop(0,'rgba(55,0,95,.24)');n1.addColorStop(1,'rgba(0,0,0,0)');
  G.fillStyle=n1;G.fillRect(0,0,W,GY);
  const n2=G.createRadialGradient(W*.78,GY*.52,5,W*.78,GY*.52,W*.40);
  n2.addColorStop(0,'rgba(80,8,55,.20)');n2.addColorStop(1,'rgba(0,0,0,0)');
  G.fillStyle=n2;G.fillRect(0,0,W,GY);
  const n3=G.createRadialGradient(W*.52,GY*.22,5,W*.52,GY*.22,W*.30);
  n3.addColorStop(0,'rgba(20,0,80,.14)');n3.addColorStop(1,'rgba(0,0,0,0)');
  G.fillStyle=n3;G.fillRect(0,0,W,GY);
  // Stars
  for(const s of STARS_DATA){
    s.tw+=s.spd*.026;
    const a=.22+.78*abs(sin(s.tw));
    if(s.r>1.4){G.shadowBlur=10;G.shadowColor=`hsl(${s.hue},${s.sat}%,82%)`;}
    G.fillStyle=`hsla(${s.hue},${s.sat}%,88%,${a})`;
    G.beginPath();G.arc(s.x*W,s.y*GY,s.r,0,TAU);G.fill();
    G.shadowBlur=0;
  }
  // Moon
  const moonX=W*.84,moonY=GY*.13,moonR=24;
  const mg1=G.createRadialGradient(moonX,moonY,0,moonX,moonY,moonR*4);
  mg1.addColorStop(0,'rgba(200,180,255,.22)');mg1.addColorStop(1,'rgba(0,0,0,0)');
  G.fillStyle=mg1;G.fillRect(moonX-moonR*4,moonY-moonR*4,moonR*8,moonR*8);
  const mg2=G.createRadialGradient(moonX-moonR*.32,moonY-moonR*.32,1,moonX,moonY,moonR);
  mg2.addColorStop(0,'#f2ecff');mg2.addColorStop(.55,'#cbb8f4');mg2.addColorStop(1,'#8060c0');
  G.fillStyle=mg2;G.beginPath();G.arc(moonX,moonY,moonR,0,TAU);G.fill();
  G.fillStyle='rgba(0,0,0,.36)';G.beginPath();G.arc(moonX+moonR*.32,moonY-moonR*.10,moonR*.90,0,TAU);G.fill();
  // Clouds
  for(const c of CLOUDS_DATA){
    c.x+=c.spd;if(c.x>1.32)c.x=-0.30;
    const cg=G.createRadialGradient(c.x*W,c.y*GY,0,c.x*W,c.y*GY,c.w/2);
    cg.addColorStop(0,`hsla(${c.hue},60%,55%,${c.alpha})`);
    cg.addColorStop(.52,`hsla(${c.hue},44%,34%,${c.alpha*.52})`);
    cg.addColorStop(1,'rgba(0,0,0,0)');
    G.fillStyle=cg;G.beginPath();G.ellipse(c.x*W,c.y*GY,c.w/2,c.h/2,0,0,TAU);G.fill();
  }
  // Mountain silhouette
  G.fillStyle='rgba(6,2,16,.88)';
  G.beginPath();G.moveTo(0,GY);
  for(const m of MNTS){
    G.lineTo(m.x,GY-m.h*.38);
    G.quadraticCurveTo(m.x+m.w*.5,GY-m.h,m.x+m.w,GY-m.h*.32);
  }
  G.lineTo(W+60,GY);G.closePath();G.fill();
  // Embers
  for(const e of EMBERS_DATA){
    e.x+=e.vx;e.y+=e.vy;e.lf+=.022;
    if(e.x<0)e.x=1;if(e.x>1)e.x=0;if(e.y<0){e.y=.95;e.x=Math.random();}
    const ea=(.38+.62*abs(sin(e.lf)))*(.55+.45*e.y);
    G.shadowBlur=7;G.shadowColor=`hsl(${e.hue},98%,60%)`;
    G.fillStyle=`hsla(${e.hue},98%,65%,${ea})`;
    G.beginPath();G.arc(e.x*W,e.y*GY,e.r,0,TAU);G.fill();G.shadowBlur=0;
  }
}

function drawGround(){
  // Sub-surface lava glow
  const sub=G.createLinearGradient(0,GY-12,0,GY+50);
  sub.addColorStop(0,'rgba(255,70,0,.07)');sub.addColorStop(1,'rgba(0,0,0,0)');
  G.fillStyle=sub;G.fillRect(0,GY-12,W,62);
  // Main ground body
  const gnd=G.createLinearGradient(0,GY,0,H);
  gnd.addColorStop(0,'#1c0b06');gnd.addColorStop(.22,'#250d08');
  gnd.addColorStop(.72,'#160804');gnd.addColorStop(1,'#090402');
  G.fillStyle=gnd;G.fillRect(0,GY,W,H-GY);
  // Stone tiles
  const tw=44,th=21,cols=Math.ceil(W/tw)+2,rows=6;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const tx=(c-(r%2)*.5)*tw-tw,ty=GY+r*th;
      const seed=(c*1237+r*3119)%17;
      const sh=.76+seed*.013;
      G.fillStyle=`rgb(${round(58*sh)},${round(28*sh)},${round(11*sh)})`;
      G.fillRect(tx,ty,tw-1,th-1);
      // tile surface gradient
      const tg=G.createLinearGradient(tx,ty,tx,ty+th);
      tg.addColorStop(0,'rgba(255,255,255,.045)');tg.addColorStop(1,'rgba(0,0,0,.14)');
      G.fillStyle=tg;G.fillRect(tx,ty,tw-1,th-1);
      // grout
      G.strokeStyle='rgba(5,2,1,.75)';G.lineWidth=.9;G.strokeRect(tx,ty,tw-1,th-1);
      // top bevel
      G.strokeStyle=`rgba(${round(110*sh)},${round(52*sh)},${round(22*sh)},.32)`;G.lineWidth=.5;
      G.beginPath();G.moveTo(tx,ty);G.lineTo(tx+tw-2,ty);G.stroke();
    }
  }
  // Glowing edge line
  const eg=G.createLinearGradient(0,0,W,0);
  eg.addColorStop(0,'rgba(255,80,0,0)');eg.addColorStop(.16,'rgba(255,108,18,.74)');
  eg.addColorStop(.50,'rgba(255,132,26,.96)');eg.addColorStop(.84,'rgba(255,108,18,.74)');
  eg.addColorStop(1,'rgba(255,80,0,0)');
  G.fillStyle=eg;G.fillRect(0,GY-2.8,W,5.6);
  G.shadowBlur=22;G.shadowColor='rgba(255,80,0,.48)';
  G.fillRect(0,GY-1,W,2);G.shadowBlur=0;
  // AO
  const ao=G.createLinearGradient(0,GY,0,GY+38);
  ao.addColorStop(0,'rgba(0,0,0,.58)');ao.addColorStop(1,'rgba(0,0,0,0)');
  G.fillStyle=ao;G.fillRect(0,GY,W,38);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SKELETON JOINT SYSTEM
//  Each joint: cur=current world angle, tgt=target, spd=lerp speed, len=bone length
//  FK rule: child_x = parent_x + cos(angle)*len*FACING
//           child_y = parent_y + sin(angle)*len    (Y never mirrored)
// ═══════════════════════════════════════════════════════════════════════════════
function MJ(ang,len,spd){return{cur:ang,tgt:ang,spd:spd||9,len};}

const SK={
  spL:MJ(-PI/2, 22,10), spM:MJ(-PI/2, 24,10), spH:MJ(-PI/2, 22,10), nk:MJ(-PI/2,14,13),
  lCl:MJ( PI*.58,17,11), lUA:MJ( PI*.68,36,10), lFA:MJ( PI*.46,29,10), lHd:MJ( PI*.50,13,10),
  rCl:MJ(-PI*.58,17,11), rUA:MJ(-PI*.68,36,10), rFA:MJ(-PI*.46,29,10), rHd:MJ(-PI*.50,13,10),
  spA:MJ(-PI*.55,46,13), spB:MJ(-PI*.55,58,13),
  lTh:MJ(PI/2+.10,39,10), lSh:MJ(PI/2+.05,34,10), lAk:MJ(PI/2-.10,17,10), lTo:MJ(-.05,9,10),
  rTh:MJ(PI/2-.10,39,10), rSh:MJ(PI/2-.05,34,10), rAk:MJ(PI/2+.10,17,10), rTo:MJ( .05,9,10),
};
const IDLE_POSE={
  spL:-PI/2,spM:-PI/2,spH:-PI/2,nk:-PI/2,
  lCl:PI*.58,lUA:PI*.68,lFA:PI*.46,lHd:PI*.50,
  rCl:-PI*.58,rUA:-PI*.68,rFA:-PI*.46,rHd:-PI*.50,
  spA:-PI*.55,spB:-PI*.55,
  lTh:PI/2+.10,lSh:PI/2+.05,lAk:PI/2-.10,lTo:-.05,
  rTh:PI/2-.10,rSh:PI/2-.05,rAk:PI/2+.10,rTo:.05,
};
function setPose(o){for(const k in o)if(SK[k])SK[k].tgt=o[k];}
function setIdle(){setPose(IDLE_POSE);}
function setSpeeds(s){for(const k in SK)SK[k].spd=s;}
function lerpSK(mult){
  const m=mult||1;
  for(const k in SK){const j=SK[k],kk=clamp(j.spd*m*DT/1000,0,1);j.cur=lp(j.cur,j.tgt,kk);}
}

// World joint positions computed by FK each frame
const JP={};
let FACING=1;

function runFK(pelX,pelY,lean,squat){
  const F=FACING;
  const px=pelX,py=pelY+(squat||0);
  JP.pel={x:px,y:py};
  const EX=(ox,oy,ang,len)=>({x:ox+cos(ang)*len*F,y:oy+sin(ang)*len});
  const L=lean||0;
  // Spine upward
  JP.spL=EX(px,py,   SK.spL.cur+L*.88, SK.spL.len);
  JP.spM=EX(JP.spL.x,JP.spL.y, SK.spM.cur+L*.55, SK.spM.len);
  JP.spH=EX(JP.spM.x,JP.spM.y, SK.spH.cur+L*.32, SK.spH.len);
  JP.nk =EX(JP.spH.x,JP.spH.y, SK.nk.cur +L*.16, SK.nk.len);
  JP.head={x:JP.nk.x,y:JP.nk.y};
  // Shoulder sockets
  JP.lSh={x:JP.spH.x-F*21,y:JP.spH.y+5};
  JP.rSh={x:JP.spH.x+F*21,y:JP.spH.y+5};
  // Left arm
  const lC=EX(JP.lSh.x,JP.lSh.y, SK.lCl.cur, SK.lCl.len);
  JP.lEl=EX(lC.x,lC.y, SK.lUA.cur, SK.lUA.len);
  JP.lWr=EX(JP.lEl.x,JP.lEl.y, SK.lFA.cur, SK.lFA.len);
  JP.lHn=EX(JP.lWr.x,JP.lWr.y, SK.lHd.cur, SK.lHd.len);
  // Right arm
  const rC=EX(JP.rSh.x,JP.rSh.y, SK.rCl.cur, SK.rCl.len);
  JP.rEl=EX(rC.x,rC.y, SK.rUA.cur, SK.rUA.len);
  JP.rWr=EX(JP.rEl.x,JP.rEl.y, SK.rFA.cur, SK.rFA.len);
  JP.rHn=EX(JP.rWr.x,JP.rWr.y, SK.rHd.cur, SK.rHd.len);
  // Spear chain
  JP.spAe=EX(JP.rHn.x,JP.rHn.y, SK.spA.cur, SK.spA.len);
  JP.spBe=EX(JP.spAe.x,JP.spAe.y, SK.spB.cur, SK.spB.len);
  const sdx=JP.spBe.x-JP.spAe.x,sdy=JP.spBe.y-JP.spAe.y,sl=sqrt(sdx*sdx+sdy*sdy)||1;
  JP.spTp={x:JP.spBe.x+(sdx/sl)*70,y:JP.spBe.y+(sdy/sl)*70};
  // Left leg
  const lhx=px-F*14,lhy=py;
  JP.lHp={x:lhx,y:lhy};
  JP.lKn={x:lhx+cos(SK.lTh.cur)*SK.lTh.len,y:lhy+sin(SK.lTh.cur)*SK.lTh.len};
  JP.lAn={x:JP.lKn.x+cos(SK.lSh.cur)*SK.lSh.len,y:JP.lKn.y+sin(SK.lSh.cur)*SK.lSh.len};
  JP.lHl={x:JP.lAn.x+cos(SK.lAk.cur)*SK.lAk.len,y:JP.lAn.y+sin(SK.lAk.cur)*SK.lAk.len};
  JP.lTe={x:JP.lHl.x+cos(SK.lTo.cur)*SK.lTo.len,y:JP.lHl.y+sin(SK.lTo.cur)*SK.lTo.len};
  // Right leg
  const rhx=px+F*14,rhy=py;
  JP.rHp={x:rhx,y:rhy};
  JP.rKn={x:rhx+cos(SK.rTh.cur)*SK.rTh.len,y:rhy+sin(SK.rTh.cur)*SK.rTh.len};
  JP.rAn={x:JP.rKn.x+cos(SK.rSh.cur)*SK.rSh.len,y:JP.rKn.y+sin(SK.rSh.cur)*SK.rSh.len};
  JP.rHl={x:JP.rAn.x+cos(SK.rAk.cur)*SK.rAk.len,y:JP.rAn.y+sin(SK.rAk.cur)*SK.rAk.len};
  JP.rTe={x:JP.rHl.x+cos(SK.rTo.cur)*SK.rTo.len,y:JP.rHl.y+sin(SK.rTo.cur)*SK.rTo.len};
}

//  KNIGHT DRAW  — uses JP world positions from FK
// ═══════════════════════════════════════════════════════════════════════════════
function drawKnight(){
  const F=FACING;
  // Ground shadow
  const sh=G.createRadialGradient(KN.x,KN.y,2,KN.x,KN.y,58);
  sh.addColorStop(0,'rgba(0,0,0,.60)');sh.addColorStop(1,'rgba(0,0,0,0)');
  G.fillStyle=sh;G.beginPath();G.ellipse(KN.x,KN.y,58,14,0,0,TAU);G.fill();
  // Draw order: back leg → spear arm → torso → shield arm → front leg → helmet
  if(F>=0){
    drawLeg(JP.lHp,JP.lKn,JP.lAn,JP.lHl,JP.lTe,.66);
    drawSpearArm();
    drawTorso();
    drawShieldArm();
    drawLeg(JP.rHp,JP.rKn,JP.rAn,JP.rHl,JP.rTe,1.0);
  } else {
    drawLeg(JP.rHp,JP.rKn,JP.rAn,JP.rHl,JP.rTe,.66);
    drawSpearArm();
    drawTorso();
    drawShieldArm();
    drawLeg(JP.lHp,JP.lKn,JP.lAn,JP.lHl,JP.lTe,1.0);
  }
  drawHelmet();
}

// ─── LEG ───────────────────────────────────────────────────────────────────
function drawLeg(hip,knee,ankle,heel,toe,bright){
  const d=bright;
  const hi =`rgba(${round(148*d)},${round(148*d)},${round(152*d)},1)`;
  const mid=`rgba(${round(88*d)},${round(88*d)},${round(92*d)},1)`;
  const drk=`rgba(${round(20*d)},${round(20*d)},${round(22*d)},1)`;

  // THIGH
  const {nx:tnx,ny:tny}=LIMB(hip.x,hip.y,knee.x,knee.y,13,11,LG(hip.x,hip.y,knee.x,knee.y,13,hi,mid,drk),'#111114',2.2);
  // highlight
  G.strokeStyle=`rgba(255,255,255,${.17*d})`;G.lineWidth=1.7;
  G.beginPath();G.moveTo(hip.x+tnx*13*.44,hip.y+tny*13*.44);G.lineTo(knee.x+tnx*11*.44,knee.y+tny*11*.44);G.stroke();
  // armor overlay plate
  const tdx=knee.x-hip.x,tdy=knee.y-hip.y,tl=sqrt(tdx*tdx+tdy*tdy)||1;
  const tmx=(hip.x+knee.x)*.5,tmy=(hip.y+knee.y)*.5;
  const tapg=G.createLinearGradient(tmx+tnx*13,tmy+tny*13,tmx-tnx*13,tmy-tny*13);
  tapg.addColorStop(0,`rgba(200,200,206,${.13*d})`);tapg.addColorStop(.4,`rgba(155,155,162,${.22*d})`);tapg.addColorStop(1,'rgba(10,10,12,0)');
  G.beginPath();
  G.moveTo(hip.x+tnx*11+tdx/tl*5,hip.y+tny*11+tdy/tl*5);G.lineTo(hip.x-tnx*11+tdx/tl*5,hip.y-tny*11+tdy/tl*5);
  G.lineTo(knee.x-tnx*10-tdx/tl*5,knee.y-tny*10-tdy/tl*5);G.lineTo(knee.x+tnx*10-tdx/tl*5,knee.y+tny*10-tdy/tl*5);
  G.closePath();G.fillStyle=tapg;G.fill();
  // gold top trim
  GOLDBAND(hip.x,hip.y,atan2(tny,-tnx),13,3.8,d);

  // KNEE CAP
  const kg=G.createRadialGradient(knee.x-2,knee.y-2.5,0,knee.x,knee.y,11);
  kg.addColorStop(0,`rgba(${round(235*d)},${round(188*d)},${round(38*d)},1)`);
  kg.addColorStop(.55,`rgba(${round(202*d)},${round(158*d)},${round(28*d)},1)`);
  kg.addColorStop(1,`rgba(${round(78*d)},${round(58*d)},${round(8*d)},1)`);
  G.shadowBlur=d>.85?8:0;G.shadowColor=`rgba(222,172,30,${.58*d})`;
  G.fillStyle=kg;G.beginPath();G.arc(knee.x,knee.y,11,0,TAU);G.fill();G.shadowBlur=0;
  G.fillStyle=`rgba(22,22,26,${d})`;G.beginPath();G.arc(knee.x,knee.y,5.8,0,TAU);G.fill();
  G.fillStyle=`rgba(255,215,80,${.48*d})`;G.beginPath();G.arc(knee.x-2,knee.y-2.8,3,0,TAU);G.fill();

  // SHIN
  const {nx:snx,ny:sny}=LIMB(knee.x,knee.y,ankle.x,ankle.y,11,9.5,LG(knee.x,knee.y,ankle.x,ankle.y,11,hi,mid,drk),'#111114',1.9);
  G.strokeStyle=`rgba(255,255,255,${.13*d})`;G.lineWidth=1.5;
  G.beginPath();G.moveTo(knee.x+snx*11*.42,knee.y+sny*11*.42);G.lineTo(ankle.x+snx*9.5*.42,ankle.y+sny*9.5*.42);G.stroke();
  const sdx=ankle.x-knee.x,sdy=ankle.y-knee.y,sl=sqrt(sdx*sdx+sdy*sdy)||1;
  G.strokeStyle=`rgba(255,255,255,${.09*d})`;G.lineWidth=1.3;
  G.beginPath();G.moveTo(knee.x+sdx/sl*7,knee.y+sdy/sl*7);G.lineTo(ankle.x-sdx/sl*5,ankle.y-sdy/sl*5);G.stroke();
  GOLDBAND(knee.x+sdx*.28,knee.y+sdy*.28,atan2(sny,-snx)+PI/2,11,4.2,d);

  // ANKLE/CUFF
  LIMB(ankle.x,ankle.y,heel.x,heel.y,10,12.5,LG(ankle.x,ankle.y,heel.x,heel.y,11,hi,mid,drk),'#111114',1.9);
  GOLDBAND(ankle.x,ankle.y,atan2(heel.y-ankle.y,heel.x-ankle.x)+PI/2,12.5,4.8,d);

  // BOOT
  const fdx=heel.x-ankle.x,fdy=heel.y-ankle.y,fl=sqrt(fdx*fdx+fdy*fdy)||1;
  const fnx=-fdy/fl,fny=fdx/fl;
  G.fillStyle=`rgba(${round(34*d)},${round(28*d)},${round(22*d)},1)`;
  G.beginPath();
  G.moveTo(heel.x+fnx*13,heel.y+fny*13);G.lineTo(heel.x-fnx*13,heel.y-fny*13);
  G.lineTo(toe.x-fnx*9,toe.y-fny*9);
  G.quadraticCurveTo(toe.x+fdx/fl*15-fnx*4,toe.y+fdy/fl*15-fny*4,toe.x+fdx/fl*17,toe.y+fdy/fl*17);
  G.quadraticCurveTo(toe.x+fdx/fl*15+fnx*4,toe.y+fdy/fl*15+fny*4,toe.x+fnx*9,toe.y+fny*9);
  G.closePath();G.fill();
  G.strokeStyle=`rgba(55,44,36,${d})`;G.lineWidth=1.6;G.stroke();
  G.fillStyle=`rgba(${round(20*d)},${round(15*d)},${round(13*d)},1)`;
  G.beginPath();G.ellipse(toe.x+fdx/fl*11,toe.y+fdy/fl*11,14,7.5,atan2(fdy,fdx),0,TAU);G.fill();
  GOLDBAND(heel.x,heel.y,atan2(fdy,fdx)+PI/2,13.5,3.8,d);
  // boot sole
  G.fillStyle=`rgba(${round(14*d)},${round(11*d)},${round(9*d)},1)`;
  G.beginPath();
  G.moveTo(ankle.x+fnx*13,ankle.y+fny*13);G.lineTo(ankle.x-fnx*13,ankle.y-fny*13);
  G.lineTo(toe.x+fdx/fl*13-fnx*8,toe.y+fdy/fl*13-fny*8);
  G.lineTo(toe.x+fdx/fl*19,toe.y+fdy/fl*19);
  G.lineTo(toe.x+fdx/fl*13+fnx*8,toe.y+fdy/fl*13+fny*8);
  G.closePath();G.fill();
}

// ─── TORSO ─────────────────────────────────────────────────────────────────
function drawTorso(){
  const F=FACING;
  const pel=JP.pel,spL=JP.spL,spM=JP.spM,spH=JP.spH;
  // WAR KILT (11 strips hanging from pelvis)
  const kW=30;
  for(let i=0;i<11;i++){
    const t=(i/10-.5);
    const ox=F*t*kW*2, oy=abs(t)*2;
    const kx=pel.x+ox,ky=pel.y+oy;
    const sw=5.8-abs(t)*1.6;
    const sH=30+abs(sin(T*1.12+i*.78))*3.8;
    const col=i%2===0?'#441e02':'#321400';
    const kg=G.createLinearGradient(kx-sw,ky,kx+sw,ky);
    kg.addColorStop(0,'rgba(0,0,0,.32)');kg.addColorStop(.3,col);kg.addColorStop(.7,col);kg.addColorStop(1,'rgba(0,0,0,.32)');
    G.fillStyle=kg;G.beginPath();
    G.moveTo(kx-sw,ky);G.lineTo(kx+sw,ky);
    G.lineTo(kx+sw*.72,ky+sH);G.lineTo(kx-sw*.72,ky+sH);
    G.closePath();G.fill();
    G.strokeStyle='#6c3f00';G.lineWidth=.85;G.stroke();
    G.strokeStyle='rgba(204,158,25,.72)';G.lineWidth=1;
    G.beginPath();G.moveTo(kx-sw*.72,ky+sH);G.lineTo(kx+sw*.72,ky+sH);G.stroke();
    RIVET(kx,ky+5.5,2.4);
  }
  // BELT
  const bAng=atan2(spL.y-pel.y,spL.x-pel.x)+PI/2;
  const bcx=(pel.x+spL.x)*.5,bcy=(pel.y+spL.y)*.5;
  G.save();G.translate(bcx,bcy);G.rotate(bAng);
  const bg=G.createLinearGradient(-32,-9,32,9);
  bg.addColorStop(0,'#0e0500');bg.addColorStop(.35,'#241100');bg.addColorStop(.65,'#301700');bg.addColorStop(1,'#0e0500');
  RR(-32,-9,64,18,5);G.fillStyle=bg;G.fill();
  G.shadowBlur=10;G.shadowColor='rgba(200,160,30,.4)';
  G.strokeStyle='#c8a020';G.lineWidth=2.9;G.stroke();G.shadowBlur=0;
  G.fillStyle='#c8a020';G.fillRect(-12,-8,24,16);
  G.fillStyle='#0e0500';G.fillRect(-9,-6,18,12);
  G.fillStyle='#c8a020';G.beginPath();G.arc(0,0,5,0,TAU);G.fill();
  RIVET(-24,0,2.6);RIVET(24,0,2.6);
  G.restore();
  // LOWER SPINE SEGMENTS
  LIMB(pel.x,pel.y,spL.x,spL.y,21,22,LG(pel.x,pel.y,spL.x,spL.y,22,'#a2a2a8','#646468','#1a1a1e'),'#111116',2.6);
  LIMB(spL.x,spL.y,spM.x,spM.y,22,23,LG(spL.x,spL.y,spM.x,spM.y,23,'#aaaaae','#6a6a6e','#1c1c20'),'#111116',2.6);
  // BREASTPLATE spanning spL→spH
  const cpA=atan2(spH.y-spL.y,spH.x-spL.x)+PI/2;
  const cpCX=(spL.x+spH.x)*.5,cpCY=(spL.y+spH.y)*.5;
  const cpH=dist(spL.x,spL.y,spH.x,spH.y)+5;
  G.save();G.translate(cpCX,cpCY);G.rotate(cpA);
  const cpg=G.createLinearGradient(-38,-cpH/2,38,cpH/2);
  cpg.addColorStop(0,'#1c1c22');cpg.addColorStop(.06,'#7a7a82');
  cpg.addColorStop(.26,'#b4b4bc');cpg.addColorStop(.52,'#9a9aa2');
  cpg.addColorStop(.74,'#6a6a72');cpg.addColorStop(.95,'#3c3c44');cpg.addColorStop(1,'#1c1c22');
  G.fillStyle=cpg;
  G.beginPath();
  G.moveTo(-38,-cpH/2+3);G.bezierCurveTo(-42,-cpH/2+12,-42,cpH/2-12,-36,cpH/2);
  G.lineTo(36,cpH/2);G.bezierCurveTo(42,cpH/2-12,42,-cpH/2+12,38,-cpH/2+3);G.closePath();G.fill();
  G.strokeStyle='#101014';G.lineWidth=2.9;G.stroke();
  // grooves
  G.strokeStyle='rgba(0,0,0,.58)';G.lineWidth=2.2;
  G.beginPath();G.moveTo(0,-cpH/2+7);G.lineTo(0,cpH/2-7);G.stroke();
  G.beginPath();G.moveTo(-19,-cpH/2+18);G.bezierCurveTo(-26,-cpH/2+32,-26,cpH/2-16,-19,cpH/2-9);G.stroke();
  G.beginPath();G.moveTo(19,-cpH/2+18);G.bezierCurveTo(26,-cpH/2+32,26,cpH/2-16,19,cpH/2-9);G.stroke();
  // highlight grooves
  G.strokeStyle='rgba(255,255,255,.17)';G.lineWidth=1.3;
  G.beginPath();G.moveTo(-1,-cpH/2+7);G.lineTo(-1,cpH/2-7);G.stroke();
  G.beginPath();G.moveTo(-20,-cpH/2+18);G.bezierCurveTo(-27,-cpH/2+32,-27,cpH/2-16,-20,cpH/2-9);G.stroke();
  G.beginPath();G.moveTo(20,-cpH/2+18);G.bezierCurveTo(27,-cpH/2+32,27,cpH/2-16,20,cpH/2-9);G.stroke();
  // gold border
  G.shadowBlur=14;G.shadowColor='rgba(200,160,30,.42)';
  G.strokeStyle='#c8a020';G.lineWidth=3.4;
  G.beginPath();
  G.moveTo(-38,-cpH/2+3);G.bezierCurveTo(-42,-cpH/2+12,-42,cpH/2-12,-36,cpH/2);
  G.lineTo(36,cpH/2);G.bezierCurveTo(42,cpH/2-12,42,-cpH/2+12,38,-cpH/2+3);G.closePath();G.stroke();G.shadowBlur=0;
  // inner gold bevel
  G.strokeStyle='rgba(200,160,32,.42)';G.lineWidth=1.6;
  G.beginPath();
  G.moveTo(-34,-cpH/2+8);G.bezierCurveTo(-37,-cpH/2+18,-37,cpH/2-15,-32,cpH/2-5);
  G.lineTo(32,cpH/2-5);G.bezierCurveTo(37,cpH/2-15,37,-cpH/2+18,34,-cpH/2+8);G.closePath();G.stroke();
  // cross
  const cy0=cpH*.06;
  G.shadowBlur=14;G.shadowColor='rgba(200,160,30,.52)';
  G.strokeStyle='rgba(202,162,32,.94)';G.lineWidth=4.2;
  G.beginPath();G.moveTo(0,-cpH/2+15);G.lineTo(0,cpH/2-13);G.stroke();
  G.beginPath();G.moveTo(-20,cy0);G.lineTo(20,cy0);G.stroke();G.shadowBlur=0;
  // gem pulsing
  const vb=sin(T*2.24)*.5+.5;
  const gg=G.createRadialGradient(-2.5,-2.5,0,0,0,9.5);
  gg.addColorStop(0,'#ffffff');gg.addColorStop(.28,`hsl(${round(vb*12)},100%,68%)`);
  gg.addColorStop(.60,'#cc2200');gg.addColorStop(1,'rgba(110,0,0,0)');
  G.shadowBlur=22+vb*14;G.shadowColor=`rgba(255,${round(vb*65)},0,.88)`;
  G.fillStyle=gg;G.beginPath();G.arc(0,cy0,9.5,0,TAU);G.fill();G.shadowBlur=0;
  // ab plates
  for(let row=0;row<4;row++){
    const ry=-cpH/2+22+row*13;
    for(const sx of[-15,15]){
      const apg=G.createLinearGradient(sx-9,ry,sx+9,ry+12);
      apg.addColorStop(0,'rgba(188,188,194,.13)');apg.addColorStop(.5,'rgba(125,125,130,.09)');apg.addColorStop(1,'rgba(0,0,0,.04)');
      RR(sx-9,ry,18,12,3);G.fillStyle=apg;G.fill();
      G.strokeStyle='rgba(200,160,32,.30)';G.lineWidth=.95;G.stroke();
      G.strokeStyle='rgba(255,255,255,.09)';G.lineWidth=.7;
      G.beginPath();G.moveTo(sx-8,ry+1.5);G.lineTo(sx+8,ry+1.5);G.stroke();
    }
  }
  G.restore();
  // PAULDRONS
  drawPauldron(JP.lSh.x,JP.lSh.y,cpA,-1);
  drawPauldron(JP.rSh.x,JP.rSh.y,cpA, 1);
}

function drawPauldron(cx,cy,baseAng,side){
  G.save();G.translate(cx,cy);G.rotate(baseAng);
  const pg=G.createRadialGradient(-7*side,-9,2,0,0,28);
  pg.addColorStop(0,'#b8b8be');pg.addColorStop(.45,'#7c7c84');pg.addColorStop(1,'#202026');
  G.fillStyle=pg;G.beginPath();G.ellipse(0,0,28,20,0,0,TAU);G.fill();

// ─── SHIELD ARM ──────────────────────────────────────────────────────────────
function drawShieldArm(){
  const sh=JP.lSh,el=JP.lEl,wr=JP.lWr,hn=JP.lHn;
  LIMB(sh.x,sh.y,el.x,el.y,12,11,LG(sh.x,sh.y,el.x,el.y,12,'#a2a2a8','#686870','#1e1e24'),'#131318',2.1);

// ─── SPEAR ARM ───────────────────────────────────────────────────────────────
function drawSpearArm(){

function drawElbow(ex,ey){

function drawGauntlet(hx,hy,ang){

// ─── SHIELD ──────────────────────────────────────────────────────────────────
function drawShield(hx,hy,angle){
  const F=FACING;
  G.save();G.translate(hx,hy);G.rotate(angle+PI*.5*F);
  const sw=64,sh2=96,sx=-sw/2,sy=-20;
  const shg=G.createLinearGradient(sx,sy,sx+sw,sy+sh2);
  shg.addColorStop(0,'#202028');shg.addColorStop(.05,'#828290');
  shg.addColorStop(.30,'#b4b4c0');shg.addColorStop(.58,'#96969e');
  shg.addColorStop(.82,'#5e5e68');shg.addColorStop(.97,'#363640');shg.addColorStop(1,'#1e1e24');
  G.fillStyle=shg;
  G.beginPath();
  G.moveTo(sx+10,sy);G.lineTo(sx+sw-10,sy);
  G.quadraticCurveTo(sx+sw,sy,sx+sw,sy+24);
  G.lineTo(sx+sw,sy+sh2*.74);
  G.quadraticCurveTo(sx+sw,sy+sh2,sx+sw/2,sy+sh2);
  G.quadraticCurveTo(sx,sy+sh2,sx,sy+sh2*.74);
  G.lineTo(sx,sy+24);G.quadraticCurveTo(sx,sy,sx+10,sy);
  G.closePath();G.fill();
  G.shadowBlur=12;G.shadowColor='rgba(200,160,30,.45)';
  G.strokeStyle='#c8a020';G.lineWidth=5.2;G.stroke();G.shadowBlur=0;
  // inner bevel
  G.strokeStyle='rgba(0,0,0,.62)';G.lineWidth=3.2;
  G.beginPath();G.moveTo(sx+17,sy+10);G.lineTo(sx+sw-17,sy+10);
  G.lineTo(sx+sw-12,sy+sh2*.72);G.lineTo(sx+sw/2,sy+sh2-10);G.lineTo(sx+12,sy+sh2*.72);G.closePath();G.stroke();
  G.strokeStyle='rgba(255,255,255,.13)';G.lineWidth=1.6;
  G.beginPath();G.moveTo(sx+18,sy+11);G.lineTo(sx+sw-18,sy+11);
  G.lineTo(sx+sw-13,sy+sh2*.71);G.lineTo(sx+sw/2,sy+sh2-11);G.lineTo(sx+13,sy+sh2*.71);G.closePath();G.stroke();
  // sheen
  G.fillStyle='rgba(255,255,255,.060)';
  G.beginPath();G.moveTo(sx+10,sy);G.lineTo(sx+sw*.44,sy);G.lineTo(sx+sw*.36,sy+sh2*.38);G.lineTo(sx+10,sy+sh2*.25);G.closePath();G.fill();
  // cross
  const crossY=sy+sh2*.40;
  G.shadowBlur=18;G.shadowColor='rgba(200,160,30,.65)';
  G.strokeStyle='rgba(202,162,32,.96)';G.lineWidth=5;
  G.beginPath();G.moveTo(0,sy+12);G.lineTo(0,sy+sh2-12);G.stroke();
  G.beginPath();G.moveTo(sx+12,crossY);G.lineTo(sx+sw-12,crossY);G.stroke();G.shadowBlur=0;
  // boss circle
  const bR=20;
  const bg=G.createRadialGradient(-3.5,-3.5,0,0,0,bR);
  bg.addColorStop(0,'#fff8b0');bg.addColorStop(.38,'#d4a820');bg.addColorStop(.78,'#8a6012');bg.addColorStop(1,'#3c2a00');
  G.shadowBlur=20;G.shadowColor='rgba(200,162,32,.58)';
  G.fillStyle=bg;G.beginPath();G.arc(0,crossY,bR,0,TAU);G.fill();
  G.strokeStyle='#c8a020';G.lineWidth=2.8;G.stroke();G.shadowBlur=0;
  G.strokeStyle='rgba(100,76,12,.72)';G.lineWidth=1.6;
  G.beginPath();G.arc(0,crossY,bR*.66,0,TAU);G.stroke();
  G.fillStyle='rgba(255,242,130,.55)';G.beginPath();G.arc(-4,crossY-5,6,0,TAU);G.fill();
  // rivets
  for(const [rx,ry] of[[-25,13],[25,13],[-26,sh2*.74],[26,sh2*.74],[0,6],[0,sh2-11],[-22,sh2*.42],[22,sh2*.42]])
    RIVET(rx,sy+ry,4.5);
  G.restore();
}

// ─── SPEAR ───────────────────────────────────────────────────────────────────
function drawSpear(){
  const p0=JP.rHn,p1=JP.spAe,p2=JP.spBe,p3=JP.spTp;
  drawShaftSeg(p0.x,p0.y,p1.x,p1.y,7.2,6.8);
  GOLDBAND(p1.x,p1.y,atan2(p2.y-p1.y,p2.x-p1.x),7.5,10,1);
  drawShaftSeg(p1.x,p1.y,p2.x,p2.y,6.8,6.2);
  for(const u of[.22,.46,.68,.88]){
    GOLDBAND(lp(p1.x,p2.x,u),lp(p1.y,p2.y,u),atan2(p2.y-p1.y,p2.x-p1.x),7,9,1);
  }
  GOLDBAND(p2.x,p2.y,atan2(p3.y-p2.y,p3.x-p2.x),10,13,1.06);
  drawBlade(p2.x,p2.y,p3.x,p3.y);
  const bAng=atan2(p0.y-p1.y,p0.x-p1.x);
  G.save();G.translate(p0.x,p0.y);G.rotate(bAng);
  const bcg=G.createLinearGradient(-6,0,6,22);
  bcg.addColorStop(0,'#c8a020');bcg.addColorStop(.5,'#e8c040');bcg.addColorStop(1,'#8a6012');
  G.fillStyle=bcg;G.beginPath();G.moveTo(-6,0);G.lineTo(6,0);G.lineTo(5,22);G.lineTo(-5,22);G.closePath();G.fill();
  G.restore();
}
function drawShaftSeg(ax,ay,bx,by,wA,wB){
  const dx=bx-ax,dy=by-ay,len=sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len,ny=dx/len;
  const sg=G.createLinearGradient(ax+nx*wA,ay+ny*wA,ax-nx*wA,ay-ny*wA);
  sg.addColorStop(0,'#1e1e22');sg.addColorStop(.11,'#d2d2d8');
  sg.addColorStop(.40,'#929298');sg.addColorStop(.62,'#727278');
  sg.addColorStop(.90,'#bebec4');sg.addColorStop(1,'#1e1e22');
  G.beginPath();
  G.moveTo(ax+nx*wA,ay+ny*wA);G.lineTo(bx+nx*wB,by+ny*wB);
  G.lineTo(bx-nx*wB,by-ny*wB);G.lineTo(ax-nx*wA,ay-ny*wA);
  G.closePath();G.fillStyle=sg;G.fill();
  G.strokeStyle='#141416';G.lineWidth=1.7;G.stroke();
  G.strokeStyle='rgba(255,255,255,.24)';G.lineWidth=1.9;
  G.beginPath();G.moveTo(ax+nx*wA*.40,ay+ny*wA*.40);G.lineTo(bx+nx*wB*.40,by+ny*wB*.40);G.stroke();
}
function drawBlade(bx,by,tx,ty){
  const dx=tx-bx,dy=ty-by,len=sqrt(dx*dx+dy*dy)||1;
  const bladeLen=72;
  const ang=atan2(dy,dx);
  G.save();G.translate(bx,by);G.rotate(ang);
  const bg=G.createLinearGradient(0,-20,0,20);
  bg.addColorStop(0,'#7a90a6');bg.addColorStop(.30,'#dae8f2');
  bg.addColorStop(.62,'#eef6ff');bg.addColorStop(1,'#7a90a6');
  G.shadowBlur=22;G.shadowColor='rgba(180,210,255,.88)';
  G.fillStyle=bg;
  G.beginPath();G.moveTo(bladeLen,0);G.lineTo(0,20);G.lineTo(0,-20);G.closePath();G.fill();
  G.shadowColor='rgba(200,228,255,.96)';G.shadowBlur=30;
  G.strokeStyle='rgba(212,238,255,.82)';G.lineWidth=3;
  G.beginPath();G.moveTo(0,0);G.lineTo(bladeLen,0);G.stroke();G.shadowBlur=0;
  G.fillStyle='rgba(255,255,255,.64)';
  G.beginPath();G.moveTo(bladeLen,0);G.lineTo(0,-20);G.lineTo(0,-5);G.closePath();G.fill();
  // fuller groove
  G.strokeStyle='rgba(100,130,162,.48)';G.lineWidth=3.2;
  G.beginPath();G.moveTo(bladeLen*.08,0);G.lineTo(bladeLen*.86,0);G.stroke();
  G.strokeStyle='rgba(255,255,255,.20)';G.lineWidth=1.1;
  G.beginPath();G.moveTo(bladeLen*.08,1.2);G.lineTo(bladeLen*.86,1.2);G.stroke();
  // serration
  G.strokeStyle='rgba(150,182,214,.28)';G.lineWidth=1.3;
  for(let i=0;i<7;i++){const px=bladeLen*.14+i*(bladeLen*.115);G.beginPath();G.moveTo(px,15);G.lineTo(px+5.5,20);G.stroke();}
  G.restore();
}

// ─── HELMET ───────────────────────────────────────────────────────────────────
function drawHelmet(){
  const nk=JP.nk,spH=JP.spH;
  const bAng=atan2(nk.y-spH.y,nk.x-spH.x)+PI/2;
  const hcx=nk.x,hcy=nk.y-6;

  // NECK GUARD
  const ng=G.createLinearGradient(-15,0,15,0);
  ng.addColorStop(0,'#1a1a20');ng.addColorStop(.42,'#5e5e66');ng.addColorStop(1,'#1a1a20');
  RR(-15,-4,30,25,5);G.fillStyle=ng;G.fill();
  G.strokeStyle='#484850';G.lineWidth=2.1;G.stroke();
  for(let i=0;i<5;i++){
    G.strokeStyle=`rgba(200,160,32,${.44-i*.08})`;G.lineWidth=1.15;
    G.beginPath();G.moveTo(-15,-3+i*5.5);G.lineTo(15,-3+i*5.5);G.stroke();
  }

  domg.addColorStop(0,'#1e1e24');domg.addColorStop(.06,'#747480');
  domg.addColorStop(.25,'#c2c2c9');domg.addColorStop(.52,'#949499');
  domg.addColorStop(.76,'#646469');domg.addColorStop(.95,'#3c3c42');domg.addColorStop(1,'#1e1e24');
  G.fillStyle=domg;
  G.beginPath();
  G.moveTo(-38,8);
  G.bezierCurveTo(-42,-88,-42,-88,-22,-99);
  G.lineTo(0,-106);G.lineTo(22,-99);
  G.bezierCurveTo(42,-88,42,-88,38,8);
  G.closePath();G.fill();
  // flutes
  G.strokeStyle='rgba(0,0,0,.40)';G.lineWidth=1.6;
  for(const fx of[-24,-12,0,12,24]){
    G.beginPath();G.moveTo(fx,-9);G.bezierCurveTo(fx,-55,fx*.82,-84,fx*.42,-102);G.stroke();
  }
  G.strokeStyle='rgba(255,255,255,.11)';G.lineWidth=.9;
  for(const fx of[-23,-11,1,13,25]){
    G.beginPath();G.moveTo(fx,-9);G.bezierCurveTo(fx,-55,fx*.82,-84,fx*.42,-102);G.stroke();
  }
  // surface highlight sheen
  G.fillStyle='rgba(255,255,255,.058)';
  G.beginPath();G.moveTo(-24,-101);G.lineTo(24,-101);
  G.bezierCurveTo(32,-83,32,-62,28,-44);G.bezierCurveTo(20,-36,-20,-36,-28,-44);
  G.bezierCurveTo(-32,-62,-32,-83,-24,-101);G.closePath();G.fill();
  // gold border
  G.shadowBlur=14;G.shadowColor='rgba(200,160,30,.44)';
  G.strokeStyle='#c8a020';G.lineWidth=3.4;
  G.beginPath();
  G.moveTo(-38,8);G.bezierCurveTo(-42,-88,-42,-88,-22,-99);
  G.lineTo(0,-106);G.lineTo(22,-99);G.bezierCurveTo(42,-88,42,-88,38,8);G.closePath();G.stroke();G.shadowBlur=0;
  // brow ridge
  G.strokeStyle='rgba(200,160,32,.78)';G.lineWidth=3.1;
  G.beginPath();G.moveTo(-38,-42);G.lineTo(38,-42);G.stroke();
  G.strokeStyle='rgba(255,255,255,.17)';G.lineWidth=1.1;
  G.beginPath();G.moveTo(-37,-43);G.lineTo(37,-43);G.stroke();
  // CHEEK GUARDS
  for(const s of[-1,1]){
    const cgg=G.createLinearGradient(s*36,0,s*52,0);
    cgg.addColorStop(0,'#525260');cgg.addColorStop(.5,'#424250');cgg.addColorStop(1,'#2a2a36');
    G.fillStyle=cgg;
    G.beginPath();G.moveTo(s*38,8);G.lineTo(s*52,14);G.lineTo(s*52,-38);G.quadraticCurveTo(s*50,-44,s*38,-42);G.closePath();
    G.fill();G.strokeStyle='#c8a020';G.lineWidth=2.3;G.stroke();
    for(let r=0;r<6;r++){
      G.strokeStyle=`rgba(200,160,32,${.50-r*.075})`;G.lineWidth=1.1;
      G.beginPath();G.moveTo(s*38,-6-r*9.5);G.lineTo(s*52,-6-r*9.5);G.stroke();
    }
    RIVET(s*46,10,3);RIVET(s*46,-36,3);
  }
  // T-VISOR
  const vt=T*2.14,vp=sin(vt)*.5+.5;
  const vR=round(188+66*vp),vG2=round(28+22*vp);
  const vc=`rgba(${vR},${vG2},0,.97)`;
  G.fillStyle=vc;G.shadowBlur=24;G.shadowColor=vc;
  G.fillRect(-30,-64,60,10);
  G.fillRect(-7,-78,14,44);
  const vgrd=G.createLinearGradient(-30,-64,30,-54);
  vgrd.addColorStop(0,'rgba(255,80,0,0)');
  vgrd.addColorStop(.5,`rgba(255,${round(165+65*vp)},0,1)`);
  vgrd.addColorStop(1,'rgba(255,80,0,0)');
  G.fillStyle=vgrd;G.fillRect(-30,-64,60,10);
  G.fillStyle='rgba(0,0,0,.84)';G.fillRect(-28,-62,56,7);G.fillRect(-5.5,-76,11,40);
  G.shadowBlur=0;
  // PLUME (34 strands)
  G.lineCap='round';
  for(let p=0;p<34;p++){
    const bLen=40+sin(p/33*PI)*36;
    const flutter=sin(T*1.56+p*.34)*.14+sin(T*2.85+p*.19)*.06;
    const spread=((p/33)-.5)*PI*1.20+flutter;
    const ang=-PI*.5+spread;
    const px=cos(ang)*bLen,py=-104+sin(ang)*bLen;
    const hue=round((p/33)*24);
    G.strokeStyle=`hsla(${hue},100%,52%,${.54+(p/33)*.46})`;
    G.lineWidth=max(.5,3.9-p*.08);
    G.shadowBlur=10;G.shadowColor=`hsla(${hue},100%,45%,.68)`;
    G.beginPath();G.moveTo(0,-104);
    G.quadraticCurveTo(cos(ang+.28)*bLen*.38,-104+sin(ang+.28)*bLen*.38,px,py);G.stroke();
  }
  G.shadowBlur=0;G.lineCap='butt';
  // plume base jewel
  const pjg=G.createRadialGradient(-1,-2,0,0,0,8);
  pjg.addColorStop(0,'#fff');pjg.addColorStop(.42,'#ff2200');pjg.addColorStop(1,'rgba(110,0,0,0)');
  G.shadowBlur=16;G.shadowColor='rgba(255,40,0,.85)';
  G.fillStyle=pjg;G.beginPath();G.arc(0,-104,8,0,TAU);G.fill();G.shadowBlur=0;
  G.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  KNIGHT CONTROLLER
// ═══════════════════════════════════════════════════════════════════════════════
const KN={x:0,y:0,facing:1,visible:true,state:'idle',phase:0,phaseT:0,stateT:0,lean:0,squat:0};
const HH=64; // hip height from foot

function tickKnight(){
  KN.phaseT+=DT; KN.stateT+=DT; FACING=KN.facing;
  if(KN.state==='idle')   doIdle();
  else if(KN.state==='dash')   doDash();
  else if(KN.state==='sweep')  doSweep();
  else if(KN.state==='thrust') doThrust();
  else if(KN.state==='meteor') doMeteor();
  else if(KN.state==='heal')   doHeal();
  checkMeteorLand();
  runFK(KN.x, KN.y-HH, KN.lean, KN.squat);
  document.getElementById('stateLabel').textContent=`— ${KN.state.toUpperCase()} —`;
}

// ─── IDLE ────────────────────────────────────────────────────────────────────
function doIdle(){

  const b=sin(T*1.19),b2=sin(T*.83+.6),b3=sin(T*.56+1.2);

function frame(now){
  requestAnimationFrame(frame);
  DT=min(50,now-LAST);LAST=now;T+=DT/1000;
  if(!_INITED){KN.x=W/2;KN.y=GY;_INITED=true;}

  tickCD(); tickKnight();

  tickOrbs(); tickShake(); tickFlash();

  G.save();G.translate(round(SHK_X),round(SHK_Y));

  drawBackground();

  // Ground-level FX (behind knight)
  drawCracks();
  drawWaves();
  drawWarn();

  drawMeteor();

  // Knight
  if(KN.visible&&KN.y>-210)drawKnight();

}

// ── BLOOD / IMPACT SPLATTER POOL ─────────────────────────────────────────────
const SPLAT_MAX = 200;
const splatX   = new Float32Array(SPLAT_MAX);
const splatY   = new Float32Array(SPLAT_MAX);
const splatR   = new Float32Array(SPLAT_MAX);
const splatA   = new Float32Array(SPLAT_MAX);   // alpha
const splatLife= new Float32Array(SPLAT_MAX);
const splatML  = new Float32Array(SPLAT_MAX);
const splatHue = new Uint8Array  (SPLAT_MAX);   // color hue
const splatType= new Uint8Array  (SPLAT_MAX);   // 0=dust,1=fire,2=ice,3=energy
const splatAct = new Uint8Array  (SPLAT_MAX);
let splatHead  = 0;

function spawnSplat(x,y,r,life,hue,type){
  let idx=-1;
  for(let i=0;i<SPLAT_MAX;i++){const s=(splatHead+i)%SPLAT_MAX;if(!splatAct[s]){idx=s;break;}}
  if(idx<0)idx=splatHead%SPLAT_MAX;
  splatHead=(idx+1)%SPLAT_MAX;
  splatX[idx]=x; splatY[idx]=y; splatR[idx]=r;
  splatA[idx]=1; splatLife[idx]=life; splatML[idx]=life;
  splatHue[idx]=hue||0; splatType[idx]=type||0; splatAct[idx]=1;
}

function spawnImpactSplats(cx,cy,n,rMin,rMax,spread,hue,type){
  for(let i=0;i<n;i++){
    const a=Math.random()*TAU;
    const dist2=Math.random()*spread;
    spawnSplat(
      cx+cos(a)*dist2, cy+sin(a)*dist2,
      rMin+Math.random()*(rMax-rMin),
      600+Math.random()*800,
      hue||0, type||0
    );
  }
}

function tickSplats(){
  for(let i=0;i<SPLAT_MAX;i++){
    if(!splatAct[i])continue;
    splatLife[i]-=DT;
    if(splatLife[i]<=0){splatAct[i]=0;continue;}
    splatA[i]=splatLife[i]/splatML[i];
  }
}

function drawSplats(){
  for(let i=0;i<SPLAT_MAX;i++){
    if(!splatAct[i])continue;
    const x=splatX[i],y=splatY[i],r=splatR[i],a=splatA[i];
    const h=splatHue[i],tp=splatType[i];
    G.globalAlpha=a*.72;
    let col,glow;
    if(tp===0){ col=`hsl(${h},35%,28%)`; glow=null; }           // dust
    else if(tp===1){ col=`hsl(${h},95%,55%)`; glow=`hsl(${h},95%,50%)`; G.shadowBlur=8; G.shadowColor=glow; } // fire
    else if(tp===2){ col=`hsl(${h},80%,72%)`; glow=`hsl(${h},80%,65%)`; G.shadowBlur=6; G.shadowColor=glow; } // ice
    else { col=`hsl(${h},100%,65%)`; glow=`hsl(${h},100%,55%)`; G.shadowBlur=10; G.shadowColor=glow; }         // energy
    G.fillStyle=col;
    G.beginPath();G.arc(x,y,r*a+0.2,0,TAU);G.fill();
    G.shadowBlur=0;
  }
  G.globalAlpha=1;
}

// ── DEBRIS CHUNKS (spinning rectangular fragments) ────────────────────────────
const DEBRIS_MAX = 80;
const debX   = new Float32Array(DEBRIS_MAX);
const debY   = new Float32Array(DEBRIS_MAX);
const debVX  = new Float32Array(DEBRIS_MAX);
const debVY  = new Float32Array(DEBRIS_MAX);
const debRot = new Float32Array(DEBRIS_MAX);
const debRotV= new Float32Array(DEBRIS_MAX);
const debW   = new Float32Array(DEBRIS_MAX);
const debH2  = new Float32Array(DEBRIS_MAX);
const debLife= new Float32Array(DEBRIS_MAX);
const debML  = new Float32Array(DEBRIS_MAX);
const debCol = new Array(DEBRIS_MAX).fill('#888');
const debAct = new Uint8Array(DEBRIS_MAX);
let debHead  = 0;

function spawnDebris(x,y,n,spd,col,maxW,maxH){
  for(let i=0;i<n;i++){
    let idx=-1;
    for(let k=0;k<DEBRIS_MAX;k++){const s=(debHead+k)%DEBRIS_MAX;if(!debAct[s]){idx=s;break;}}
    if(idx<0)idx=debHead%DEBRIS_MAX;
    debHead=(idx+1)%DEBRIS_MAX;
    const a=Math.random()*TAU, s2=spd*(0.4+Math.random()*0.9);
    debX[idx]=x+(Math.random()-.5)*20; debY[idx]=y+(Math.random()-.5)*20;
    debVX[idx]=cos(a)*s2; debVY[idx]=sin(a)*s2-(2+Math.random()*3);
    debRot[idx]=Math.random()*TAU; debRotV[idx]=(Math.random()-.5)*0.18;
    debW[idx]=2+Math.random()*(maxW||8); debH2[idx]=2+Math.random()*(maxH||5);
    debLife[idx]=500+Math.random()*700; debML[idx]=debLife[idx];
    debCol[idx]=col||'#888888'; debAct[idx]=1;
  }
}

function tickDebris(){
  for(let i=0;i<DEBRIS_MAX;i++){
    if(!debAct[i])continue;
    debLife[i]-=DT;
    if(debLife[i]<=0){debAct[i]=0;continue;}
    debX[i]+=debVX[i]*(DT/16); debY[i]+=debVY[i]*(DT/16);
    debVY[i]+=0.18*(DT/16);    // gravity
    debVX[i]*=0.990;            // air drag
    debRot[i]+=debRotV[i]*(DT/16);
  }
}

function drawDebris(){
  for(let i=0;i<DEBRIS_MAX;i++){
    if(!debAct[i])continue;
    const fa=debLife[i]/debML[i];
    G.save();
    G.globalAlpha=fa*0.85;
    G.translate(debX[i],debY[i]);
    G.rotate(debRot[i]);
    G.fillStyle=debCol[i];
    G.fillRect(-debW[i]/2,-debH2[i]/2,debW[i],debH2[i]);
    // highlight edge
    G.strokeStyle=`rgba(255,255,255,${fa*0.35})`;
    G.lineWidth=0.8;
    G.strokeRect(-debW[i]/2,-debH2[i]/2,debW[i],debH2[i]);
    G.restore();
  }
  G.globalAlpha=1;
}

// ── IMPACT RING (expanding rings on hit) ─────────────────────────────────────
const RINGS = [];
function spawnRing(x,y,maxR,col,dur,thick){
  RINGS.push({x,y,r:0,maxR,col,life:dur,ml:dur,thick:thick||4});
}
function tickRings(){for(let i=RINGS.length-1;i>=0;i--)if((RINGS[i].life-=DT)<=0)RINGS.splice(i,1);}
function drawRings(){
  for(const r of RINGS){
    const a=r.life/r.ml;
    r.r=r.maxR*(1-a);
    G.strokeStyle=r.col+(a*.86)+')';
    G.lineWidth=r.thick*a;
    G.shadowBlur=20; G.shadowColor=r.col+'.88)';
    G.beginPath(); G.arc(r.x,r.y,r.r,0,TAU); G.stroke();
    G.shadowBlur=0;
  }
}

//  DYNAMIC LIGHTING SYSTEM
//  We paint multiple radial light sources on a semi-transparent overlay
// ═══════════════════════════════════════════════════════════════════════════════
const LIGHTS = [];
function addLight(x,y,r,col,life){
  LIGHTS.push({x,y,r,col,life,ml:life||120});
}
function tickLights(){for(let i=LIGHTS.length-1;i>=0;i--)if((LIGHTS[i].life-=DT)<=0)LIGHTS.splice(i,1);}
function drawLights(){
  // Draw each light as additive radial gradient on the canvas
  G.save();
  G.globalCompositeOperation='lighter';
  for(const L of LIGHTS){
    const a=L.life/L.ml;
    const lg=G.createRadialGradient(L.x,L.y,0,L.x,L.y,L.r);
    lg.addColorStop(0,L.col+(a*0.22)+')');
    lg.addColorStop(0.5,L.col+(a*0.08)+')');
    lg.addColorStop(1,'rgba(0,0,0,0)');
    G.fillStyle=lg;
    G.fillRect(L.x-L.r,L.y-L.r,L.r*2,L.r*2);
  }
  G.globalCompositeOperation='source-over';
  G.restore();
}

function drawChestGemLight(){

// ── Lava pools in ground (decorative) ────────────────────────────────────────
const LAVA_POOLS = [];
function initLavaPools(){
  const count = 4 + floor(Math.random()*3);
  for(let i=0;i<count;i++){
    LAVA_POOLS.push({
      x: 30+Math.random()*(W-60),
      y: GY + 8 + Math.random()*30,
      rx: 12+Math.random()*28,
      ry: 4+Math.random()*10,
      phase: Math.random()*TAU,
      speed: 0.8+Math.random()*1.4,
    });
  }
}
function drawLavaPools(){
  for(const lp2 of LAVA_POOLS){
    const pulse=sin(T*lp2.speed+lp2.phase)*.3+.7;
    const r=lp2.rx*(0.88+pulse*0.18);
    const lg=G.createRadialGradient(lp2.x,lp2.y,0,lp2.x,lp2.y,r);
    lg.addColorStop(0,`rgba(255,${round(140+60*pulse)},0,${0.55*pulse})`);
    lg.addColorStop(0.45,`rgba(255,60,0,${0.30*pulse})`);
    lg.addColorStop(0.8,`rgba(160,20,0,${0.12*pulse})`);
    lg.addColorStop(1,'rgba(0,0,0,0)');
    G.save();
    G.shadowBlur=18; G.shadowColor=`rgba(255,80,0,${0.6*pulse})`;
    G.fillStyle=lg;
    G.beginPath();G.ellipse(lp2.x,lp2.y,r,lp2.ry*(0.85+pulse*0.22),0,0,TAU);G.fill();
    // lava surface ripple
    const ripA=sin(T*2.2+lp2.phase)*.5+.5;
    G.strokeStyle=`rgba(255,${round(180+60*ripA)},0,${0.6*ripA*pulse})`;
    G.lineWidth=1.5;
    G.beginPath();G.ellipse(lp2.x,lp2.y,r*.65*(0.9+ripA*.2),lp2.ry*.55*(0.9+ripA*.2),0,0,TAU);G.stroke();
    G.shadowBlur=0;G.restore();
    // spawn lava sparks occasionally
    if(Math.random()<0.02*pulse){
      spawnPart(lp2.x+(Math.random()-.5)*r*0.6,lp2.y,
        (Math.random()-.5)*1.5,-(1+Math.random()*3),
        400+Math.random()*500,1+Math.random()*2.5,
        Math.random()<.5?'#ff6600':'#ff9900','rgba(255,120,0,.7)',0.04,0.95);
    }
  }
}

// ── Ground mist / fog layer ────────────────────────────────────────────────────
const MIST_PUFFS = Array.from({length:10},(_,i)=>({
  x: Math.random(), y: 0.02+Math.random()*0.08,
  w: 80+Math.random()*160, h: 18+Math.random()*32,
  spd: (Math.random()-.5)*0.00012,
  alpha: 0.04+Math.random()*0.10,
  phase: Math.random()*TAU,
}));
function drawMist(){
  for(const m of MIST_PUFFS){
    m.x+=m.spd; if(m.x>1.3)m.x=-0.3; if(m.x<-0.3)m.x=1.3;
    const a=m.alpha*(0.7+sin(T*0.4+m.phase)*0.3);
    const mx=m.x*W, my=GY+m.y*H;
    const mg=G.createRadialGradient(mx,my,0,mx,my,m.w/2);
    mg.addColorStop(0,`rgba(180,120,80,${a})`);
    mg.addColorStop(0.6,`rgba(120,70,40,${a*0.5})`);
    mg.addColorStop(1,'rgba(0,0,0,0)');
    G.fillStyle=mg;
    G.beginPath();G.ellipse(mx,my,m.w/2,m.h/2,0,0,TAU);G.fill();
  }
}

// ── Distant battle smoke columns ───────────────────────────────────────────────
const SMOKE_COLS = Array.from({length:5},(_,i)=>({
  x: 0.05+i*0.22+Math.random()*0.08,
  baseY: 0.55+Math.random()*0.15,
  puffs: Array.from({length:8},(_,j)=>({
    ox:(Math.random()-.5)*30, oy:-j*22, r:12+j*8+Math.random()*12,
    phase:Math.random()*TAU, alpha:0.06-j*0.007,
  })),
  phase: Math.random()*TAU,
}));
function drawSmokeColumns(){
  for(const col of SMOKE_COLS){
    const drift=sin(T*0.25+col.phase)*12;
    for(const puf of col.puffs){
      const px=col.x*W+puf.ox+drift*(puf.oy/-200);
      const py=col.baseY*GY+puf.oy;
      const pa=puf.alpha*(0.6+sin(T*0.6+puf.phase)*0.4);
      const sg=G.createRadialGradient(px,py,0,px,py,puf.r);
      sg.addColorStop(0,`rgba(80,70,65,${pa})`);
      sg.addColorStop(1,'rgba(0,0,0,0)');
      G.fillStyle=sg;G.beginPath();G.arc(px,py,puf.r,0,TAU);G.fill();
    }
  }
}

// ─── HEAT SHIMMER EFFECT ──────────────────────────────────────────────────────
// Draws a subtle wave distortion near the ground using clipping
let heatPhase=0;
function drawHeatShimmer(){
  heatPhase+=DT*0.004;
  const bandH=24, bandY=GY-bandH;
  G.save();
  G.beginPath();G.rect(0,bandY,W,bandH*2);G.clip();
  for(let x=0;x<W;x+=4){
    const wave=sin(x*0.04+heatPhase)*3+sin(x*0.07-heatPhase*1.3)*2;
    const alpha=0.015*(0.5+sin(x*0.02+heatPhase*0.8)*0.5);
    G.fillStyle=`rgba(255,140,30,${alpha})`;
    G.fillRect(x,bandY+wave,4,bandH);
  }
  G.restore();
}

// ── Chest armor dynamic scratches & wear ──────────────────────────────────────
// These scratch lines are pre-computed and stored relative to chest center
const CHEST_SCRATCHES = Array.from({length:18},(_,i)=>{
  const cx=(Math.random()-.5)*30, cy=(Math.random()-.5)*28;

// ── Shield surface wear ────────────────────────────────────────────────────────
const SHIELD_DENTS = Array.from({length:12},()=>({

// ═══════════════════════════════════════════════════════════════════════════════
//  ADVANCED ANIMATION CURVES
//  Procedural animation helpers for more organic motion
// ═══════════════════════════════════════════════════════════════════════════════

// Perlin-like noise (simple 1D implementation using sum of sines)
function noise1D(x, octaves=4){
  let v=0, amp=1, freq=1, maxAmp=0;
  for(let i=0;i<octaves;i++){
    v+=sin(x*freq+i*12.34)*amp;
    maxAmp+=amp; amp*=0.5; freq*=2.02;
  }
  return v/maxAmp; // -1 to 1
}

// Spring damper for smooth follow
function spring(current, target, velocity, stiffness, damping){
  const force = (target-current)*stiffness - velocity*damping;
  return {val: current+velocity*(DT/1000), vel: velocity+force*(DT/1000)};
}

// ── Cape/cloth simulation (procedural fabric behind torso) ─────────────────────
// The cape attaches at shoulder height and flows dynamically
const CAPE_SEGS = 10;
const capeX = new Float32Array(CAPE_SEGS);
const capeY = new Float32Array(CAPE_SEGS);
const capeVX = new Float32Array(CAPE_SEGS);
const capeVY = new Float32Array(CAPE_SEGS);
const CAPE_SEG_LEN = 14;
let capeInited = false;

function initCape(anchorX, anchorY){
  for(let i=0;i<CAPE_SEGS;i++){
    capeX[i]=anchorX; capeY[i]=anchorY+i*CAPE_SEG_LEN;
    capeVX[i]=0; capeVY[i]=0;
  }
  capeInited=true;
}

function tickCape(anchorX, anchorY){
  if(!capeInited)initCape(anchorX,anchorY);
  // Anchor point follows knight shoulder
  capeX[0]=anchorX; capeY[0]=anchorY;
  capeVX[0]=0; capeVY[0]=0;
  // Wind force (changes slowly over time)
  const windX=noise1D(T*0.3)*2.5 * FACING;
  const windY=noise1D(T*0.22+99)*1.0;
  // Verlet integration for each segment
  for(let i=1;i<CAPE_SEGS;i++){
    capeVX[i]+=(windX + noise1D(T*0.8+i*3.14)*1.2) * (DT/16);
    capeVY[i]+=(windY + 0.28) * (DT/16); // gravity
    capeVX[i]*=0.88; capeVY[i]*=0.90;    // damping
    capeX[i]+=capeVX[i]*(DT/16);
    capeY[i]+=capeVY[i]*(DT/16);
    // Constraint: maintain segment length
    const dx=capeX[i]-capeX[i-1], dy=capeY[i]-capeY[i-1];
    const d=sqrt(dx*dx+dy*dy)||1;
    const correction=CAPE_SEG_LEN/d;
    capeX[i]=capeX[i-1]+dx*correction;
    capeY[i]=capeY[i-1]+dy*correction;
  }
}

function drawCape(anchorX, anchorY){
  if(!KN.visible||KN.y<-200)return;
  tickCape(anchorX, anchorY);
  // Draw cape as filled polygon (left edge → right edge)
  const halfW = 18;
  G.save();
  // Build left and right edge points
  const leftPts=[], rightPts=[];
  for(let i=0;i<CAPE_SEGS;i++){
    // Compute perpendicular to segment direction
    let dx, dy;
    if(i<CAPE_SEGS-1){ dx=capeX[i+1]-capeX[i]; dy=capeY[i+1]-capeY[i]; }
    else { dx=capeX[i]-capeX[i-1]; dy=capeY[i]-capeY[i-1]; }
    const d=sqrt(dx*dx+dy*dy)||1;
    const nx=-dy/d, ny=dx/d;
    const w=halfW*(1-i/CAPE_SEGS*0.6)*(0.85+noise1D(T*0.5+i)*0.15);
    leftPts.push( {x:capeX[i]+nx*w, y:capeY[i]+ny*w});
    rightPts.push({x:capeX[i]-nx*w, y:capeY[i]-ny*w});
  }
  // Draw filled cape body
  const capGrd=G.createLinearGradient(anchorX-halfW,anchorY,anchorX+halfW,anchorY+CAPE_SEGS*CAPE_SEG_LEN);
  capGrd.addColorStop(0,'rgba(60,10,5,0.88)');
  capGrd.addColorStop(0.4,'rgba(120,15,8,0.80)');
  capGrd.addColorStop(0.8,'rgba(80,10,5,0.65)');
  capGrd.addColorStop(1,'rgba(40,5,2,0)');
  G.fillStyle=capGrd;
  G.beginPath();
  G.moveTo(leftPts[0].x,leftPts[0].y);
  for(let i=1;i<CAPE_SEGS;i++) G.lineTo(leftPts[i].x,leftPts[i].y);
  for(let i=CAPE_SEGS-1;i>=0;i--) G.lineTo(rightPts[i].x,rightPts[i].y);
  G.closePath();G.fill();
  // Cape edge highlight
  G.strokeStyle='rgba(180,40,20,0.45)';G.lineWidth=1.5;
  G.beginPath();G.moveTo(leftPts[0].x,leftPts[0].y);
  for(let i=1;i<CAPE_SEGS;i++)G.lineTo(leftPts[i].x,leftPts[i].y);G.stroke();
  G.strokeStyle='rgba(80,15,5,0.55)';G.lineWidth=1;
  G.beginPath();G.moveTo(rightPts[0].x,rightPts[0].y);
  for(let i=1;i<CAPE_SEGS;i++)G.lineTo(rightPts[i].x,rightPts[i].y);G.stroke();
  // Cape inner detail lines
  G.strokeStyle='rgba(150,30,10,0.18)';G.lineWidth=0.8;
  for(let i=1;i<CAPE_SEGS-1;i+=2){
    G.beginPath();G.moveTo(leftPts[i].x,leftPts[i].y);G.lineTo(rightPts[i].x,rightPts[i].y);G.stroke();
  }
  G.restore();
}

// ── Dash charge aura (pre-dash glow around knight body) ────────────────────────

// ── Sweep motion blur effect ───────────────────────────────────────────────────
// Draws trailing versions of the spear at previous positions
const SPEAR_TRAIL = [];
let spearTrailTimer = 0;
function updateSpearTrail(){
  spearTrailTimer+=DT;
  if(KN.state==='sweep'&&KN.phase===1&&JP.spTp&&spearTrailTimer>18){
    spearTrailTimer=0;
    SPEAR_TRAIL.push({
      ax:JP.spBe.x, ay:JP.spBe.y,
      bx:JP.spTp.x, by:JP.spTp.y,
      life:200, ml:200,
    });
  }
  for(let i=SPEAR_TRAIL.length-1;i>=0;i--){
    SPEAR_TRAIL[i].life-=DT;
    if(SPEAR_TRAIL[i].life<=0)SPEAR_TRAIL.splice(i,1);
  }
}
function drawSpearTrail(){
  if(SPEAR_TRAIL.length<2)return;
  for(let i=0;i<SPEAR_TRAIL.length-1;i++){
    const t=SPEAR_TRAIL[i],t2=SPEAR_TRAIL[i+1];
    const fa=t.life/t.ml;
    G.strokeStyle=`rgba(255,200,80,${fa*0.35})`;
    G.lineWidth=4*fa;
    G.shadowBlur=14;G.shadowColor='rgba(255,180,0,0.6)';
    G.beginPath();
    G.moveTo(t.ax,t.ay);G.lineTo(t.bx,t.by);G.stroke();
    G.shadowBlur=0;
  }
}

// ── Thrust spear shaft energy lines ────────────────────────────────────────────
function drawThrustEnergyLines(){
  if(KN.state!=='thrust'||(KN.phase!==1&&KN.phase!==2))return;
  if(!JP.rHn||!JP.spTp)return;
  const numLines=6;
  for(let i=0;i<numLines;i++){
    const progress=i/numLines;
    const lx1=lp(JP.rHn.x,JP.spTp.x,progress);
    const ly1=lp(JP.rHn.y,JP.spTp.y,progress);
    const lx2=lp(JP.rHn.x,JP.spTp.x,progress+0.1);
    const ly2=lp(JP.rHn.y,JP.spTp.y,progress+0.1);
    const offset=sin(T*8+i)*4;
    const dx=-(ly2-ly1), dy=lx2-lx1;
    const d=sqrt(dx*dx+dy*dy)||1;
    G.strokeStyle=`rgba(180,220,255,${0.4*(1-progress)})`;
    G.lineWidth=1.5;
    G.beginPath();
    G.moveTo(lx1+dx/d*offset,ly1+dy/d*offset);
    G.lineTo(lx2+dx/d*offset,ly2+dy/d*offset);G.stroke();
  }
}

// ── Meteor descent flame trail (more detailed) ─────────────────────────────────
function drawMeteorFlameTrail(){
  if(!MTR.active)return;
  const numFlames=8;
  for(let i=0;i<numFlames;i++){
    const trailY=MTR.y+i*16+Math.random()*8;
    const spread=(i/numFlames)*25;
    const alpha=max(0,1-i/numFlames)*(0.5+Math.random()*0.4);
    const innerR=G.createRadialGradient(MTR.x,trailY,0,MTR.x,trailY,spread);
    innerR.addColorStop(0,`rgba(255,255,200,${alpha})`);
    innerR.addColorStop(0.4,`rgba(255,120,0,${alpha*0.6})`);
    innerR.addColorStop(1,'rgba(255,30,0,0)');
    G.fillStyle=innerR;
    G.beginPath();G.arc(MTR.x,trailY,spread,0,TAU);G.fill();
  }
}

// ── Heal magic particle fountain ───────────────────────────────────────────────
// Additional green particle fountain rising from center of heal circle
function drawHealFountain(){
  if(!HC.active)return;
  const cx=HC.x, cy=HC.y;
  // Fountain particles already spawned via spawnOrb,
  // add central rising energy beam visual
  const beamAlpha=min(1,HC.life/500)*0.35;
  if(beamAlpha<=0)return;
  const bh=80;
  const bGrd=G.createLinearGradient(cx,cy,cx,cy-bh);
  bGrd.addColorStop(0,`rgba(0,255,80,${beamAlpha})`);
  bGrd.addColorStop(0.5,`rgba(0,200,60,${beamAlpha*0.6})`);
  bGrd.addColorStop(1,'rgba(0,255,80,0)');
  G.fillStyle=bGrd;
  G.fillRect(cx-4,cy-bh,8,bh);

  for(let i=0;i<3;i++){

    wg.addColorStop(0,`rgba(0,255,80,${beamAlpha*0.5})`);
    wg.addColorStop(1,'rgba(0,255,80,0)');

  }
}

const GROUND_RUNES = [
  {x:0.15,r:32,ang:0,spd:0.004,alpha:0.10,col:'rgba(180,60,0,'},
  {x:0.85,r:28,ang:PI,spd:-0.005,alpha:0.08,col:'rgba(160,40,0,'},

];
function drawGroundRunes(){

// ── Torches ───────────────────────────────────────────────────────────────────
const TORCHES = [
  {x:0.05,tall:true},{x:0.95,tall:true},
  {x:0.22,tall:false},{x:0.78,tall:false},
];
function drawTorches(){
  for(const tc of TORCHES){
    const tx=tc.x*W, ty=GY-(tc.tall?90:65);
    // pole
    G.fillStyle='#3a2000';G.fillRect(tx-3,ty,6,tc.tall?90:65);
    G.strokeStyle='#5a3800';G.lineWidth=1;G.strokeRect(tx-3,ty,6,tc.tall?90:65);
    // bracket
    G.fillStyle='#8a6020';G.fillRect(tx-7,ty-6,14,8);
    G.strokeStyle='#c8a020';G.lineWidth=0.8;G.strokeRect(tx-7,ty-6,14,8);
    // flame flicker
    const flick=sin(T*4.5+tc.x*20)*.4+sin(T*6.8+tc.x*35)*.25;
    const fh=22+flick*8, fw=10+flick*4;
    // outer flame glow
    const fgOuter=G.createRadialGradient(tx,ty-6,0,tx,ty-6,fw*2);
    fgOuter.addColorStop(0,`rgba(255,${round(140+60*flick)},0,${0.12+flick*0.04})`);
    fgOuter.addColorStop(1,'rgba(255,80,0,0)');
    G.fillStyle=fgOuter;G.beginPath();G.arc(tx,ty-6,fw*2,0,TAU);G.fill();
    // inner flame
    const fg=G.createRadialGradient(tx,ty-6-fh/2,1,tx,ty-6,fw);
    fg.addColorStop(0,'rgba(255,255,200,0.95)');
    fg.addColorStop(0.3,`rgba(255,${round(160+40*flick)},0,0.85)`);
    fg.addColorStop(0.7,'rgba(255,60,0,0.5)');
    fg.addColorStop(1,'rgba(255,20,0,0)');
    G.shadowBlur=18;G.shadowColor=`rgba(255,${round(120+60*flick)},0,0.8)`;
    G.fillStyle=fg;
    G.beginPath();
    G.moveTo(tx,ty-6-fh);
    G.bezierCurveTo(tx-fw*0.7,ty-6-fh*.3,tx-fw,ty-6,tx,ty-6);
    G.bezierCurveTo(tx+fw,ty-6,tx+fw*0.7,ty-6-fh*.3,tx,ty-6-fh);
    G.fill();G.shadowBlur=0;
    // occasional spark
    if(Math.random()<0.04){
      spawnPart(tx+(Math.random()-.5)*fw, ty-6-fh+Math.random()*5,
        (Math.random()-.5)*0.8, -(0.5+Math.random()*1.5),
        300+Math.random()*300,1+Math.random()*1.5,
        Math.random()<.5?'#ffcc00':'#ff6600','rgba(255,150,0,0.7)',0.02,0.95);
    }
  }
}

// ── Stone pillars ──────────────────────────────────────────────────────────────
const PILLARS = [{x:0.08},{x:0.92}];
function drawPillars(){
  for(const pl of PILLARS){
    const px=pl.x*W;
    const pillH=GY*0.45, pillW=24, pillTop=GY-pillH;
    // pillar body
    const pg=G.createLinearGradient(px-pillW/2,0,px+pillW/2,0);
    pg.addColorStop(0,'#1c1c1c');pg.addColorStop(0.25,'#5a5a5a');
    pg.addColorStop(0.55,'#484848');pg.addColorStop(0.85,'#2c2c2c');pg.addColorStop(1,'#141414');
    G.fillStyle=pg;G.fillRect(px-pillW/2,pillTop,pillW,pillH);
    G.strokeStyle='#363636';G.lineWidth=1;G.strokeRect(px-pillW/2,pillTop,pillW,pillH);
    // cap & base
    for(const yOff of[pillTop-6,GY-6]){
      G.fillStyle='#404040';G.fillRect(px-pillW/2-4,yOff,pillW+8,8);
      G.strokeStyle='#606060';G.lineWidth=0.8;G.strokeRect(px-pillW/2-4,yOff,pillW+8,8);
    }
    // horizontal groove lines
    for(let i=0;i<5;i++){
      const gy2=pillTop+pillH*((i+1)/6);
      G.strokeStyle='rgba(80,80,80,0.6)';G.lineWidth=0.7;
      G.beginPath();G.moveTo(px-pillW/2,gy2);G.lineTo(px+pillW/2,gy2);G.stroke();
    }
    // moss/stain at base
    G.fillStyle='rgba(20,40,10,0.18)';G.fillRect(px-pillW/2,GY-pillH*.2,pillW,pillH*.2);
  }
}
