<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>重甲騎士 BOSS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none}
#c{display:block;margin:0 auto}
#ui{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:6px 4px 10px;display:flex;gap:4px;justify-content:center;background:linear-gradient(transparent,rgba(0,0,0,.92));z-index:10}
.sb{position:relative;flex:1;height:62px;border:2px solid rgba(255,200,80,.6);border-radius:8px;background:linear-gradient(160deg,rgba(30,20,5,.95),rgba(60,40,10,.95));color:#f0c040;font-size:8.5px;font-weight:700;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-align:center;user-select:none;-webkit-tap-highlight-color:transparent;box-shadow:0 0 8px rgba(255,180,0,.3)}
.sb.cd{cursor:not-allowed;border-color:rgba(100,80,30,.4);color:rgba(150,120,30,.5)}
.sb .ico{font-size:18px;line-height:1}
.sb .cdov{position:absolute;left:0;bottom:0;width:100%;height:0;background:rgba(0,0,0,.75);pointer-events:none}
.sb .cdt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:900;color:#fff;text-shadow:0 0 8px #fff;pointer-events:none;display:none}
.sb.cd .cdt{display:block}
#hb{position:fixed;top:10px;left:50%;transform:translateX(-50%);width:240px;z-index:10;text-align:center}
#hl{color:#f0c040;font-size:10px;font-weight:700;letter-spacing:2px;text-shadow:0 0 8px #f80;margin-bottom:3px}
#ht{height:12px;background:rgba(0,0,0,.6);border:2px solid rgba(255,150,0,.5);border-radius:6px;overflow:hidden;box-shadow:0 0 10px rgba(255,100,0,.4)}
#hf{height:100%;background:linear-gradient(90deg,#f30,#f80,#fc0);border-radius:4px;transition:width .4s;box-shadow:0 0 10px #f60}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hb"><div id="hl">⚔ 鐵血騎士 IRONCLAD ⚔</div><div id="ht"><div id="hf" style="width:100%"></div></div></div>
<div id="ui">
  <button class="sb" id="b0" onclick="cast(0)"><span class="ico">🛡</span><span>持盾衝刺</span><div class="cdov" id="o0"></div><div class="cdt" id="t0"></div></button>
  <button class="sb" id="b1" onclick="cast(1)"><span class="ico">⚔</span><span>長矛橫掃</span><div class="cdov" id="o1"></div><div class="cdt" id="t1"></div></button>
  <button class="sb" id="b2" onclick="cast(2)"><span class="ico">🗡</span><span>長矛直刺</span><div class="cdov" id="o2"></div><div class="cdt" id="t2"></div></button>
  <button class="sb" id="b3" onclick="cast(3)"><span class="ico">☄</span><span>飛天隕石</span><div class="cdov" id="o3"></div><div class="cdt" id="t3"></div></button>
  <button class="sb" id="b4" onclick="cast(4)"><span class="ico">✨</span><span>回血法陣</span><div class="cdov" id="o4"></div><div class="cdt" id="t4"></div></button>
</div>
<script>
// ═══════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════
const cv=document.getElementById('c'),g=cv.getContext('2d');
let W,H,GY;
function resize(){
  W=cv.width=Math.min(window.innerWidth,480);
  H=cv.height=window.innerHeight-80;
  GY=H*0.72;
}
resize();
window.addEventListener('resize',resize);

let T=0,dt=0,last=performance.now();

// ═══════════════════════════════════════
// SCREEN SHAKE
// ═══════════════════════════════════════
const SK={x:0,y:0,p:0,l:0,ml:1};
function shk(p,d){SK.p=p;SK.l=SK.ml=d;}
function updateShake(){
  if(SK.l>0){
    SK.l-=dt;
    const f=Math.max(0,SK.l/SK.ml);
    SK.x=(Math.random()-.5)*SK.p*f*2;
    SK.y=(Math.random()-.5)*SK.p*f*2;
  }else{SK.x=0;SK.y=0;}
}

// ═══════════════════════════════════════
// EFFECT POOLS
// ═══════════════════════════════════════
let PARTS=[],GHOSTS=[],CRACKS=[],WAVES=[],ORBS=[];
let SWEEPARC=null,TFLASH=null,WARN=null,METEOR=null,HEALMAGIC=null;

function P(x,y,vx,vy,life,r,col,glow,grav){
  PARTS.push({x,y,vx,vy,life,ml:life,r,col,glow:glow||null,grav:grav||0});
}
function burst(x,y,n,s0,s1,life,r,cols,glow,grav){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=s0+Math.random()*(s1-s0);
    P(x,y,Math.cos(a)*s,Math.sin(a)*s,life+Math.random()*life*.5,
      r+Math.random()*r,cols[i%cols.length],glow,grav||.15);
  }
}
function dustLine(x,y,dir,n){
  for(let i=0;i<n;i++)
    P(x+(Math.random()-.5)*14,y,dir*(2+Math.random()*6),
      -(Math.random()*2+.5),350+Math.random()*400,
      2+Math.random()*3,'#b08060',null,.05);
}
function wave(x,y,maxR,col,dur){WAVES.push({x,y,r:0,maxR,col,life:dur,ml:dur});}
function makeCracks(cx,cy,n){
  const out=[];
  for(let i=0;i<n;i++){
    const ang=(i/n)*Math.PI*2+Math.random()*.45;
    const len=55+Math.random()*110;
    const pts=[{x:cx,y:cy}];
    let bx=cx,by=cy,ba=ang;
    for(let s=0;s<5;s++){
      const sl=len/5*(.5+Math.random()*.9);
      bx+=Math.cos(ba)*sl; by+=Math.sin(ba)*sl;
      pts.push({x:bx,y:by}); ba+=(Math.random()-.5)*.75;
    }
    out.push({pts,life:4200,ml:4200,w:1.8+Math.random()*2.6});
  }
  return out;
}

// ═══════════════════════════════════════
// COOLDOWN
// ═══════════════════════════════════════
const CD_TIMES=[4000,5500,3500,9000,7000];
let cdR=[0,0,0,0,0],cdM=[0,0,0,0,0],hp=100;
function updateCD(){
  for(let i=0;i<5;i++){
    if(cdR[i]>0){
      cdR[i]-=dt;
      if(cdR[i]<=0){
        cdR[i]=0;
        document.getElementById('b'+i).classList.remove('cd');
        document.getElementById('o'+i).style.height='0%';
        document.getElementById('t'+i).textContent='';
      }else{
        document.getElementById('o'+i).style.height=(cdR[i]/cdM[i]*100)+'%';
        document.getElementById('t'+i).textContent=(cdR[i]/1000).toFixed(1);
      }
    }
  }
}
function cast(i){
  if(cdR[i]>0||KN.state!=='idle')return;
  cdR[i]=cdM[i]=CD_TIMES[i];
  document.getElementById('b'+i).classList.add('cd');
  [startDash,startSweep,startThrust,startMeteor,startHeal][i]();
}

// ═══════════════════════════════════════
// MATH UTILS
// ═══════════════════════════════════════
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function easeOut3(t){return 1-(1-t)*(1-t)*(1-t);}
function easeInOut(t){return t<.5?2*t*t:1-2*(1-t)*(1-t);}

// rounded rect helper
function rr(x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y);g.lineTo(x+w-r,y);
  g.quadraticCurveTo(x+w,y,x+w,y+r);
  g.lineTo(x+w,y+h-r);g.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  g.lineTo(x+r,y+h);g.quadraticCurveTo(x,y+h,x,y+h-r);
  g.lineTo(x,y+r);g.quadraticCurveTo(x,y,x+r,y);
  g.closePath();
}

// ═══════════════════════════════════════════════════════════════
// FULL SKELETAL SYSTEM
// ═══════════════════════════════════════════════════════════════
// Each joint is an object with:
//   angle   – local rotation (rad) relative to parent's world direction
//   tAngle  – target angle (lerped toward)
//   speed   – lerp speed (higher = snappier)
//   len     – bone length (distance from this joint pivot to child pivot)
//   wx,wy   – world position of this joint pivot (computed by FK)
//   wa      – world angle (computed by FK)
// ═══════════════════════════════════════════════════════════════

function mkJoint(angle,len,speed){
  return {angle:angle,tAngle:angle,speed:speed||8,len:len,wx:0,wy:0,wa:0};
}

const J={
  // ── PELVIS (root pivot, positioned at hipY in world) ──
  pelvis:    mkJoint(0, 0, 99),   // always at hip world pos

  // ── SPINE (3 segments, goes upward so base angle = -PI/2) ──
  spineLow:  mkJoint(-Math.PI/2, 24, 12),
  spineMid:  mkJoint(0,          24, 12),
  spineHigh: mkJoint(0,          22, 12),

  // ── NECK + HEAD ──
  neck:      mkJoint(0, 14, 14),
  head:      mkJoint(0,  0, 14),

  // ── LEFT CLAVICLE + ARM (shield side) ──
  lClav:     mkJoint(Math.PI*.55,  16, 12),
  lUpper:    mkJoint(Math.PI*.3,   34, 10),
  lLower:    mkJoint(-Math.PI*.25, 28, 10),
  lHand:     mkJoint(0,            10, 10),

  // ── RIGHT CLAVICLE + ARM (spear side) ──
  rClav:     mkJoint(-Math.PI*.55, 16, 12),
  rUpper:    mkJoint(-Math.PI*.25, 34, 10),
  rLower:    mkJoint(Math.PI*.3,   28, 10),
  rHand:     mkJoint(0,            10, 10),

  // ── LEFT LEG ──
  lHip:      mkJoint(Math.PI*.08,  0,  10),  // offset pivot
  lThigh:    mkJoint(Math.PI*.1,   38, 10),
  lShin:     mkJoint(Math.PI*.05,  34, 10),
  lFoot:     mkJoint(-Math.PI*.12, 18, 10),
  lToe:      mkJoint(Math.PI*.05,   8, 10),

  // ── RIGHT LEG ──
  rHip:      mkJoint(-Math.PI*.08, 0,  10),
  rThigh:    mkJoint(-Math.PI*.1,  38, 10),
  rShin:     mkJoint(-Math.PI*.05, 34, 10),
  rFoot:     mkJoint(Math.PI*.12,  18, 10),
  rToe:      mkJoint(-Math.PI*.05,  8, 10),

  // ── SPEAR segments ──
  spearBase: mkJoint(0, 50, 14),
  spearMid:  mkJoint(0, 55, 14),
  spearTip:  mkJoint(0,  0, 14),
};

// Idle reference angles
const IDLE_ANGLES={
  pelvis:    0,
  spineLow:  -Math.PI/2,
  spineMid:  0,
  spineHigh: 0,
  neck:      0,
  head:      0,
  lClav:     Math.PI*.52,
  lUpper:    Math.PI*.28,
  lLower:    -Math.PI*.22,
  lHand:     0,
  rClav:     -Math.PI*.52,
  rUpper:    -Math.PI*.22,
  rLower:    Math.PI*.28,
  rHand:     0,
  lHip:      Math.PI*.08,
  lThigh:    Math.PI*.1,
  lShin:     Math.PI*.05,
  lFoot:     -Math.PI*.12,
  lToe:      Math.PI*.05,
  rHip:      -Math.PI*.08,
  rThigh:    -Math.PI*.1,
  rShin:     -Math.PI*.05,
  rFoot:     Math.PI*.12,
  rToe:      -Math.PI*.05,
  spearBase: 0,
  spearMid:  0,
  spearTip:  0,
};

function setTargetAngles(obj){
  for(const k in obj){
    if(J[k]) J[k].tAngle=obj[k];
  }
}
function setIdleAngles(){setTargetAngles(IDLE_ANGLES);}

function lerpAllJoints(globalSpeedMult){
  const m=globalSpeedMult||1;
  for(const k in J){
    const j=J[k];
    const k2=clamp(j.speed*m*dt/1000,0,1);
    j.angle=lerp(j.angle,j.tAngle,k2);
  }
}

// ═══════════════════════════════════════════════════════════════
// FORWARD KINEMATICS
// Computes wx,wy,wa for every joint
// hipWorldX,hipWorldY = world position of pelvis pivot
// facing = +1 or -1
// ═══════════════════════════════════════════════════════════════
let KN_FACING=1;
let KN_HIP_X=0, KN_HIP_Y=0;
let KN_LEAN=0;        // trunk lean (added to all spine angles)
let KN_SQUAT=0;       // extra Y offset (positive = lower)

function runFK(){
  const f=KN_FACING;

  // PELVIS
  J.pelvis.wx=KN_HIP_X;
  J.pelvis.wy=KN_HIP_Y+KN_SQUAT;
  J.pelvis.wa=J.pelvis.angle;

  // SPINE (upward chain: spineLow → spineMid → spineHigh)
  fkChain(J.pelvis, J.spineLow,  f, KN_LEAN);
  fkChain(J.spineLow, J.spineMid, f, KN_LEAN*.3);
  fkChain(J.spineMid, J.spineHigh,f, KN_LEAN*.2);

  // NECK + HEAD
  fkChain(J.spineHigh, J.neck, f, 0);
  fkChain(J.neck, J.head, f, 0);

  // LEFT ARM
  fkChain(J.spineHigh, J.lClav,  f, 0);
  fkChain(J.lClav,  J.lUpper, f, 0);
  fkChain(J.lUpper, J.lLower, f, 0);
  fkChain(J.lLower, J.lHand,  f, 0);

  // RIGHT ARM
  fkChain(J.spineHigh, J.rClav,  f, 0);
  fkChain(J.rClav,  J.rUpper, f, 0);
  fkChain(J.rUpper, J.rLower, f, 0);
  fkChain(J.rLower, J.rHand,  f, 0);

  // LEFT LEG (offset by -12*f from pelvis)
  J.lHip.wx=J.pelvis.wx - 12*f;
  J.lHip.wy=J.pelvis.wy;
  J.lHip.wa=J.pelvis.wa + J.lHip.angle*f;
  fkStep(J.lHip, J.lThigh, f, 0);
  fkStep(J.lThigh, J.lShin, f, 0);
  fkStep(J.lShin, J.lFoot, f, 0);
  fkStep(J.lFoot, J.lToe, f, 0);

  // RIGHT LEG (offset by +12*f from pelvis)
  J.rHip.wx=J.pelvis.wx + 12*f;
  J.rHip.wy=J.pelvis.wy;
  J.rHip.wa=J.pelvis.wa + J.rHip.angle*f;
  fkStep(J.rHip, J.rThigh, f, 0);
  fkStep(J.rThigh, J.rShin, f, 0);
  fkStep(J.rShin, J.rFoot, f, 0);
  fkStep(J.rFoot, J.rToe, f, 0);

  // SPEAR (child of rHand)
  fkChain(J.rHand, J.spearBase, f, 0);
  fkChain(J.spearBase, J.spearMid, f, 0);
  fkChain(J.spearMid, J.spearTip, f, 0);
}

// fkChain: parent drives child using parent's world angle + child's local angle
// leanAdd: extra angle added (for trunk lean propagation)
function fkChain(parent, child, f, leanAdd){
  child.wa = parent.wa + child.angle*f + (leanAdd||0)*f;
  child.wx = parent.wx + Math.cos(parent.wa)*parent.len;
  child.wy = parent.wy + Math.sin(parent.wa)*parent.len;
}
// fkStep: for leg joints that go downward (angle relative to vertical)
function fkStep(parent, child, f, extra){
  // legs: angle is relative to "straight down" (PI/2)
  child.wa = parent.wa + child.angle*f + (extra||0);
  child.wx = parent.wx + Math.cos(child.wa)*parent.len;
  child.wy = parent.wy + Math.sin(child.wa)*parent.len;
}

// ═══════════════════════════════════════════════════════════════
// KNIGHT CONTROLLER
// ═══════════════════════════════════════════════════════════════
const KN={
  worldX:0, worldY:0,
  facing:1, visible:true,
  state:'idle', phase:0, phaseT:0, stateT:0,
  spearExtend:0,   // extra length added to spear segments
};

// HIP is always at worldY - HIP_HEIGHT
const HIP_HEIGHT=58;

function updateKnightHip(){
  KN_HIP_X=KN.worldX;
  KN_HIP_Y=KN.worldY-HIP_HEIGHT;
  KN_FACING=KN.facing;
}

// ═══════════════════════════════════════════════════════════════
// IDLE BREATHING
// ═══════════════════════════════════════════════════════════════
function updateIdle(){
  const b=Math.sin(T*1.2);
  const b2=Math.sin(T*0.8+0.5);
  // Gentle spine sway
  J.spineMid.angle=IDLE_ANGLES.spineMid+b*0.015;
  J.spineHigh.angle=IDLE_ANGLES.spineHigh+b*0.02;
  // Head slight nod
  J.neck.angle=IDLE_ANGLES.neck+b*0.03;
  J.head.angle=IDLE_ANGLES.head+b2*0.02;
  // Arms drift with breath
  J.lClav.angle=IDLE_ANGLES.lClav+b*0.03;
  J.rClav.angle=IDLE_ANGLES.rClav-b*0.03;
  J.lUpper.angle=IDLE_ANGLES.lUpper+b*0.04;
  J.rUpper.angle=IDLE_ANGLES.rUpper-b*0.04;
  // Subtle weight shift in hips
  J.lThigh.angle=IDLE_ANGLES.lThigh+b2*0.02;
  J.rThigh.angle=IDLE_ANGLES.rThigh-b2*0.02;
  // Squat with breath
  KN_SQUAT=-b*2.5;
  KN_LEAN=0;
}

// ═══════════════════════════════════════════════════════════════
// SKILL: DASH
// ═══════════════════════════════════════════════════════════════
let dashSX=0,dashEX=0,dashGT=0;
function startDash(){
  KN.state='dash';KN.phase=0;KN.phaseT=0;KN.stateT=0;KN.facing=1;GHOSTS=[];
  dashSX=KN.worldX;dashEX=Math.min(W-70,KN.worldX+W*.44);
  // TELEGRAPH: body coils back, shield arm draws back, legs crouch
  setTargetAngles({
    spineLow:  IDLE_ANGLES.spineLow,
    spineMid:  -0.18,
    spineHigh: -0.22,
    neck:      0.1,
    head:      0.1,
    // Left (shield) arm: pulls shield back to protect body
    lClav:     Math.PI*.65,
    lUpper:    Math.PI*.55,
    lLower:    -Math.PI*.05,
    lHand:     Math.PI*.1,
    // Right (spear) arm: coils far back
    rClav:     -Math.PI*.80,
    rUpper:    -Math.PI*.70,
    rLower:    Math.PI*.60,
    rHand:     -Math.PI*.2,
    // Legs: deep crouch
    lThigh:    Math.PI*.30,
    lShin:     Math.PI*.55,
    lFoot:     -Math.PI*.30,
    rThigh:    Math.PI*.28,
    rShin:     Math.PI*.52,
    rFoot:     -Math.PI*.28,
  });
  // Speed up all joints for telegraph
  for(const k in J) J[k].speed=14;
}
function updateDash(){
  if(KN.phase===0){
    lerpAllJoints(1);
    KN_LEAN=-0.15;
    KN_SQUAT=14;
    if(KN.phaseT>380){
      KN.phase=1;KN.phaseT=0;dashGT=0;
      // BURST: full forward lunge
      setTargetAngles({
        spineMid:  0.28,
        spineHigh: 0.32,
        neck:      -0.12,
        head:      -0.1,
        // Shield arm: punches hard forward and slightly down
        lClav:     Math.PI*.30,
        lUpper:    -Math.PI*.28,
        lLower:    Math.PI*.08,
        lHand:     -Math.PI*.05,
        // Spear arm: trails behind body
        rClav:     -Math.PI*.35,
        rUpper:    Math.PI*.40,
        rLower:    Math.PI*.15,
        rHand:     0,
        // Back leg: drives hard (extended), front leg reaches
        lThigh:    -Math.PI*.42,
        lShin:     Math.PI*.08,
        lFoot:     Math.PI*.30,
        rThigh:    Math.PI*.48,
        rShin:     Math.PI*.62,
        rFoot:     -Math.PI*.35,
      });
      for(const k in J) J[k].speed=28;
    }
  } else if(KN.phase===1){
    // Running animation layered on top of burst pose
    const p=Math.min(1,KN.phaseT/310);
    const e=easeOut3(p);
    KN.worldX=dashSX-30+e*(dashEX-dashSX+30);
    KN_LEAN=0.26;
    KN_SQUAT=-4;

    // Running leg cycle
    const cyc=Math.sin(KN.phaseT*.052);
    const cyc2=Math.cos(KN.phaseT*.052);
    J.lThigh.angle=lerp(J.lThigh.angle,IDLE_ANGLES.lThigh+cyc*.65,.18);
    J.lShin.angle=lerp(J.lShin.angle,IDLE_ANGLES.lShin+Math.abs(cyc)*.70,.18);
    J.lFoot.angle=lerp(J.lFoot.angle,IDLE_ANGLES.lFoot+cyc*.30,.18);
    J.rThigh.angle=lerp(J.rThigh.angle,IDLE_ANGLES.rThigh-cyc*.65,.18);
    J.rShin.angle=lerp(J.rShin.angle,IDLE_ANGLES.rShin+Math.abs(cyc2)*.60,.18);
    J.rFoot.angle=lerp(J.rFoot.angle,IDLE_ANGLES.rFoot-cyc*.28,.18);
    // Arms pump opposite legs
    J.lUpper.angle=lerp(J.lUpper.angle,IDLE_ANGLES.lUpper-cyc2*.22,.15);
    J.rUpper.angle=lerp(J.rUpper.angle,IDLE_ANGLES.rUpper+cyc2*.18,.15);
    // Spine subtle twist
    J.spineMid.angle=lerp(J.spineMid.angle,0.28+cyc*.05,.1);

    lerpAllJoints(1);

    dashGT+=dt;
    if(dashGT>14){
      dashGT=0;
      // snapshot current world positions for ghost
      const snap={
        wx:KN.worldX,wy:KN.worldY,f:KN.facing,life:500,ml:500,
        // arm positions for ghost silhouette
        lHx:J.lHand.wx,lHy:J.lHand.wy,
        rHx:J.rHand.wx,rHy:J.rHand.wy,
        hx:J.head.wx,hy:J.head.wy,
        // hip
        pWx:J.pelvis.wx,pWy:J.pelvis.wy,
        // knees
        lKx:J.lShin.wx,lKy:J.lShin.wy,
        rKx:J.rShin.wx,rKy:J.rShin.wy,
        // feet

  g.fillStyle=sg2;g.beginPath();g.ellipse(KN.worldX,KN.worldY,52,11,0,0,Math.PI*2);g.fill();

  // Draw order: back leg → back arm → torso → front arm → front leg → head/helmet
  // (facing=1: left=back, right=front for legs; reversed for arms since shield is left)
  if(KN.facing===1){
    drawLeg(J.lHip,J.lThigh,J.lShin,J.lFoot,J.lToe,'back');
    drawUpperArm(J.rClav,J.rUpper,J.rLower,J.rHand,'spear');
    drawTorso();
    drawShieldArm(J.lClav,J.lUpper,J.lLower,J.lHand);
    drawLeg(J.rHip,J.rThigh,J.rShin,J.rFoot,J.rToe,'front');
  } else {
    drawLeg(J.rHip,J.rThigh,J.rShin,J.rFoot,J.rToe,'back');
    drawUpperArm(J.lClav,J.lUpper,J.lLower,J.lHand,'spear');
    drawTorso();
    drawShieldArm(J.rClav,J.rUpper,J.rLower,J.rHand);
    drawLeg(J.lHip,J.lThigh,J.lShin,J.lFoot,J.lToe,'front');
  }
  drawHelmet();
}

// ─── SEGMENT DRAWING HELPERS ─────────────────────────────────
// Draw a limb segment from joint A to joint B as a rounded trapezoid
function drawSegment(ax,ay,bx,by,wA,wB,fillGrad,strokeCol,strokeW){
  const dx=bx-ax,dy=by-ay;
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=dy/len,ny=-dx/len; // normal
  g.beginPath();
  g.moveTo(ax+nx*wA,ay+ny*wA);
  g.lineTo(bx+nx*wB,by+ny*wB);
  g.lineTo(bx-nx*wB,by-ny*wB);
  g.lineTo(ax-nx*wA,ay-ny*wA);
  g.closePath();
  g.fillStyle=fillGrad;g.fill();
  g.strokeStyle=strokeCol||'#1a1a1a';g.lineWidth=strokeW||1.8;g.stroke();
}
function segGrad(ax,ay,bx,by,c0,c1){
  const grd=g.createLinearGradient(ax,ay,bx,by);grd.addColorStop(0,c0);grd.addColorStop(1,c1);return grd;
}
function sideGrad(ax,ay,bx,by,wA){
  // gradient perpendicular to segment for 3D look
  const dx=bx-ax,dy=by-ay,len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=dy/len,ny=-dx/len;
  const mx=(ax+bx)/2,my=(ay+by)/2;
  const grd=g.createLinearGradient(mx-nx*wA,my-ny*wA,mx+nx*wA,my+ny*wA);
  grd.addColorStop(0,'#282828');grd.addColorStop(.35,'#888');grd.addColorStop(.65,'#6a6a6a');grd.addColorStop(1,'#1e1e1e');
  return grd;
}

// ─── LEG ─────────────────────────────────────────────────────
function drawLeg(jHip,jThigh,jShin,jFoot,jToe,layer){
  const isBack=layer==='back';
  const dimmer=isBack?.72:1;
  // THIGH
  const tg=g.createLinearGradient(jHip.wx,jHip.wy,jThigh.wx,jThigh.wy);
  tg.addColorStop(0,`rgba(${~~(62*dimmer)},${~~(62*dimmer)},${~~(62*dimmer)},1)`);
  tg.addColorStop(.4,`rgba(${~~(128*dimmer)},${~~(128*dimmer)},${~~(128*dimmer)},1)`);
  tg.addColorStop(1,`rgba(${~~(38*dimmer)},${~~(38*dimmer)},${~~(38*dimmer)},1)`);
  drawSegment(jHip.wx,jHip.wy,jThigh.wx,jThigh.wy,11,9,
    sideGrad(jHip.wx,jHip.wy,jThigh.wx,jThigh.wy,12),`rgba(22,22,22,${dimmer})`,2);
  // highlight ridge
  g.strokeStyle=`rgba(255,255,255,${.13*dimmer})`;g.lineWidth=1.8;
  const tmx=(jHip.wx+jThigh.wx)/2,tmy=(jHip.wy+jThigh.wy)/2;
  const tdx=jThigh.wx-jHip.wx,tdy=jThigh.wy-jHip.wy,tlen=Math.sqrt(tdx*tdx+tdy*tdy)||1;
  g.beginPath();g.moveTo(jHip.wx-tdy/tlen*3,jHip.wy+tdx/tlen*3);g.lineTo(jThigh.wx-tdy/tlen*2,jThigh.wy+tdx/tlen*2);g.stroke();
  // gold top trim
  g.strokeStyle=`rgba(200,160,32,${.7*dimmer})`;g.lineWidth=2.2;
  g.beginPath();
  const tnx=tdy/tlen,tny=-tdx/tlen;
  g.moveTo(jHip.wx+tnx*9,jHip.wy+tny*9);g.lineTo(jHip.wx-tnx*9,jHip.wy-tny*9);g.stroke();

  // KNEE CAP
  g.fillStyle=`rgba(${~~(200*dimmer)},${~~(160*dimmer)},${~~(32*dimmer)},1)`;
  g.beginPath();g.arc(jThigh.wx,jThigh.wy,9*dimmer+3,0,Math.PI*2);g.fill();
  g.fillStyle=`rgba(28,28,28,${dimmer})`;g.beginPath();g.arc(jThigh.wx,jThigh.wy,5.5,0,Math.PI*2);g.fill();
  g.fillStyle=`rgba(255,210,80,${.38*dimmer})`;g.beginPath();g.arc(jThigh.wx-1.5,jThigh.wy-2,2.5,0,Math.PI*2);g.fill();

  // SHIN
  drawSegment(jThigh.wx,jThigh.wy,jShin.wx,jShin.wy,9,7,
    sideGrad(jThigh.wx,jThigh.wy,jShin.wx,jShin.wy,10),`rgba(22,22,22,${dimmer})`,1.8);
  // shin guard
  const sdx=jShin.wx-jThigh.wx,sdy=jShin.wy-jThigh.wy,slen=Math.sqrt(sdx*sdx+sdy*sdy)||1;
  g.strokeStyle=`rgba(255,255,255,${.10*dimmer})`;g.lineWidth=1.5;
  g.beginPath();g.moveTo(jThigh.wx+sdx/slen*6,jThigh.wy+sdy/slen*6);g.lineTo(jShin.wx-sdx/slen*5,jShin.wy-sdy/slen*5);g.stroke();
  g.strokeStyle=`rgba(200,160,32,${.55*dimmer})`;g.lineWidth=1.5;
  g.beginPath();g.moveTo(jThigh.wx+sdx/slen*6-sdy/slen*9,jThigh.wy+sdy/slen*6+sdx/slen*9);g.lineTo(jThigh.wx+sdx/slen*6+sdy/slen*9,jThigh.wy+sdy/slen*6-sdx/slen*9);g.stroke();

  // BOOT
  const fdx=jFoot.wx-jShin.wx,fdy=jFoot.wy-jShin.wy,flen=Math.sqrt(fdx*fdx+fdy*fdy)||1;
  const fnx=fdy/flen,fny=-fdx/flen;
  // boot upper
  drawSegment(jShin.wx,jShin.wy,jFoot.wx,jFoot.wy,8,10,
    sideGrad(jShin.wx,jShin.wy,jFoot.wx,jFoot.wy,11),`rgba(20,20,20,${dimmer})`,1.8);
  // boot sole / toe box
  g.fillStyle=`rgba(${~~(28*dimmer)},${~~(28*dimmer)},${~~(28*dimmer)},1)`;
  g.beginPath();
  g.ellipse(jFoot.wx+fdx/flen*9,jFoot.wy+fdy/flen*9,13,6,.0+Math.atan2(fdy,fdx),0,Math.PI*2);
  g.fill();g.strokeStyle=`rgba(60,60,60,${dimmer})`;g.lineWidth=1.5;g.stroke();
  // boot gold trim
  g.strokeStyle=`rgba(200,160,32,${.72*dimmer})`;g.lineWidth=2.4;
  g.beginPath();g.moveTo(jShin.wx+fnx*10,jShin.wy+fny*10);g.lineTo(jShin.wx-fnx*10,jShin.wy-fny*10);g.stroke();
}

// ─── TORSO ───────────────────────────────────────────────────
function drawTorso(){
  // ── KILT / WAR SKIRT (hip to just below belt) ──
  const pWx=J.pelvis.wx,pWy=J.pelvis.wy;
  const sWx=J.spineLow.wx,sWy=J.spineLow.wy;
  // Direction from pelvis upward
  const kdx=sWx-pWx,kdy=sWy-pWy,klen=Math.sqrt(kdx*kdx+kdy*kdy)||1;
  const knx=kdy/klen,kny=-kdx/klen;
  const stripW=28;
  for(let i=0;i<10;i++){
    const t=i/9-.5;
    const ox=knx*t*stripW*2,oy=kny*t*stripW*2;
    const col=i%2===0?'#3e1b00':'#2d1200';
    // strip hangs from belt line downward
    const beltX=pWx+ox,beltY=pWy+oy;
    const dangle=26+Math.sin(T*1.2+i*.8)*2;
    g.fillStyle=col;
    g.beginPath();
    g.moveTo(beltX-knx*4,beltY-kny*4);
    g.lineTo(beltX+knx*4,beltY+kny*4);
    g.lineTo(beltX+knx*3+kdx/klen*dangle,beltY+kny*3+kdy/klen*dangle);
    g.lineTo(beltX-knx*3+kdx/klen*dangle,beltY-kny*3+kdy/klen*dangle);
    g.closePath();g.fill();
    g.strokeStyle='#6a3a00';g.lineWidth=.85;g.stroke();
    g.fillStyle='#c8a020';g.beginPath();g.arc(beltX+kdx/klen*5,beltY+kdy/klen*5,2.2,0,Math.PI*2);g.fill();
  }

  // ── BELT ──
  const beltMx=(pWx+sWx)*.5,beltMy=(pWy+sWy)*.5;
  const beltAngle=Math.atan2(kdy,kdx)+Math.PI/2;
  g.save();g.translate(beltMx,beltMy);g.rotate(beltAngle);
  const bgg=g.createLinearGradient(-26,-7,26,7);
  bgg.addColorStop(0,'#1a0800');bgg.addColorStop(.5,'#2e1400');bgg.addColorStop(1,'#1a0800');
  g.fillStyle=bgg;rr(-26,-7,52,14,4);g.fill();
  g.strokeStyle='#c8a020';g.lineWidth=2.6;g.stroke();
  g.fillStyle='#c8a020';g.fillRect(-9,-6,18,12);
  g.fillStyle='#000';g.fillRect(-6,-4,12,8);
  g.fillStyle='#c8a020';g.beginPath();g.arc(0,0,3.5,0,Math.PI*2);g.fill();
  g.restore();

  // ── SPINE segments: low → mid → high ──
  // spine low
  const sLWx=J.spineLow.wx,sLWy=J.spineLow.wy;
  const sMWx=J.spineMid.wx,sMWy=J.spineMid.wy;
  const sHWx=J.spineHigh.wx,sHWy=J.spineHigh.wy;

  // Lower abdomen plate
  drawSegment(pWx,pWy,sLWx,sLWy,17,18,
    sideGrad(pWx,pWy,sLWx,sLWy,20),'#181818',2.5);
  // Mid torso plate
  drawSegment(sLWx,sLWy,sMWx,sMWy,18,19,
    sideGrad(sLWx,sLWy,sMWx,sMWy,21),'#181818',2.5);
  // Upper chest
  drawSegment(sMWx,sMWy,sHWx,sHWy,19,18,
    sideGrad(sMWx,sMWy,sHWx,sHWy,22),'#181818',2.5);

  // ── BREASTPLATE OVERLAY ──
  // The breastplate spans from spineLow to spineHigh
  const chestAngle=Math.atan2(sHWy-sLWy,sHWx-sLWx)+Math.PI/2;
  const chestCX=(sLWx+sHWx)*.5,chestCY=(sLWy+sHWy)*.5;
  const chestLen=Math.sqrt((sHWx-sLWx)**2+(sHWy-sLWy)**2);
  g.save();g.translate(chestCX,chestCY);g.rotate(chestAngle);
  const cpg=g.createLinearGradient(-30,-chestLen/2,30,chestLen/2);
  cpg.addColorStop(0,'#525252');cpg.addColorStop(.28,'#989898');cpg.addColorStop(.65,'#5e5e5e');cpg.addColorStop(1,'#2e2e2e');
  // Chest shape — wider at top
  g.beginPath();
  g.moveTo(-32,-chestLen/2+2);
  g.bezierCurveTo(-34,-chestLen/2+8,-34,chestLen/2-8,-30,chestLen/2);
  g.lineTo(30,chestLen/2);
  g.bezierCurveTo(34,chestLen/2-8,34,-chestLen/2+8,32,-chestLen/2+2);
  g.closePath();
  g.fillStyle=cpg;g.fill();g.strokeStyle='#181818';g.lineWidth=2.8;g.stroke();
  // inner panel grooves
  g.strokeStyle='rgba(255,255,255,.14)';g.lineWidth=1.8;
  g.beginPath();g.moveTo(0,-chestLen/2+6);g.lineTo(0,chestLen/2-6);g.stroke();
  g.beginPath();g.moveTo(-16,-chestLen/2+14);g.bezierCurveTo(-22,-chestLen/2+24,-22,chestLen/2-14,-16,chestLen/2-8);g.stroke();
  g.beginPath();g.moveTo(16,-chestLen/2+14);g.bezierCurveTo(22,-chestLen/2+24,22,chestLen/2-14,16,chestLen/2-8);g.stroke();
  g.strokeStyle='#c8a020';g.lineWidth=3;
  g.beginPath();
  g.moveTo(-32,-chestLen/2+2);g.bezierCurveTo(-34,-chestLen/2+8,-34,chestLen/2-8,-30,chestLen/2);
  g.lineTo(30,chestLen/2);g.bezierCurveTo(34,chestLen/2-8,34,-chestLen/2+8,32,-chestLen/2+2);g.closePath();g.stroke();
  // Cross emblem
  const cy2=0;
  g.strokeStyle='rgba(200,160,32,.88)';g.lineWidth=3.5;
  g.beginPath();g.moveTo(0,-chestLen/2+14);g.lineTo(0,chestLen/2-10);g.stroke();
  g.beginPath();g.moveTo(-17,cy2);g.lineTo(17,cy2);g.stroke();
  // Chest gem
  const gemG=g.createRadialGradient(0,cy2,0,0,cy2,8);
  gemG.addColorStop(0,'#fff');gemG.addColorStop(.4,'#f44');gemG.addColorStop(1,'rgba(140,0,0,0)');
  g.fillStyle=gemG;g.shadowBlur=20;g.shadowColor='#f44';
  g.beginPath();g.arc(0,cy2,8,0,Math.PI*2);g.fill();g.shadowBlur=0;
  // Ab detail plates
  for(let row=0;row<4;row++){const ry=-chestLen/2+18+row*12;for(const sx of[-12,12]){g.fillStyle='rgba(255,255,255,.06)';rr(sx-7,ry,14,10,2);g.fill();g.strokeStyle='rgba(200,160,32,.3)';g.lineWidth=.9;g.stroke();}}
  g.restore();

  // ── PAULDRONS ──
  // Attached at spineHigh, offset left and right
  const shAngle=Math.atan2(sHWy-sMWy,sHWx-sMWx);
  const pnx=Math.cos(shAngle+Math.PI/2),pny=Math.sin(shAngle+Math.PI/2);
  for(const side of[-1,1]){
    const pCX=sHWx+pnx*side*-34,pCY=sHWy+pny*side*-34;
    g.save();g.translate(pCX,pCY);g.rotate(chestAngle);
    const pg=g.createLinearGradient(-20,-14,20,14);
    pg.addColorStop(0,'#5e5e5e');pg.addColorStop(.5,'#9e9e9e');pg.addColorStop(1,'#1e1e1e');
    // Main pauldron dome
    g.fillStyle=pg;g.beginPath();g.ellipse(0,0,22,16,0,0,Math.PI*2);g.fill();
    g.strokeStyle='#c8a020';g.lineWidth=2.5;g.stroke();
    // Layered sub-plates (3 plates hanging down)
    for(let p=0;p<4;p++){
      const pyy=10+p*11;
      const pg2=g.createLinearGradient(-18+p*1.5,pyy,18-p*1.5,pyy+9);
      pg2.addColorStop(0,'#525252');pg2.addColorStop(1,'#1e1e1e');
      g.fillStyle=pg2;g.beginPath();
      g.ellipse(0,pyy,18-p*2,6.5-p*.5,0,0,Math.PI*2);g.fill();
      g.strokeStyle='#888';g.lineWidth=1;g.stroke();
      // gold seam line
      g.strokeStyle=`rgba(200,160,32,.5)`;g.lineWidth=1;
      g.beginPath();g.moveTo(-(18-p*2),pyy);g.lineTo(18-p*2,pyy);g.stroke();
    }
    // Pauldron spike
    g.fillStyle='#b0b0b0';g.beginPath();
    g.moveTo(-4,-14);g.lineTo(0,-30);g.lineTo(4,-14);g.closePath();g.fill();
    g.fillStyle='#c8a020';g.beginPath();g.arc(0,-30,4,0,Math.PI*2);g.fill();
    g.shadowBlur=10;g.shadowColor='rgba(200,160,32,.65)';
    g.fillStyle='rgba(255,230,80,.35)';g.beginPath();g.arc(0,-30,2.5,0,Math.PI*2);g.fill();
    g.shadowBlur=0;
    g.restore();
  }
}

// ─── SHIELD ARM ───────────────────────────────────────────────
function drawShieldArm(jClav,jUpper,jLower,jHand){
  // clavicle (not drawn, just pivot)
  // upper arm
  drawSegment(jClav.wx,jClav.wy,jUpper.wx,jUpper.wy,10,9,
    sideGrad(jClav.wx,jClav.wy,jUpper.wx,jUpper.wy,11),'#1c1c1c',2);

  g.fillStyle='#c8a020';g.beginPath();g.arc(jUpper.wx,jUpper.wy,9,0,Math.PI*2);g.fill();
  g.fillStyle='#222';g.beginPath();g.arc(jUpper.wx,jUpper.wy,5,0,Math.PI*2);g.fill();
  g.fillStyle='rgba(255,210,60,.4)';g.beginPath();g.arc(jUpper.wx-2,jUpper.wy-2,2.5,0,Math.PI*2);g.fill();
  // forearm
  drawSegment(jUpper.wx,jUpper.wy,jLower.wx,jLower.wy,9,8,
    sideGrad(jUpper.wx,jUpper.wy,jLower.wx,jLower.wy,10),'#1c1c1c',1.8);

  drawSegment(jLower.wx,jLower.wy,jHand.wx,jHand.wy,8,9,
    sideGrad(jLower.wx,jLower.wy,jHand.wx,jHand.wy,10),'#1c1c1c',1.8);
  // gauntlet
  const gdx=jHand.wx-jLower.wx,gdy=jHand.wy-jLower.wy,glen=Math.sqrt(gdx*gdx+gdy*gdy)||1;
  const ghx=jHand.wx+gdx/glen*10,ghy=jHand.wy+gdy/glen*10;

  g.strokeStyle='#c8a020';g.lineWidth=1.5;g.beginPath();g.moveTo(-10,2);g.lineTo(10,2);g.stroke();g.restore();

  drawShield(jHand.wx,jHand.wy,jHand.wa);
}

// ─── SHIELD ───────────────────────────────────────────────────
function drawShield(hx,hy,angle){
  g.save();g.translate(hx,hy);g.rotate(angle);
  // Shield is 56w x 82h — significantly larger than before
  const sw=56,sh=82,sx=-sw/2,sy=-14;
  const shg=g.createLinearGradient(sx,sy,sx+sw,sy+sh);
  shg.addColorStop(0,'#565656');shg.addColorStop(.38,'#9a9a9a');shg.addColorStop(1,'#1e1e1e');
  g.fillStyle=shg;
  g.beginPath();
  g.moveTo(sx+7,sy);g.lineTo(sx+sw-7,sy);
  g.quadraticCurveTo(sx+sw,sy,sx+sw,sy+18);
  g.lineTo(sx+sw,sy+sh*.72);
  g.quadraticCurveTo(sx+sw,sy+sh,sx+sw/2,sy+sh);
  g.quadraticCurveTo(sx,sy+sh,sx,sy+sh*.72);
  g.lineTo(sx,sy+18);
  g.quadraticCurveTo(sx,sy,sx+7,sy);
  g.closePath();g.fill();
  g.strokeStyle='#c8a020';g.lineWidth=4.2;g.stroke();
  // inner bevel
  g.strokeStyle='rgba(80,60,0,.55)';g.lineWidth=2.5;
  g.beginPath();g.moveTo(sx+12,sy+6);g.lineTo(sx+sw-12,sy+6);
  g.lineTo(sx+sw-7,sy+sh*.70);g.lineTo(sx+sw/2,sy+sh-7);
  g.lineTo(sx+7,sy+sh*.70);g.closePath();g.stroke();
  // cross
  g.strokeStyle='rgba(200,160,32,.90)';g.lineWidth=3.8;
  g.beginPath();g.moveTo(0,sy+9);g.lineTo(0,sy+sh-9);g.stroke();
  g.beginPath();g.moveTo(sx+9,sy+sh*.38);g.lineTo(sx+sw-9,sy+sh*.38);g.stroke();
  // boss circle
  const bsg=g.createRadialGradient(0,sy+sh*.38,0,0,sy+sh*.38,15);
  bsg.addColorStop(0,'#fff8a0');bsg.addColorStop(.5,'#c8a020');bsg.addColorStop(1,'#5a4010');
  g.fillStyle=bsg;g.beginPath();g.arc(0,sy+sh*.38,15,0,Math.PI*2);g.fill();
  g.strokeStyle='#c8a020';g.lineWidth=2.5;g.stroke();
  g.fillStyle='rgba(255,255,200,.5)';g.beginPath();g.arc(-3,sy+sh*.38-3,5.5,0,Math.PI*2);g.fill();
  // rivets
  for(const [rx,ry] of[[-20,10],[20,10],[-21,sh*.72],[21,sh*.72],[0,5],[0,sh-8]]){
    g.fillStyle='#c8a020';g.beginPath();g.arc(rx,sy+ry,3.8,0,Math.PI*2);g.fill();
    g.fillStyle='rgba(255,255,180,.55)';g.beginPath();g.arc(rx-1,sy+ry-1,1.5,0,Math.PI*2);g.fill();
  }
  // highlight sheen
  g.fillStyle='rgba(255,255,255,.07)';
  g.beginPath();g.moveTo(sx+6,sy+6);g.lineTo(0,sy+6);g.lineTo(-5,sy+sh*.33);g.lineTo(sx+6,sy+sh*.25);g.closePath();g.fill();
  g.restore();
}

// ─── SPEAR ────────────────────────────────────────────────────
function drawSpear(){
  // Uses FK bone positions: spearBase → spearMid → spearTip
  const b0x=J.rHand.wx,b0y=J.rHand.wy;
  const b1x=J.spearBase.wx,b1y=J.spearBase.wy;
  const b2x=J.spearMid.wx,b2y=J.spearMid.wy;
  const b3x=J.spearTip.wx,b3y=J.spearTip.wy;

  // SHAFT lower half (rHand → spearBase)
  drawShaftSegment(b0x,b0y,b1x,b1y,6,5.5);
  // gold band at junction
  drawGoldBand(b1x,b1y,Math.atan2(b2y-b1y,b2x-b1x),6,8);

  // SHAFT upper half (spearBase → spearMid)
  drawShaftSegment(b1x,b1y,b2x,b2y,5.5,5);
  // additional gold bands
  const t1=.35,t2=.68;
  drawGoldBand(b1x+(b2x-b1x)*t1,b1y+(b2y-b1y)*t1,Math.atan2(b2y-b1y,b2x-b1x),5.5,7);
  drawGoldBand(b1x+(b2x-b1x)*t2,b1y+(b2y-b1y)*t2,Math.atan2(b2y-b1y,b2x-b1x),5.2,7);

  // Shaft upper continuation (spearMid → spearTip direction, extended)
  drawShaftSegment(b2x,b2y,b3x,b3y,5,4.5);

  // SPEAR TIP
  drawSpearTip(b3x,b3y,Math.atan2(b3y-b2y,b3x-b2x));

  // Butt cap at b0
  const buttAngle=Math.atan2(b0y-b1y,b0x-b1x);
  g.save();g.translate(b0x,b0y);g.rotate(buttAngle);
  g.fillStyle='#c8a020';g.beginPath();g.moveTo(-5,0);g.lineTo(5,0);g.lineTo(3.5,16);g.lineTo(-3.5,16);g.closePath();g.fill();g.restore();
}
function drawShaftSegment(ax,ay,bx,by,wA,wB){
  const stg=g.createLinearGradient(ax,ay,bx,by);
  stg.addColorStop(0,'#484848');stg.addColorStop(.3,'#b8b8b8');stg.addColorStop(.7,'#888');stg.addColorStop(1,'#2e2e2e');
  drawSegment(ax,ay,bx,by,wA,wB,
    sideGrad(ax,ay,bx,by,wA+2),'#1a1a1a',1.5);
  // edge highlight
  const dx=bx-ax,dy=by-ay,len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=dy/len,ny=-dx/len;
  g.strokeStyle='rgba(255,255,255,.18)';g.lineWidth=1.4;
  g.beginPath();g.moveTo(ax+nx*(wA*.5),ay+ny*(wA*.5));g.lineTo(bx+nx*(wB*.5),by+ny*(wB*.5));g.stroke();
}
function drawGoldBand(cx,cy,angle,w,h){
  g.save();g.translate(cx,cy);g.rotate(angle);
  g.fillStyle='#c8a020';g.fillRect(-w,-h/2,w*2,h);
  g.fillStyle='rgba(255,255,200,.48)';g.fillRect(-w+1,-h/2+1,w*2-2,h/2);
  g.strokeStyle='rgba(80,60,0,.5)';g.lineWidth=.5;g.strokeRect(-w,-h/2,w*2,h);g.restore();
}
function drawSpearTip(tx,ty,angle){
  g.save();g.translate(tx,ty);g.rotate(angle);
  // tip extends 56px beyond tip joint — very long blade
  const tipLen=56;
  const ttg=g.createLinearGradient(0,0,0,tipLen);
  ttg.addColorStop(0,'#7a90a0');ttg.addColorStop(.35,'#dde8ff');ttg.addColorStop(.65,'#f0f8ff');ttg.addColorStop(1,'#ffffff');
  g.fillStyle=ttg;g.shadowBlur=16;g.shadowColor='rgba(200,220,255,.85)';
  g.beginPath();g.moveTo(0,tipLen);g.lineTo(16,0);g.lineTo(-16,0);g.closePath();g.fill();
  g.strokeStyle='rgba(255,255,255,.55)';g.lineWidth=1.2;g.stroke();
  // highlight on blade
  g.fillStyle='rgba(255,255,255,.58)';
  g.beginPath();g.moveTo(0,tipLen);g.lineTo(8,-1);g.lineTo(2,tipLen*.35);g.closePath();g.fill();
  // blade edge glow
  g.shadowColor='rgba(180,210,255,.95)';g.shadowBlur=22;
  g.strokeStyle='rgba(200,230,255,.75)';g.lineWidth=2.4;
  g.beginPath();g.moveTo(0,tipLen);g.lineTo(0,2);g.stroke();
  // gold collar
  g.shadowBlur=0;g.fillStyle='#c8a020';g.fillRect(-9,0,18,10);
  g.fillStyle='rgba(255,255,200,.52)';g.fillRect(-8,1,16,4);
  g.restore();
}

// ─── HELMET ───────────────────────────────────────────────────
function drawHelmet(){
  const nWx=J.neck.wx,nWy=J.neck.wy;
  const hWx=J.head.wx,hWy=J.head.wy;
  const headAngle=Math.atan2(hWy-nWy,hWx-nWx)+Math.PI/2;
  g.save();g.translate((nWx+hWx)*.5,(nWy+hWy)*.5);g.rotate(headAngle);

  // NECK guard
  const ng=g.createLinearGradient(-13,12,13,12);
  ng.addColorStop(0,'#2a2a2a');ng.addColorStop(.5,'#585858');ng.addColorStop(1,'#222');
  g.fillStyle=ng;rr(-13,-8,26,22,4);g.fill();g.strokeStyle='#444';g.lineWidth=2;g.stroke();
  for(let i=0;i<4;i++){g.strokeStyle=`rgba(200,160,32,${.36-i*.08})`;g.lineWidth=1;g.beginPath();g.moveTo(-13,-4+i*5);g.lineTo(13,-4+i*5);g.stroke();}

  // DOME
  const hg=g.createLinearGradient(-32,-72,32,4);
  hg.addColorStop(0,'#666');hg.addColorStop(.26,'#b2b2b2');hg.addColorStop(.65,'#666');hg.addColorStop(1,'#2e2e2e');
  g.fillStyle=hg;
  g.beginPath();
  g.moveTo(-32,4);
  g.bezierCurveTo(-34,-76,-34,-76,-16,-86);
  g.lineTo(0,-92);g.lineTo(16,-86);
  g.bezierCurveTo(34,-76,34,-76,32,4);
  g.closePath();g.fill();
  g.strokeStyle='#c8a020';g.lineWidth=3;g.stroke();
  // brow ridge
  g.strokeStyle='rgba(200,160,32,.7)';g.lineWidth=2.5;
  g.beginPath();g.moveTo(-32,-36);g.lineTo(32,-36);g.stroke();
  // dome highlight
  g.fillStyle='rgba(255,255,255,.05)';
  g.beginPath();g.moveTo(-20,-88);g.lineTo(20,-88);g.bezierCurveTo(28,-70,28,-50,24,-36);g.bezierCurveTo(18,-28,-18,-28,-24,-36);g.bezierCurveTo(-28,-50,-28,-70,-20,-88);g.closePath();g.fill();

  // CHEEK GUARDS (wider)
  for(const s of[-1,1]){
    g.fillStyle='#424242';
    g.beginPath();g.moveTo(s*32,4);g.lineTo(s*44,10);g.lineTo(s*44,-32);g.lineTo(s*32,-36);g.closePath();
    g.fill();g.strokeStyle='#c8a020';g.lineWidth=2;g.stroke();
    for(let r=0;r<5;r++){g.strokeStyle=`rgba(200,160,32,${.46-r*.08})`;g.lineWidth=1;g.beginPath();g.moveTo(s*32,-6-r*8);g.lineTo(s*44,-6-r*8);g.stroke();}
  }

  // T-VISOR with breathing glow
  const vb=Math.sin(T*2.1);
  const vc=`rgba(${~~(185+70*vb)},${~~(28+18*vb)},0,0.95)`;
  g.fillStyle=vc;g.shadowBlur=20;g.shadowColor=vc;
  g.fillRect(-26,-56,52,9);   // horizontal bar
  g.fillRect(-5.5,-68,11,36); // vertical bar
  const vgrd=g.createLinearGradient(-26,-56,26,-47);
  vgrd.addColorStop(0,'rgba(255,80,0,0)');vgrd.addColorStop(.5,'rgba(255,160,0,1)');vgrd.addColorStop(1,'rgba(255,80,0,0)');
  g.fillStyle=vgrd;g.fillRect(-26,-56,52,9);g.shadowBlur=0;

  // PLUME (26 strands)
  for(let p=0;p<26;p++){
    const ang=-Math.PI*.5+(p/25-.5)*Math.PI*1.12+Math.sin(T*1.5+p*.32)*.12;
    const len=34+Math.sin(p/25*Math.PI)*30;
    const px=Math.cos(ang)*len,py=-90+Math.sin(ang)*len;
    const r=~~(168+p*4),gr=~~(p*10);
    g.strokeStyle=`rgba(${r},${gr},0,${.58+p/25*.42})`;
    g.lineWidth=3.5-p*.07;g.shadowBlur=7;g.shadowColor='rgba(255,40,0,.58)';
    g.beginPath();g.moveTo(0,-90);g.quadraticCurveTo(px*.24,-102,px,py);g.stroke();
  }
  g.shadowBlur=0;
  g.restore();
}

// ═══════════════════════════════════════════════════════════════
// GHOST AFTERIMAGES
// ═══════════════════════════════════════════════════════════════
function drawGhosts(){
  for(let i=GHOSTS.length-1;i>=0;i--){
    const gh=GHOSTS[i];gh.life-=dt;if(gh.life<=0){GHOSTS.splice(i,1);continue;}
    const a=gh.life/gh.ml*.52;
    g.save();g.globalAlpha=a;g.shadowBlur=28;g.shadowColor='rgba(0,180,255,.9)';g.fillStyle='rgba(28,140,255,.78)';
    // Draw simplified skeleton silhouette using snapshotted positions
    const lw=3;
    g.lineWidth=lw;g.strokeStyle=`rgba(60,180,255,${a})`;
    function ghostLine(x1,y1,x2,y2){g.beginPath();g.moveTo(x1,y1);g.lineTo(x2,y2);g.stroke();}
    // torso
    ghostLine(gh.pWx,gh.pWy,gh.sHx,gh.sHy);
    // head
    g.beginPath();g.arc(gh.hx,gh.hy,18,0,Math.PI*2);g.fill();
    // left arm
    ghostLine(gh.sHx,gh.sHy,gh.lHx,gh.lHy);
    // right arm + spear
    ghostLine(gh.sHx,gh.sHy,gh.rHx,gh.rHy);
    ghostLine(gh.rHx,gh.rHy,gh.sTx,gh.sTy);
    // left leg
    ghostLine(gh.pWx,gh.pWy,gh.lKx,gh.lKy);
    ghostLine(gh.lKx,gh.lKy,gh.lFx,gh.lFy);
    // right leg
    ghostLine(gh.pWx,gh.pWy,gh.rKx,gh.rKy);
    ghostLine(gh.rKx,gh.rKy,gh.rFx,gh.rFy);
    // shield blob
    g.beginPath();g.ellipse(gh.lHx,gh.lHy,22,30,0,0,Math.PI*2);g.fill();
    g.shadowBlur=0;g.restore();
  }
  g.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════════
// SWEEP ARC
// ═══════════════════════════════════════════════════════════════
function drawSweepArc(){
  if(!SWEEPARC)return;SWEEPARC.life-=dt;if(SWEEPARC.life<=0){SWEEPARC=null;return;}
  const a=SWEEPARC.life/SWEEPARC.ml;
  const curEnd=SWEEPARC.startA+(SWEEPARC.endA-SWEEPARC.startA)*Math.min(1,SWEEPARC.prog);
  for(let i=0;i<26;i++){
    const fi=i/26,fa=Math.max(0,(1-fi)*a*.92);
    const sa=SWEEPARC.startA+(curEnd-SWEEPARC.startA)*fi;
    const ea=SWEEPARC.startA+(curEnd-SWEEPARC.startA)*(fi+.050);
    g.strokeStyle=`rgba(255,${~~(200-fi*55)},0,${fa})`;
    g.lineWidth=(26-i*.58)*a;g.shadowBlur=24;g.shadowColor='rgba(255,180,0,.9)';
    g.beginPath();g.arc(SWEEPARC.cx,SWEEPARC.cy,SWEEPARC.r,sa,ea);g.stroke();
  }
  g.shadowBlur=0;
  if(Math.random()<.72){const ang=curEnd;P(SWEEPARC.cx+Math.cos(ang)*SWEEPARC.r,SWEEPARC.cy+Math.sin(ang)*SWEEPARC.r,(Math.random()-.5)*7,(-Math.random()*7-2),290+Math.random()*360,2+Math.random()*4,'#ffcc00','rgba(255,200,0,.9)',.1);}
}

// ═══════════════════════════════════════════════════════════════
// HEAL MAGIC CIRCLE
// ═══════════════════════════════════════════════════════════════
function drawHealMagic(){
  if(!HEALMAGIC||!HEALMAGIC.on)return;
  const cx=KN.worldX,cy=KN.worldY;
  const a=Math.min(1,HEALMAGIC.life/500);
  const r1=62,r2=90,r3=115;
  g.save();g.globalAlpha=a;g.shadowBlur=36;g.shadowColor='rgba(0,255,80,.9)';
  g.strokeStyle=`rgba(0,255,100,${a*.8})`;g.lineWidth=3.5;
  g.beginPath();g.arc(cx,cy,r3,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx,cy,r1,0,Math.PI*2);g.stroke();
  g.save();g.translate(cx,cy);g.rotate(HEALMAGIC.angle*.52);
  for(let i=0;i<16;i++){const ra=(i/16)*Math.PI*2;g.save();g.translate(Math.cos(ra)*r2,Math.sin(ra)*r2);g.rotate(ra+HEALMAGIC.angle);g.strokeStyle=`rgba(0,245,105,${a*.94})`;g.lineWidth=2.2;g.shadowBlur=12;g.shadowColor='rgba(0,255,80,.85)';g.beginPath();g.moveTo(-6,0);g.lineTo(6,0);g.stroke();g.beginPath();g.moveTo(0,-9);g.lineTo(0,9);g.stroke();g.beginPath();g.moveTo(-5,-5);g.lineTo(5,5);g.stroke();g.restore();}
  g.restore();
  g.save();g.translate(cx,cy);g.rotate(-HEALMAGIC.angle*.82);
  g.strokeStyle=`rgba(0,255,80,${a*.9})`;g.lineWidth=2.6;g.shadowBlur=20;g.shadowColor='rgba(0,255,100,.92)';
  for(let i=0;i<6;i++){g.beginPath();g.moveTo(Math.cos(i/6*Math.PI*2)*r1,Math.sin(i/6*Math.PI*2)*r1);g.lineTo(Math.cos((i+2)/6*Math.PI*2)*r1,Math.sin((i+2)/6*Math.PI*2)*r1);g.stroke();}
  g.restore();
  g.save();g.translate(cx,cy);g.rotate(HEALMAGIC.angle*1.30);
  g.strokeStyle=`rgba(160,255,160,${a*.70})`;g.lineWidth=2.2;
  g.beginPath();for(let i=0;i<5;i++){const ang=(i/5)*Math.PI*2-Math.PI/2;i===0?g.moveTo(Math.cos(ang)*r1*.52,Math.sin(ang)*r1*.52):g.lineTo(Math.cos(ang)*r1*.52,Math.sin(ang)*r1*.52);}
  g.closePath();g.stroke();g.restore();
  for(let i=0;i<32;i++){const ang=(i/32)*Math.PI*2+HEALMAGIC.angle*.36;g.strokeStyle=`rgba(0,255,80,${a*(.20+.18*Math.sin(ang*3+T*4))})`;g.lineWidth=1;g.beginPath();g.moveTo(cx+Math.cos(ang)*r1,cy+Math.sin(ang)*r1);g.lineTo(cx+Math.cos(ang)*r3,cy+Math.sin(ang)*r3);g.stroke();}
  const cg2=g.createRadialGradient(cx,cy,0,cx,cy,r1);cg2.addColorStop(0,`rgba(0,255,80,${a*.25})`);cg2.addColorStop(1,'rgba(0,255,80,0)');
  g.fillStyle=cg2;g.beginPath();g.arc(cx,cy,r1,0,Math.PI*2);g.fill();
  g.shadowBlur=0;g.restore();
}

// ═══════════════════════════════════════════════════════════════
// GROUND FX
// ═══════════════════════════════════════════════════════════════
function drawGroundFX(){
  for(let i=CRACKS.length-1;i>=0;i--){
    const c=CRACKS[i];c.life-=dt;if(c.life<=0){CRACKS.splice(i,1);continue;}
    const a=Math.min(1,c.life/c.ml*3);
    g.shadowBlur=18;g.shadowColor=`rgba(255,100,0,${a*.85})`;g.strokeStyle=`rgba(14,7,0,${a})`;g.lineWidth=c.w*a;
    g.beginPath();g.moveTo(c.pts[0].x,c.pts[0].y);for(let p=1;p<c.pts.length;p++)g.lineTo(c.pts[p].x,c.pts[p].y);g.stroke();
    g.strokeStyle=`rgba(255,${~~(80+52*Math.sin(T*3))},0,${a*.72})`;g.lineWidth=c.w*a*.46;g.shadowColor=`rgba(255,80,0,${a})`;g.shadowBlur=24;
    g.beginPath();g.moveTo(c.pts[0].x,c.pts[0].y);for(let p=1;p<c.pts.length;p++)g.lineTo(c.pts[p].x,c.pts[p].y);g.stroke();g.shadowBlur=0;
  }
  for(let i=WAVES.length-1;i>=0;i--){
    const w=WAVES[i];w.life-=dt;if(w.life<=0){WAVES.splice(i,1);continue;}
    const a=w.life/w.ml;w.r=w.maxR*(1-a);
    g.strokeStyle=w.col+(a*.86)+')';g.lineWidth=5.5*a;g.shadowBlur=26;g.shadowColor=w.col+'0.9)';
    g.beginPath();g.arc(w.x,w.y,w.r,0,Math.PI*2);g.stroke();g.shadowBlur=0;
  }
  if(WARN){WARN.life-=dt;if(WARN.life<=0){WARN=null;}else{
    const a=Math.abs(Math.sin(T*12))*(WARN.life/WARN.ml);
    g.strokeStyle=`rgba(255,0,0,${a})`;g.lineWidth=5;g.shadowBlur=28;g.shadowColor='rgba(255,0,0,.9)';
    g.setLineDash([14,8]);g.beginPath();g.arc(WARN.x,WARN.y,WARN.r,0,Math.PI*2);g.stroke();g.setLineDash([]);
    g.strokeStyle=`rgba(255,60,0,${a*.74})`;g.lineWidth=2.4;
    g.beginPath();g.moveTo(WARN.x-WARN.r,WARN.y);g.lineTo(WARN.x+WARN.r,WARN.y);g.stroke();
    g.beginPath();g.moveTo(WARN.x,WARN.y-WARN.r);g.lineTo(WARN.x,WARN.y+WARN.r);g.stroke();g.shadowBlur=0;}}
}

// ═══════════════════════════════════════════════════════════════
// METEOR FX
// ═══════════════════════════════════════════════════════════════
function drawMeteorFX(){
  if(!METEOR||!METEOR.on)return;
  const mg=g.createRadialGradient(METEOR.x,METEOR.y,3,METEOR.x,METEOR.y,38);
  mg.addColorStop(0,'#fff');mg.addColorStop(.2,'#ffcc00');mg.addColorStop(.6,'#ff4400');mg.addColorStop(1,'rgba(100,0,0,0)');
  g.shadowBlur=75;g.shadowColor='rgba(255,100,0,.9)';
  g.fillStyle=mg;g.beginPath();g.arc(METEOR.x,METEOR.y,38,0,Math.PI*2);g.fill();
  g.fillStyle='#fff';g.beginPath();g.arc(METEOR.x,METEOR.y,13,0,Math.PI*2);g.fill();g.shadowBlur=0;
}

// ═══════════════════════════════════════════════════════════════
// THRUST FLASH
// ═══════════════════════════════════════════════════════════════
function drawThrustFlash(){
  if(!TFLASH)return;TFLASH.life-=dt;if(TFLASH.life<=0){TFLASH=null;return;}
  const a=TFLASH.life/TFLASH.ml;TFLASH.r=84*(1-a);
  g.strokeStyle=`rgba(255,255,255,${a*.9})`;g.lineWidth=6.5*a;g.shadowBlur=32;g.shadowColor='rgba(200,230,255,.9)';
  g.beginPath();g.arc(TFLASH.x,TFLASH.y,TFLASH.r,0,Math.PI*2);g.stroke();g.shadowBlur=0;
}

// ═══════════════════════════════════════════════════════════════
// PARTICLES + ORBS
// ═══════════════════════════════════════════════════════════════
function drawParticles(){
  for(let i=PARTS.length-1;i>=0;i--){
    const p=PARTS[i];p.x+=p.vx*(dt/16);p.y+=p.vy*(dt/16);p.vy+=p.grav*(dt/16);p.life-=dt;
    if(p.life<=0){PARTS.splice(i,1);continue;}
    const a=p.life/p.ml;g.globalAlpha=a;if(p.glow){g.shadowBlur=13;g.shadowColor=p.glow;}
    g.fillStyle=p.col;g.beginPath();g.arc(p.x,p.y,p.r*a+.3,0,Math.PI*2);g.fill();g.shadowBlur=0;
  }g.globalAlpha=1;
}
function drawOrbs(){
  for(let i=ORBS.length-1;i>=0;i--){
    const o=ORBS[i];o.x+=o.vx*(dt/16);o.y+=o.vy*(dt/16);o.x+=Math.sin(T*3+i)*.5;o.life-=dt;
    if(o.life<=0){ORBS.splice(i,1);continue;}
    const a=o.life/o.ml;g.globalAlpha=a;g.fillStyle='rgba(0,255,120,1)';g.shadowBlur=17;g.shadowColor='rgba(0,255,80,.9)';
    g.beginPath();g.arc(o.x,o.y,o.r,0,Math.PI*2);g.fill();g.shadowBlur=0;
  }g.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════
let inited=false;
function loop(now){
  requestAnimationFrame(loop);
  dt=Math.min(50,now-last);last=now;T+=dt/1000;
  if(!inited){KN.worldX=W/2;KN.worldY=GY;inited=true;}
  updateCD();updateKnight();updateShake();
  g.save();g.translate(SK.x,SK.y);
  drawBG();drawGround();
  drawHealMagic();
  drawGroundFX();
  drawSweepArc();
  drawGhosts();
  drawMeteorFX();
  if(KN.visible&&KN.worldY>-190) drawKnight();
  drawThrustFlash();
  drawParticles();
  drawOrbs();
  g.restore();
}
requestAnimationFrame(loop);

</script>
