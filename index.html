<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>斬擊 & 鬼魂特效</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#06070f;font-family:system-ui,sans-serif;touch-action:none;}
canvas{position:fixed;inset:0;width:100%;height:100%;}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(4,5,14,.92);border-top:1px solid rgba(255,255,255,.08);padding:10px 8px 14px;display:flex;flex-direction:column;gap:8px;}
.row{display:flex;gap:6px;justify-content:center;}
.row-label{font-size:9px;letter-spacing:2px;text-align:center;color:rgba(255,255,255,.25);text-transform:uppercase;}
button{flex:1;max-width:120px;padding:10px 4px 8px;border-radius:8px;border:1px solid;font-size:11px;font-weight:600;cursor:pointer;background:none;transition:all .15s;letter-spacing:.5px;line-height:1.3;}
button .ic{display:block;font-size:18px;margin-bottom:3px;}
.slash-btn{border-color:rgba(100,180,255,.35);color:rgba(140,200,255,.8);}
.slash-btn.on,.slash-btn:active{background:rgba(80,160,255,.2);border-color:#4af;color:#adf;box-shadow:0 0 14px rgba(80,160,255,.4);}
.ghost-btn{border-color:rgba(140,100,255,.35);color:rgba(180,150,255,.8);}
.ghost-btn.on,.ghost-btn:active{background:rgba(120,80,255,.2);border-color:#a8f;color:#d4afff;box-shadow:0 0 14px rgba(120,80,255,.4);}
#hint{position:fixed;top:14px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">點擊 / 觸碰畫面觸發特效</div>
<div id="ui">
  <div class="row-label">⚔ 斬擊</div>
  <div class="row" id="slashRow"></div>
  <div class="row-label">👻 鬼魂</div>
  <div class="row" id="ghostRow"></div>
</div>

<script>
// ── Setup ──
const cv = document.getElementById('c');
const ctx = cv.getContext('2d', { alpha: false });
let W, H;
function resize() {
  W = cv.width = cv.clientWidth;
  H = cv.height = cv.clientHeight;
}
resize();
window.addEventListener('resize', resize);

const tau = Math.PI * 2;
const rr = (a, b) => a + (b - a) * Math.random();
const ri = (a, b) => Math.floor(rr(a, b + 1));
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;

// ── Noise ──
const _perm = (() => {
  const p = new Uint8Array(512);
  for (let i = 0; i < 256; i++) p[i] = p[i + 256] = i;
  for (let i = 255; i > 0; i--) { const j = ri(0, i); [p[i], p[j]] = [p[j], p[i]]; }
  return p;
})();
function noise2(x, y) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
  const xf = x - Math.floor(x), yf = y - Math.floor(y);
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  const g = (h, dx, dy) => { const k = h & 3; return (k === 0 ? dx - dy : k === 1 ? -dx - dy : k === 2 ? dx + dy : -dx + dy); };
  const a = _perm[X] + Y, b = _perm[X + 1] + Y;
  return lerp(lerp(g(_perm[a], xf, yf), g(_perm[b], xf - 1, yf), u),
              lerp(g(_perm[a + 1], xf, yf - 1), g(_perm[b + 1], xf - 1, yf - 1), u), v);
}

// ── Global state ──
let T = 0;
let currentFx = null;
let shakeX = 0, shakeY = 0, shakeF = 0, shakeMag = 0;
let flashLife = 0;
// Per-effect persistent objects
let particles = [];
let slashLines = [];
let ghostEntities = [];
let afterImages = [];
let ripples = [];
let cracks = [];
let embers = [];
let glowOrbs = [];

function shake(f, m) { shakeF = f; shakeMag = m; }
function flash(a) { flashLife = a; }

// ── Particle pool ──
const P_CAP = 600;
function addP(o) {
  if (particles.length >= P_CAP) return;
  particles.push({ life: 1, decay: .018, x: W/2, y: H/2, vx: 0, vy: 0, grav: 0, drag: .97, sz: 4, hue: 200, sat: 100, lit: 65, al: 1, blur: 6, shape: 'c', rot: 0, rv: 0, ...o });
}
function tickParticles() {
  const nx = [];
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.life -= p.decay;
    if (p.life <= 0) continue;
    p.vx *= p.drag; p.vy *= p.drag; p.vy += p.grav;
    p.x += p.vx; p.y += p.vy; p.rot += p.rv;
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = p.life * p.al;
    ctx.shadowBlur = p.blur * p.life;
    ctx.shadowColor = `hsl(${p.hue},${p.sat}%,${p.lit}%)`;
    ctx.fillStyle   = `hsl(${p.hue + T * .4},${p.sat}%,${p.lit}%)`;
    const s = Math.max(.5, p.sz * (p.shape === 'c' ? p.life : 1));
    if (p.shape === 'c') {
      ctx.beginPath(); ctx.arc(p.x, p.y, s, 0, tau); ctx.fill();
    } else if (p.shape === 'd') {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(s*.6,0); ctx.lineTo(0,s); ctx.lineTo(-s*.6,0); ctx.closePath(); ctx.fill(); ctx.restore();
    } else if (p.shape === 't') {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.beginPath(); ctx.moveTo(0,-s*1.2); ctx.lineTo(s*.7,s); ctx.lineTo(-s*.7,s); ctx.closePath(); ctx.fill(); ctx.restore();
    }
    nx.push(p);
  }
  particles = nx;
  ctx.shadowBlur = 0; ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
}

// ════════════════════════════════════════════════
//  SLASH EFFECTS  (5種)
// ════════════════════════════════════════════════

// ── S1: 天斬 Heaven Slash ── 純白聖劍光刃橫掃全屏，帶聖光羽毛炸散
function slash1(x, y) {
  const angle = rr(-.18, .18);
  const len = Math.max(W, H) * 1.1;
  // 主刃 + 多層輝光
  for (let layer = 0; layer < 5; layer++) {
    slashLines.push({
      type: 's1', layer,
      x1: x - Math.cos(angle) * len / 2, y1: y - Math.sin(angle) * len / 2,
      x2: x + Math.cos(angle) * len / 2, y2: y + Math.sin(angle) * len / 2,
      life: 1, decay: .028 + layer * .012,
      width: [28, 18, 10, 5, 1.5][layer],
      hue: [55, 48, 42, 35, 0][layer], sat: [80, 90, 100, 100, 0][layer], lit: [60, 70, 80, 92, 100][layer]
    });
  }
  // 衝擊波環
  for (let i = 0; i < 4; i++) ripples.push({ x, y, r: i * 15, life: 1, decay: .016, hue: 50, delay: i * 4, frame: 0 });
  // 羽毛粒子
  for (let i = 0; i < 60; i++) {
    const a = rr(0, tau), sp = rr(2, 10);
    addP({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1, hue: rr(40,60), sat:90, lit:85, sz:rr(2,8), blur:12, grav:.04, drag:.97, decay:rr(.01,.025), shape:'d', rot:rr(0,tau), rv:rr(-.08,.08) });
  }
  flash(.9); shake(14, 10);
}

// ── S2: 月牙斬 Crescent Blade ── 弧形月牙能量斬，帶殘影與冰藍碎屑
function slash2(x, y) {
  const baseAngle = rr(0, tau);
  const arcR = Math.min(W, H) * .45;
  // 月牙弧線 (多段折線模擬弧形)
  for (let layer = 0; layer < 4; layer++) {
    const pts = [];
    const arcSpan = Math.PI * .9;
    const n = 40;
    for (let i = 0; i <= n; i++) {
      const a = baseAngle - arcSpan / 2 + (arcSpan * i / n);
      pts.push({ x: x + Math.cos(a) * (arcR + layer * 3), y: y + Math.sin(a) * (arcR + layer * 3) });
    }
    slashLines.push({ type: 's2', layer, pts, life: 1, decay: .022 + layer * .01, width: [18, 10, 5, 2][layer], hue: 200, sat: 90, lit: [80, 70, 60, 50][layer] });
  }
  // 弧形碎屑粒子
  for (let i = 0; i < 55; i++) {
    const a = baseAngle - Math.PI * .45 + rr(0, Math.PI * .9);
    const rad = arcR + rr(-20, 20);
    const sp = rr(2, 9);
    const tx = x + Math.cos(a) * rad, ty = y + Math.sin(a) * rad;
    addP({ x: tx, y: ty, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, hue: rr(190,220), sat:100, lit:80, sz:rr(1.5,5), blur:10, grav:.06, drag:.97, decay:rr(.012,.028) });
  }
  // 殘影
  for (let i = 0; i < 3; i++) {
    afterImages.push({ type: 's2', x, y, arcR, baseAngle, life: 1, decay: .04 + i * .02, offset: i * .12 });
  }
  flash(.75); shake(10, 8);
}

// ── S3: 血斬 Blood Slash ── 暗紅能量斬裂，地面裂縫延伸+血色爆散
function slash3(x, y) {
  const angle = rr(-.3, .3) - Math.PI / 2;
  const len = Math.max(W, H) * .95;
  // 主刃
  for (let layer = 0; layer < 4; layer++) {
    slashLines.push({
      type: 's1', layer,
      x1: x - Math.cos(angle) * len / 2, y1: y - Math.sin(angle) * len / 2,
      x2: x + Math.cos(angle) * len / 2, y2: y + Math.sin(angle) * len / 2,
      life: 1, decay: .025 + layer * .01,
      width: [22, 13, 7, 2.5][layer],
      hue: [0, 5, 10, 0][layer], sat: 100, lit: [30, 45, 60, 80][layer]
    });
  }
  // 地裂縫
  for (let i = 0; i < 6; i++) {
    const ca = angle + rr(-.6, .6);
    const crackLen = rr(60, 200);
    let pts = [{ x, y }];
    let cx2 = x, cy2 = y;
    for (let j = 0; j < ri(4, 9); j++) {
      cx2 += Math.cos(ca + rr(-.4, .4)) * crackLen / 6;
      cy2 += Math.sin(ca + rr(-.4, .4)) * crackLen / 6;
      pts.push({ x: cx2, y: cy2 });
    }
    cracks.push({ pts, life: 1, decay: .006, hue: 0, width: rr(.8, 2.5) });
  }
  // 血色爆散
  for (let i = 0; i < 70; i++) {
    const a = rr(0, tau), sp = rr(1.5, 11);
    addP({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, hue: rr(0,15), sat:100, lit:rr(35,60), sz:rr(2,7), blur:10, grav:.1, drag:.96, decay:rr(.01,.025), shape:'c' });
  }
  flash(.7); shake(16, 13);
}

// ── S4: 電光斬 Thunder Slash ── 紫電劃破空間，分叉閃電+畫面撕裂
function slash4(x, y) {
  // 分形閃電斬
  const segs = [];
  function bolt(x1, y1, x2, y2, d, amp) {
    if (d === 0 || amp < 1.5) { segs.push({ x1, y1, x2, y2, d }); return; }
    const mx = (x1+x2)/2 + rr(-amp, amp), my = (y1+y2)/2 + rr(-amp, amp);
    bolt(x1, y1, mx, my, d-1, amp*.6);
    bolt(mx, my, x2, y2, d-1, amp*.6);
    if (Math.random() < .45) bolt(mx, my, mx+rr(-amp*2,amp*2), my+rr(-amp,amp), d-2, amp*.38);
  }
  const angle = rr(-.15, .15);
  const len = Math.max(W, H) * 1.05;
  const x1 = x - Math.cos(angle)*len/2, y1 = y - Math.sin(angle)*len/2;
  const x2 = x + Math.cos(angle)*len/2, y2 = y + Math.sin(angle)*len/2;
  bolt(x1, y1, x2, y2, 7, 55);
  slashLines.push({ type: 's4', segs, life: 1, decay: .045 });
  // 主斬線
  slashLines.push({ type: 's1', layer:0, x1, y1, x2, y2, life:.8, decay:.06, width:6, hue:270, sat:100, lit:85 });
  // 電弧粒子
  for (let i = 0; i < 80; i++) {
    const a = rr(0, tau), sp = rr(2, 14);
    addP({ x: x+rr(-80,80), y: y+rr(-15,15), vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, hue: rr(260,300), sat:100, lit:85, sz:rr(1,4.5), blur:12, grav:.12, drag:.97, decay:rr(.016,.04) });
  }
  // 撕裂裂縫
  for (let i = 0; i < 5; i++) {
    const ca = angle + rr(-.3, .3);
    let pts = [{ x: x+rr(-30,30), y: y+rr(-10,10) }], cx2 = pts[0].x, cy2 = pts[0].y;
    for (let j = 0; j < ri(3,7); j++) { cx2 += Math.cos(ca+rr(-.5,.5))*rr(20,55); cy2 += Math.sin(ca+rr(-.5,.5))*rr(10,30); pts.push({ x:cx2, y:cy2 }); }
    cracks.push({ pts, life: 1, decay: .01, hue: 270, width: rr(.5,2) });
  }
  flash(.95); shake(18, 15);
}

// ── S5: 虛空斬 Void Slash ── 黑色虛空切割，空間扭曲+異次元粒子湧出
function slash5(x, y) {
  const angle = rr(-.1, .1);
  const len = Math.max(W, H) * 1.1;
  // 黑色虛空裂縫
  slashLines.push({
    type: 's5',
    x1: x - Math.cos(angle)*len/2, y1: y - Math.sin(angle)*len/2,
    x2: x + Math.cos(angle)*len/2, y2: y + Math.sin(angle)*len/2,
    life: 1, decay: .014, angle, cx: x, cy: y, width: 0
  });
  // 虛空粒子湧出 (多色異次元)
  for (let i = 0; i < 90; i++) {
    const t = i / 90;
    const px = x + Math.cos(angle) * (t - .5) * len * .9;
    const py = y + Math.sin(angle) * (t - .5) * len * .9;
    const perp = angle + Math.PI/2;
    const side = Math.random() < .5 ? 1 : -1;
    const sp = rr(1.5, 8);
    addP({
      x: px + Math.cos(perp)*side*rr(2,10), y: py + Math.sin(perp)*side*rr(2,10),
      vx: Math.cos(perp)*side*sp + Math.cos(angle)*rr(-2,2),
      vy: Math.sin(perp)*side*sp + Math.sin(angle)*rr(-2,2),
      hue: rr(0,360), sat:100, lit:rr(65,90), sz:rr(1,5), blur:14,
      grav: .03, drag:.97, decay:rr(.008,.022)
    });
  }
  // 空間扭曲環
  for (let i = 0; i < 5; i++) ripples.push({ x, y, r: i * 20, life: 1, decay: .012, hue: rr(240,280), delay: i*3, frame:0 });
  flash(.6); shake(12, 12);
}

// ════════════════════════════════════════════════
//  GHOST EFFECTS  (5種)
// ════════════════════════════════════════════════

// ── G1: 幽靈纏繞 Wraith Spiral ── 半透明靈體螺旋纏繞上升，帶鬼火軌跡
function ghost1(x, y) {
  ghostEntities.push({
    type: 'g1', x, y, t: 0,
    arms: Array.from({ length: 3 }, (_, i) => ({
      phase: i / 3 * tau, radius: rr(40, 80), speed: rr(.02, .04),
      hue: rr(160, 220), trail: []
    })),
    life: 1, decay: .003, maxT: 300
  });
  // 初始爆發粒子
  for (let i = 0; i < 40; i++) {
    const a = rr(0, tau), sp = rr(1, 5);
    addP({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1, hue: rr(160,220), sat:80, lit:75, sz:rr(2,7), blur:10, grav:-.01, drag:.96, decay:rr(.008,.018) });
  }
}

// ── G2: 骷髏幻影 Skull Phantom ── 巨大鬼臉從地面升起，眼眶發光，慢速消散
function ghost2(x, y) {
  ghostEntities.push({ type: 'g2', x, y: H + 60, ty: y, t: 0, life: 1, decay: .004, phase: 0 });
  // 骷髏崩散粒子
  for (let i = 0; i < 50; i++) {
    const a = rr(0, tau), sp = rr(.5, 4);
    addP({ x: x+rr(-40,40), y: y+rr(-60,20), vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - rr(.5,2), hue: rr(100,160), sat:60, lit:70, sz:rr(1,5), blur:8, grav:-.005, drag:.98, decay:rr(.006,.014), al:.6 });
  }
}

// ── G3: 靈魂漩渦 Soul Vortex ── 多條靈光在點擊處形成漩渦，向內吸噬
function ghost3(x, y) {
  ghostEntities.push({
    type: 'g3', x, y, t: 0, life: 1, decay: .0035,
    streamers: Array.from({ length: 8 }, (_, i) => ({
      angle: i / 8 * tau, r: rr(120, 200), speed: rr(.025, .045),
      hue: rr(200, 300), trail: [], phase: rr(0, tau)
    }))
  });
  for (let i = 0; i < 30; i++) {
    const a = rr(0, tau), r = rr(60, 180);
    addP({ x: x + Math.cos(a)*r, y: y + Math.sin(a)*r, vx: -Math.cos(a)*rr(1,3), vy: -Math.sin(a)*rr(1,3), hue: rr(200,280), sat:90, lit:75, sz:rr(1.5,5), blur:10, grav:0, drag:.97, decay:rr(.01,.02) });
  }
}

// ── G4: 鬼焰爆裂 Ghost Flame Burst ── 幽綠鬼焰從地底噴發，逆重力飄散
function ghost4(x, y) {
  ghostEntities.push({
    type: 'g4', x, y, t: 0, life: 1, decay: .005,
    columns: Array.from({ length: 12 }, (_, i) => ({
      x: x + Math.cos(i/12*tau) * rr(0,50),
      y, speed: rr(2, 5), hue: rr(100,160), phase: rr(0,tau), sz: rr(15,40), active: true
    }))
  });
  // 基底爆發
  for (let i = 0; i < 60; i++) {
    const a = rr(0, tau), sp = rr(2, 9);
    addP({ x: x+rr(-30,30), y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - rr(2,6), hue: rr(100,160), sat:100, lit:65, sz:rr(4,16), blur:16, grav:-.06, drag:.96, decay:rr(.009,.02) });
  }
  // 衝擊波
  for (let i = 0; i < 3; i++) ripples.push({ x, y, r: i*18, life:1, decay:.014, hue:130, delay:i*5, frame:0 });
}

// ── G5: 幽靈軍團 Phantom Legion ── 多個半透明鬼影從四周湧來，穿越點擊點消散
function ghost5(x, y) {
  const n = 8;
  for (let i = 0; i < n; i++) {
    const angle = i / n * tau + rr(-.2, .2);
    const dist = rr(Math.min(W,H)*.35, Math.min(W,H)*.5);
    ghostEntities.push({
      type: 'g5',
      sx: x + Math.cos(angle) * dist, sy: y + Math.sin(angle) * dist,
      tx: x, ty: y,
      x: x + Math.cos(angle) * dist, y: y + Math.sin(angle) * dist,
      hue: rr(160, 260), sz: rr(20, 45),
      t: 0, speed: rr(.018, .03), life: 1, decay: .006,
      trail: [], phase: rr(0, tau)
    });
  }
  // 目標點爆發
  for (let i = 0; i < 30; i++) {
    const a = rr(0, tau), sp = rr(1, 5);
    addP({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, hue: rr(160,260), sat:80, lit:75, sz:rr(2,6), blur:10, grav:0, drag:.97, decay:rr(.01,.02) });
  }
}

// ════════════════════════════════════════════════
//  DRAW SUBSYSTEMS
// ════════════════════════════════════════════════
function drawSlashLines() {
  slashLines = slashLines.filter(s => {
    s.life -= s.decay;
    if (s.life <= 0) return false;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    if (s.type === 's1') {
      ctx.globalAlpha = s.life * .9;
      ctx.strokeStyle = `hsl(${s.hue},${s.sat}%,${s.lit}%)`;
      ctx.lineWidth = s.width * s.life;
      ctx.shadowBlur = s.width * 2 * s.life;
      ctx.shadowColor = ctx.strokeStyle;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
    } else if (s.type === 's2') {
      // Arc slash
      ctx.globalAlpha = s.life * .85;
      ctx.strokeStyle = `hsl(${s.hue},${s.sat}%,${s.lit}%)`;
      ctx.lineWidth = s.width * s.life;
      ctx.shadowBlur = s.width * 2 * s.life;
      ctx.shadowColor = ctx.strokeStyle;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      s.pts.forEach((pt, i) => i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y));
      ctx.stroke();
    } else if (s.type === 's4') {
      // Lightning segments
      s.segs.forEach(seg => {
        ctx.globalAlpha = s.life * (seg.d > 4 ? .95 : .45);
        ctx.strokeStyle = seg.d > 4 ? '#fff' : `hsl(275,100%,80%)`;
        ctx.lineWidth = seg.d > 4 ? 2.5 : .7;
        ctx.shadowBlur = seg.d > 4 ? 22 : 7;
        ctx.shadowColor = '#b088ff';
        ctx.beginPath(); ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2); ctx.stroke();
      });
    } else if (s.type === 's5') {
      // Void slash: expanding dark rift with colored edges
      s.width = Math.min(s.width + 1.5, 22);
      // Dark core
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = s.life * .85;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = s.width * s.life;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
      // Glowing edges
      ctx.globalCompositeOperation = 'screen';
      for (let side = -1; side <= 1; side += 2) {
        const perp = s.angle + Math.PI/2;
        const off = side * s.width * s.life * .6;
        ctx.strokeStyle = `hsl(${270+T},100%,70%)`;
        ctx.lineWidth = 2;
        ctx.shadowBlur = 15; ctx.shadowColor = `hsl(${270+T},100%,70%)`;
        ctx.globalAlpha = s.life * .8;
        ctx.beginPath();
        ctx.moveTo(s.x1 + Math.cos(perp)*off, s.y1 + Math.sin(perp)*off);
        ctx.lineTo(s.x2 + Math.cos(perp)*off, s.y2 + Math.sin(perp)*off);
        ctx.stroke();
      }
    }
    ctx.restore();
    return true;
  });
  ctx.shadowBlur = 0;
}

function drawCracks() {
  cracks = cracks.filter(c => {
    c.life -= c.decay;
    if (c.life <= 0) return false;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = c.life * .8;
    ctx.strokeStyle = `hsl(${c.hue},90%,${c.hue === 0 ? 55 : 70}%)`;
    ctx.lineWidth = c.width * c.life;
    ctx.shadowBlur = 8 * c.life;
    ctx.shadowColor = ctx.strokeStyle;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    c.pts.forEach((pt, i) => i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y));
    ctx.stroke();
    ctx.restore();
    return true;
  });
  ctx.shadowBlur = 0;
}

function drawRipples() {
  ripples = ripples.filter(rp => {
    rp.frame++;
    if (rp.frame < rp.delay) return true;
    rp.r += 5; rp.life -= rp.decay;
    if (rp.life <= 0) return false;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = rp.life * .75;
    ctx.strokeStyle = `hsl(${rp.hue},85%,68%)`;
    ctx.lineWidth = 2 * rp.life;
    ctx.shadowBlur = 14; ctx.shadowColor = ctx.strokeStyle;
    ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, tau); ctx.stroke();
    ctx.restore();
    ctx.shadowBlur = 0;
    return true;
  });
}

function drawAfterImages() {
  afterImages = afterImages.filter(ai => {
    ai.life -= ai.decay;
    if (ai.life <= 0) return false;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = ai.life * .35;
    if (ai.type === 's2') {
      const arcSpan = Math.PI * .9;
      const n = 30;
      ctx.strokeStyle = `hsl(200,80%,65%)`;
      ctx.lineWidth = 4 * ai.life;
      ctx.shadowBlur = 12; ctx.shadowColor = ctx.strokeStyle;
      ctx.lineCap = 'round';
      ctx.beginPath();
      for (let i = 0; i <= n; i++) {
        const a = ai.baseAngle + ai.offset - arcSpan/2 + arcSpan*i/n;
        const px = ai.x + Math.cos(a)*ai.arcR, py = ai.y + Math.sin(a)*ai.arcR;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    ctx.restore();
    ctx.shadowBlur = 0;
    return true;
  });
}

function drawGhosts() {
  ghostEntities = ghostEntities.filter(g => {
    g.life -= g.decay; g.t++;
    if (g.life <= 0) return false;

    if (g.type === 'g1') {
      // Wraith spiral
      g.arms.forEach(arm => {
        arm.phase += arm.speed;
        const px = g.x + Math.cos(arm.phase) * arm.radius * g.life;
        const py = g.y + Math.sin(arm.phase) * arm.radius * g.life - g.t * .4;
        arm.trail.push({ x: px, y: py });
        if (arm.trail.length > 35) arm.trail.shift();
        // Draw trail
        for (let i = 1; i < arm.trail.length; i++) {
          const a = i / arm.trail.length;
          ctx.save();
          ctx.globalCompositeOperation = 'screen';
          ctx.globalAlpha = a * g.life * .7;
          ctx.strokeStyle = `hsl(${arm.hue + i * 2},80%,70%)`;
          ctx.lineWidth = a * 4 * g.life;
          ctx.shadowBlur = 12 * a;
          ctx.shadowColor = ctx.strokeStyle;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(arm.trail[i-1].x, arm.trail[i-1].y);
          ctx.lineTo(arm.trail[i].x, arm.trail[i].y);
          ctx.stroke();
          ctx.restore();
        }
        // Head glow
        const grad = ctx.createRadialGradient(px,py,0,px,py,12*g.life);
        grad.addColorStop(0, `hsla(${arm.hue},100%,90%,.9)`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = g.life * .8;
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(px,py,12*g.life,0,tau); ctx.fill();
        ctx.restore();
        // Spawn orb particles
        if (g.t % 3 === 0) addP({ x:px, y:py, vx:rr(-1,1), vy:rr(-2,-.5), hue:arm.hue, sat:80, lit:78, sz:rr(2,5), blur:8, grav:-.005, drag:.98, decay:rr(.01,.02) });
      });
      ctx.shadowBlur = 0;
    }

    else if (g.type === 'g2') {
      // Skull phantom rising
      g.y = lerp(g.y, g.ty, .04);
      g.phase += .05;
      const cx = g.x, cy = g.y;
      const sc = g.life;
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = g.life * .75;
      // Skull body glow
      const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80*sc);
      grd.addColorStop(0, `hsla(130,70%,55%,.6)`);
      grd.addColorStop(.5, `hsla(140,80%,40%,.3)`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(cx,cy,80*sc,0,tau); ctx.fill();
      // Skull outline (simple geometric)
      ctx.strokeStyle = `hsl(130,70%,60%)`;
      ctx.lineWidth = 2 * sc;
      ctx.shadowBlur = 18; ctx.shadowColor = '#4ffa88';
      // Head
      ctx.beginPath(); ctx.ellipse(cx, cy-10*sc, 38*sc, 42*sc, 0, 0, tau); ctx.stroke();
      // Jaw
      ctx.beginPath(); ctx.ellipse(cx, cy+28*sc, 30*sc, 18*sc, 0, 0, tau); ctx.stroke();
      // Eyes
      const eyePulse = .5 + .5*Math.sin(g.phase*3);
      ctx.fillStyle = `hsl(130,100%,${60+eyePulse*30}%)`;
      ctx.shadowBlur = 20 * eyePulse; ctx.shadowColor = '#afffcc';
      ctx.beginPath(); ctx.ellipse(cx-14*sc, cy-14*sc, 10*sc*eyePulse, 12*sc*eyePulse, 0, 0, tau); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+14*sc, cy-14*sc, 10*sc*eyePulse, 12*sc*eyePulse, 0, 0, tau); ctx.fill();
      // Nose cavity
      ctx.strokeStyle = `hsl(130,60%,50%)`; ctx.lineWidth = 1.5*sc; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.moveTo(cx-5*sc, cy+4*sc); ctx.lineTo(cx, cy-4*sc); ctx.lineTo(cx+5*sc, cy+4*sc); ctx.stroke();
      ctx.restore();
      ctx.shadowBlur = 0;
      // Smoke particles from top
      if (g.t % 4 === 0) addP({ x:cx+rr(-20,20), y:cy-40*sc, vx:rr(-.5,.5), vy:rr(-1,-.3), hue:130, sat:60, lit:70, sz:rr(5,15), blur:10, grav:0, drag:.97, decay:rr(.008,.015), al:.5 });
    }

    else if (g.type === 'g3') {
      // Soul vortex
      g.streamers.forEach(st => {
        st.angle -= st.speed;
        st.phase += .03;
        const decay = Math.max(.1, g.life);
        const r = st.r * decay * (.8 + .2*Math.sin(st.phase));
        const px = g.x + Math.cos(st.angle) * r;
        const py = g.y + Math.sin(st.angle) * r;
        st.trail.push({ x:px, y:py });
        if (st.trail.length > 30) st.trail.shift();
        for (let i = 1; i < st.trail.length; i++) {
          const a = i / st.trail.length;
          ctx.save();
          ctx.globalCompositeOperation = 'screen';
          ctx.globalAlpha = a * g.life * .65;
          ctx.strokeStyle = `hsl(${st.hue + i*3 + T*.5},90%,70%)`;
          ctx.lineWidth = a * 5 * g.life;
          ctx.shadowBlur = 14 * a; ctx.shadowColor = ctx.strokeStyle;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(st.trail[i-1].x, st.trail[i-1].y);
          ctx.lineTo(st.trail[i].x, st.trail[i].y);
          ctx.stroke();
          ctx.restore();
        }
        // Pulse orb at tip
        if (g.t % 4 === 0) addP({ x:px, y:py, vx:(g.x-px)*.04, vy:(g.y-py)*.04, hue:st.hue, sat:90, lit:75, sz:rr(2,6), blur:10, grav:0, drag:.96, decay:rr(.012,.022) });
      });
      // Core vortex glow
      const cGrad = ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,35*g.life);
      cGrad.addColorStop(0, `rgba(200,180,255,${g.life*.7})`);
      cGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = cGrad;
      ctx.beginPath(); ctx.arc(g.x,g.y,35*g.life,0,tau); ctx.fill();
      ctx.restore();
      ctx.shadowBlur = 0;
    }

    else if (g.type === 'g4') {
      // Ghost flame burst
      g.columns = g.columns.filter(col => {
        if (!col.active) return false;
        col.y -= col.speed;
        col.phase += .08;
        col.sz = Math.max(2, col.sz * .995);
        if (col.y < -80) { col.active = false; return false; }
        const wobble = Math.sin(col.phase) * 8;
        const cx2 = col.x + wobble;
        // Flame column
        const grad = ctx.createRadialGradient(cx2, col.y, 0, cx2, col.y, col.sz * g.life);
        grad.addColorStop(0, `hsla(${col.hue+30},100%,85%,${g.life*.9})`);
        grad.addColorStop(.4, `hsla(${col.hue},100%,55%,${g.life*.6})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.ellipse(cx2, col.y, col.sz*.55*g.life, col.sz*g.life, 0, 0, tau); ctx.fill();
        ctx.restore();
        // Spawn particles
        if (g.t % 3 === 0) addP({ x:cx2+rr(-8,8), y:col.y+rr(-5,10), vx:rr(-.8,.8)+wobble*.05, vy:rr(-2,-.3), hue:col.hue, sat:100, lit:65, sz:rr(2,8), blur:10, grav:-.04, drag:.97, decay:rr(.01,.022) });
        return true;
      });
      ctx.shadowBlur = 0;
    }

    else if (g.type === 'g5') {
      // Phantom legion: move toward target
      const dx = g.tx - g.x, dy = g.ty - g.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 8) {
        g.x += dx * g.speed; g.y += dy * g.speed;
      } else {
        // Reached center: burst
        for (let i = 0; i < 20; i++) {
          const a = rr(0, tau), sp = rr(2, 8);
          addP({ x:g.x, y:g.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, hue:g.hue, sat:80, lit:75, sz:rr(2,6), blur:10, grav:0, drag:.97, decay:rr(.02,.04) });
        }
        return false;
      }
      g.phase = (g.phase||0) + .06;
      g.trail = g.trail || [];
      g.trail.push({ x:g.x, y:g.y });
      if (g.trail.length > 22) g.trail.shift();
      // Draw trail
      for (let i = 1; i < g.trail.length; i++) {
        const a = i / g.trail.length;
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = a * g.life * .5;
        ctx.fillStyle = `hsl(${g.hue},80%,70%)`;
        ctx.shadowBlur = 8; ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath(); ctx.arc(g.trail[i].x, g.trail[i].y, a * g.sz * .4, 0, tau); ctx.fill();
        ctx.restore();
      }
      // Ghost body
      const pulse = .75 + .25 * Math.sin(g.phase);
      const grd = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.sz * pulse);
      grd.addColorStop(0, `hsla(${g.hue},80%,88%,${g.life*.8})`);
      grd.addColorStop(.45, `hsla(${g.hue},75%,60%,${g.life*.45})`);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.shadowBlur = 18 * g.life; ctx.shadowColor = `hsl(${g.hue},80%,65%)`;
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(g.x, g.y, g.sz * pulse, 0, tau); ctx.fill();
      ctx.restore();
      ctx.shadowBlur = 0;
    }

    return true;
  });
}

// ════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════
function loop() {
  requestAnimationFrame(loop);
  T++;

  // Shake
  if (shakeF > 0) {
    shakeX = rr(-shakeMag, shakeMag); shakeY = rr(-shakeMag, shakeMag);
    shakeF--;
    if (!shakeF) { shakeX = 0; shakeY = 0; }
  }

  ctx.save();
  if (shakeX || shakeY) ctx.translate(shakeX, shakeY);

  // Background fade (motion blur)
  ctx.globalAlpha = .14;
  ctx.fillStyle = '#06070f';
  ctx.fillRect(-10, -10, W+20, H+20);
  ctx.globalAlpha = 1;

  // Draw everything
  drawSlashLines();
  drawCracks();
  drawRipples();
  drawAfterImages();
  drawGhosts();
  tickParticles();

  // Flash
  if (flashLife > 0) {
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = flashLife;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    flashLife = Math.max(0, flashLife - .07);
  }

  ctx.restore();
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}
loop();

// ════════════════════════════════════════════════
//  UI & INPUT
// ════════════════════════════════════════════════
const SLASH_FX = [
  { id:'s1', ic:'⚡', label:'天斬', fn: slash1 },
  { id:'s2', ic:'🌙', label:'月牙斬', fn: slash2 },
  { id:'s3', ic:'🩸', label:'血斬', fn: slash3 },
  { id:'s4', ic:'🔮', label:'電光斬', fn: slash4 },
  { id:'s5', ic:'🕳️', label:'虛空斬', fn: slash5 },
];
const GHOST_FX = [
  { id:'g1', ic:'🌀', label:'幽靈纏繞', fn: ghost1 },
  { id:'g2', ic:'💀', label:'骷髏幻影', fn: ghost2 },
  { id:'g3', ic:'🌌', label:'靈魂漩渦', fn: ghost3 },
  { id:'g4', ic:'🔥', label:'鬼焰爆裂', fn: ghost4 },
  { id:'g5', ic:'👻', label:'幽靈軍團', fn: ghost5 },
];

let activeFn = null;
let activeBtn = null;

function buildButtons(fxList, containerId, cls) {
  const row = document.getElementById(containerId);
  fxList.forEach(fx => {
    const btn = document.createElement('button');
    btn.className = cls;
    btn.innerHTML = `<span class="ic">${fx.ic}</span>${fx.label}`;
    btn.addEventListener('click', () => {
      activeFn = fx.fn;
      document.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
    });
    row.appendChild(btn);
  });
}
buildButtons(SLASH_FX, 'slashRow', 'slash-btn');
buildButtons(GHOST_FX, 'ghostRow', 'ghost-btn');

// Canvas tap
const cvEl = document.getElementById('c');
function getPos(e) {
  const rect = cvEl.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * (W / rect.width),
    y: (src.clientY - rect.top) * (H / rect.height)
  };
}
cvEl.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (!activeFn) return;
  const { x, y } = getPos(e);
  activeFn(x, y);
}, { passive: false });

// Prevent scroll
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
