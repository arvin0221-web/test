// ═══════════════════════════════════════════════════════════════════════════════
//  COMPLETE REWRITE OF MAIN LOOP WITH ALL SYSTEMS INTEGRATED
// ═══════════════════════════════════════════════════════════════════════════════

// Override the original frame function with the enhanced version
// We cancel the old one by reassigning
let _frameEnhanced = false;

function enhancedFrame(now){
  requestAnimationFrame(enhancedFrame);
  DT=min(50,now-LAST); LAST=now; T+=DT/1000;
  if(!_INITED){ KN.x=W/2; KN.y=GY; initLavaPools(); _INITED=true; }

  // ── TICK ALL SYSTEMS ──────────────────────────────────────────────────────
  tickCD();
  tickKnight();
  tickParticles();
  tickWaves();
  tickCracks();
  tickOrbs();
  tickShake();
  tickFlash();
  tickAllExtras();

  // ── DRAW ──────────────────────────────────────────────────────────────────
  G.save();
  G.translate(round(SHK_X), round(SHK_Y));

  // 1. Sky + atmospheric background
  drawBackground();
  drawSmokeColumns();

  // 2. Arena structural decorations (pillars behind ground)
  drawPillars();

  // 3. Ground
  drawGround();

  // 4. Arena floor details (torches, runes, lava, mist)
  drawTorches();
  drawGroundRunes();
  drawLavaPools();
  drawMist();
  drawHeatShimmer();

  // 5. Dynamic lighting from scene sources
  drawChestGemLight();
  drawSpearTipLight();
  drawLights();

  // 6. Ground-level FX (cracks glow, shockwaves)
  drawCracks();
  drawWaves();
  drawRings();

  // 7. Warning circle
  drawWarn();

  // 8. Heal magic circle (floor-level)
  drawHealCircle();

  // 9. Sweep arc energy
  drawSweepArc();

  // 10. Spear motion trail
  drawSpearTrail();

  // 11. Ghost afterimages (before knight)
  drawGhosts();

  // 12. Falling meteor
  drawMeteorFlameTrail();
  drawMeteor();

  // 13. Cape (behind knight body)
  if(KN.visible && KN.y>-200 && JP.spH){
    const capeAnchorX = JP.spH.x - FACING*8;
    const capeAnchorY = JP.spH.y + 4;
    drawCape(capeAnchorX, capeAnchorY);
  }

  // 14. Knight body
  if(KN.visible && KN.y>-200){
    drawKnight();
  }

  // 15. Thrust spear energy overlay
  drawThrustEnergyLines();

  // 16. Dash charge aura (over knight)
  drawDashChargeAura();

  // 17. Heal fountain effect
  drawHealFountain();

  // 18. Thrust flash
  drawThrustFlash();

  // 19. Splats, debris
  drawSplats();
  drawDebris();

  // 20. Particles (top layer)
  drawParticles();

  // 21. Heal orbs
  drawOrbs();

  // 22. Hit numbers
  drawHitNums();

  // 23. Post-processing
  drawColorGrade();
  drawVignette();
  // drawScanlines(); // optional — can uncomment for CRT feel
  // drawChromaticAberration(); // optional — heavy on mobile

  G.restore();
}

// Cancel old animation loop, start enhanced one
// (The old requestAnimationFrame(frame) already fired once from init,
//  we simply let the enhanced loop take over by not calling frame() again)
if(!_frameEnhanced){
  _frameEnhanced=true;
  // Stop old loop by overriding frame to no-op
  // (JS RAF is fire-and-forget; we just start a new chain)
  requestAnimationFrame(enhancedFrame);
}

function checkThrustHitExtra(){

const ASH_POOL = [];
const ASH_MAX  = 60;
function initAsh(){
  for(let i=0;i<ASH_MAX;i++){
    ASH_POOL.push({
      x:Math.random()*480, y:Math.random()*H,
      vx:(Math.random()-.5)*0.4, vy:0.3+Math.random()*0.6,
      r:0.6+Math.random()*1.4, alpha:0.08+Math.random()*0.18,
      phase:Math.random()*TAU,
    });
  }
}
initAsh();
function drawAsh(){
  for(const a of ASH_POOL){
    a.x+=(a.vx+sin(T*0.6+a.phase)*0.3)*(DT/16);
    a.y+=a.vy*(DT/16);
    if(a.y>H+5){a.y=-5;a.x=Math.random()*W;}
    if(a.x<-5)a.x=W+5;if(a.x>W+5)a.x=-5;
    G.globalAlpha=a.alpha*(0.6+sin(T*0.8+a.phase)*0.4);
    G.fillStyle='rgba(160,140,120,1)';
    G.beginPath();G.arc(a.x,a.y,a.r,0,TAU);G.fill();
  }
  G.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  ANIMATED BACKGROUND STARS SHOOTING
// ═══════════════════════════════════════════════════════════════════════════════
const SHOOTING_STARS=[];
let shootingStarTimer=0;
function tickShootingStars(){
  shootingStarTimer+=DT;
  if(shootingStarTimer>3000+Math.random()*8000){
    shootingStarTimer=0;
    SHOOTING_STARS.push({
      x:Math.random(), y:Math.random()*0.5,
      vx:0.003+Math.random()*0.005, vy:0.001+Math.random()*0.003,
      life:600+Math.random()*800, ml:600+Math.random()*800,
      len:40+Math.random()*80,
    });
  }
  for(let i=SHOOTING_STARS.length-1;i>=0;i--){
    SHOOTING_STARS[i].x+=SHOOTING_STARS[i].vx*(DT/16);
    SHOOTING_STARS[i].y+=SHOOTING_STARS[i].vy*(DT/16);
    SHOOTING_STARS[i].life-=DT;
    if(SHOOTING_STARS[i].life<=0)SHOOTING_STARS.splice(i,1);
  }
}
function drawShootingStars(){
  for(const ss of SHOOTING_STARS){
    const a=(ss.life/ss.ml);
    const ex=ss.x*W-ss.len*ss.vx/ss.vx; // tail
    const sg=G.createLinearGradient(
      ss.x*W, ss.y*GY,
      ss.x*W-ss.len*cos(atan2(ss.vy,ss.vx)), ss.y*GY-ss.len*sin(atan2(ss.vy,ss.vx))
    );
    sg.addColorStop(0,`rgba(255,255,255,${a*0.9})`);
    sg.addColorStop(1,'rgba(255,255,255,0)');
    G.strokeStyle=`rgba(255,255,255,${a*0.7})`;
    G.lineWidth=1.5*a;
    G.shadowBlur=6;G.shadowColor='rgba(200,220,255,0.8)';
    G.beginPath();
    G.moveTo(ss.x*W,ss.y*GY);
    G.lineTo(ss.x*W-ss.len*ss.vx,ss.y*GY-ss.len*ss.vy);
    G.stroke();G.shadowBlur=0;
  }
}

// Hook shooting stars into extras
const _origTickExtras10 = window.tickAllExtras;
window.tickAllExtras = function(){
  _origTickExtras10();
  tickShootingStars();
};
// Hook shooting stars into background draw

};

// ═══════════════════════════════════════════════════════════════════════════════
//  MOBILE TOUCH SUPPORT — swipe gestures for skills
// ═══════════════════════════════════════════════════════════════════════════════
let touchStartX=0, touchStartY=0, touchStartTime=0;
document.addEventListener('touchstart',e=>{
  if(e.target.closest('#skillBar'))return;
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
  touchStartTime=performance.now();
},{passive:true});
document.addEventListener('touchend',e=>{
  if(e.target.closest('#skillBar'))return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  const dt2=performance.now()-touchStartTime;
  if(dt2>400)return; // not a swipe
  const dist2=sqrt(dx*dx+dy*dy);
  if(dist2<30)return; // not moved enough
  // Swipe right → dash, swipe left → sweep
  // Swipe up → thrust, swipe down → meteor
  const adx=abs(dx),ady=abs(dy);
  if(adx>ady){ // horizontal
    if(dx>0)castSkill(0); else castSkill(1);
  } else { // vertical
    if(dy<0)castSkill(2); else castSkill(3);
  }
},{passive:true});

// ═══════════════════════════════════════════════════════════════════════════════
//  FPS MONITOR  (debug, top-right corner)
// ═══════════════════════════════════════════════════════════════════════════════
let fpsFrames=0, fpsLast=performance.now(), fpsVal=60;
function drawFPS(){
  fpsFrames++;
  const now=performance.now();
  if(now-fpsLast>500){
    fpsVal=round(fpsFrames/(now-fpsLast)*1000);
    fpsFrames=0; fpsLast=now;
  }
  G.save();
  G.font='bold 9px monospace';
  G.fillStyle=`hsl(${fpsVal>45?120:fpsVal>30?60:0},80%,55%)`;
  G.textAlign='right';G.textBaseline='top';
  G.fillText(`${fpsVal} FPS`,W-6,4);
  G.restore();
}
